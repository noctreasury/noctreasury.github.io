    <style>

        }

<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="branch-info">
            <h6 class="mb-0"><i class="bi bi-chat-dots-fill" style="color: #25d366;"></i> NOC Chat</h6>
            <div class="branch-badge">
                <i class="bi bi-building"></i> 
                <span id="branchDisplay" class="branch-display">Loading...</span>
                <span id="cacheIndicator" class="cache-info" title="Loaded from cache">📦</span>
            </div>
            <div class="online-status">
                <span class="online-dot"></span>
                <span id="onlineStatusText">Online</span>
            </div>
            <button class="notification-toggle" id="toggleToneBtn" title="Toggle Sound">
                <i class="bi bi-volume-up-fill"></i>
            </button>
        </div>
        <div id="connectionStatus" class="connection-status">🟢 Online</div>
        <div class="refresh-control">
            <i class="bi bi-arrow-repeat"></i>
            <input type="number" id="refreshIntervalInput" value="8" min="1" max="59" step="1">
            <label>sec</label>
            <span id="countdownDisplay"></span>
        </div>
    </div>
    
    <div class="active-users-panel" id="activeUsersPanel">
        <i class="bi bi-people-fill"></i> Active: <span id="activeCount">0</span>
        <span id="activeUsersList"></span>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="loading-spinner" id="initialLoading">
            <div class="spinner-border text-success" role="status" style="width: 30px; height: 30px;">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted small">Loading messages...</p>
        </div>
    </div>
    
    <div class="chat-input-area">
        <div class="reply-preview" id="replyPreview">
            <i class="bi bi-reply-fill" style="color: #25d366;"></i> Replying to: <strong><span id="replyToBranch"></span></strong>
            <br><small id="replyToMessage"></small>
            <span class="cancel-reply" onclick="cancelReply()">✕</span>
        </div>
        
        <div class="input-group">
            <textarea class="form-control" id="messageInput" rows="1" placeholder="Type a message... @mention branch, @Admin, or @All"></textarea>
            <button class="btn send-btn" id="sendBtn">
              <i class="bi bi-arrow-right"></i>
            </button>
        </div>
        <div class="quick-actions">
            <button class="quick-btn" onclick="quickMention('Admin')"><i class="bi bi-star-fill"></i> @Admin</button>
            <button class="quick-btn" onclick="quickMention('All')"><i class="bi bi-people-fill"></i> @All</button>
        </div>
        <div id="mentionSuggestions" class="mention-suggestion"></div>
    </div>
</div>

<script>
    // ======================== CONFIGURATION ========================
    const SPREADSHEET_ID = "1fkiFo1i60NxA_ujl1GhPmNnSLKI6seb3YiMVhPxZjgM";

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2GQE3P0II0drjw7ENXlKsYN7wL29W9H86hNXQno6i287ptbt0wIAJA7buXC1EkKB9Yg/exec";
    
    // Global variables
    let branchCode = null;
    let messages = [];
    let refreshTimer = null;
    let countdownInterval = null;
    let heartbeatTimer = null;
    let replyingTo = null;
    let activeBranches = new Map();
    let isWindowActive = true;
    let lastMessageIds = new Set();
    let notificationSound = null;
    let soundEnabled = true;
    let currentRefreshInterval = 8;
    let isLoading = false;
    let initialLoadDone = false;

    // ======================== BRANCH FETCHING (Same as power status HTML) ========================
    function getBranchFromStorage() {
        let branch = null;
        
        // Try sessionStorage first (same as power status HTML)
        const sessionUser = sessionStorage.getItem('currentUser');
        if (sessionUser) {
            try {
                const userData = JSON.parse(sessionUser);
                branch = userData.username;
                console.log("Branch from sessionStorage:", branch);
                if (branch) return branch;
            } catch (e) {
                console.error('Error parsing session user:', e);
            }
        }
        
        // Try localStorage currentUser
        if (!branch) {
            const localUser = localStorage.getItem('currentUser');
            if (localUser) {
                try {
                    const userData = JSON.parse(localUser);
                    branch = userData.username;
                    console.log("Branch from localStorage currentUser:", branch);
                    if (branch) return branch;
                } catch (e) {
                    console.error('Error parsing local user:', e);
                }
            }
        }
        
        // Try selectedBranch
        if (!branch) {
            branch = localStorage.getItem('selectedBranch');
            console.log("Branch from selectedBranch:", branch);
            if (branch) return branch;
        }
        
        // Try branchCode
        if (!branch) {
            branch = localStorage.getItem('branchCode');
            console.log("Branch from branchCode:", branch);
            if (branch) return branch;
        }
        
        console.log("No branch found in storage");
        return null;
    }
    
    // Save branch to storage (for consistency with power status HTML)
    function saveBranchToStorage(branch) {
        if (branch) {
            localStorage.setItem('branchCode', branch);
            localStorage.setItem('selectedBranch', branch);
            console.log("Branch saved to storage:", branch);
        }
    }
    
    // Initialize branch and show modal if needed
    function initializeBranch() {
        branchCode = getBranchFromStorage();
        
        if (branchCode) {
            $('#branchDisplay').text(branchCode);
            $('#cacheIndicator').attr('title', 'Loaded from storage').css('opacity', '1');
            console.log("Branch loaded successfully:", branchCode);
            return true;
        } else {
            $('#branchDisplay').text('No Branch');
            $('#cacheIndicator').attr('title', 'No branch found').css('opacity', '0.5');
            console.log("No branch found in storage");
            showBranchSelectionModal();
            return false;
        }
    }
    
    function showBranchSelectionModal() {
        Swal.fire({
            title: 'Welcome to NOC Chat',
            text: 'Please enter your branch code to continue',
            input: 'text',
            inputPlaceholder: 'Enter BRcode (e.g., BR0101, BR1001) or ADMIN',
            inputValidator: (value) => {
                if (!value) return 'Branch code is required!';
                const upperValue = value.toUpperCase().trim();
                if (!/^BR\d{4}$/i.test(upperValue) && upperValue !== 'ADMIN') {
                    return 'Invalid format! Use BR + 4 digits (e.g., BR0101) or ADMIN';
                }
                return null;
            },
            showCancelButton: false,
            allowOutsideClick: false,
            confirmButtonText: 'Start Chatting',
            confirmButtonColor: '#25d366'
        }).then((result) => {
            if (result.value) {
                branchCode = result.value.toUpperCase().trim();
                saveBranchToStorage(branchCode);
                $('#branchDisplay').text(branchCode);
                $('#initialLoading').show();
                initialLoadDone = false;
                
                // Reload messages with new branch
                loadMessages().then(() => {
                    Swal.fire({
                        icon: 'success',
                        title: 'Branch Set',
                        text: `Welcome ${branchCode}!`,
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 2000
                    });
                });
            }
        });
    }
    
    // ======================== NOTIFICATION SOUND ========================
    function initNotificationSound() {
        try {
            notificationSound = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
            notificationSound.volume = 0.3;
            notificationSound.load();
        } catch(e) {
            console.log("Audio not supported");
            notificationSound = null;
        }
    }
    
    function playNotificationSound() {
        if (!soundEnabled) return;
        try {
            if (notificationSound) {
                notificationSound.currentTime = 0;
                notificationSound.play().catch(() => {});
            }
        } catch(e) {}
    }
    
    // ======================== DELETE MESSAGE FUNCTION ========================
    async function deleteMessageFromSheet(messageId) {
        if (!branchCode) {
            Swal.fire('Error', 'Please set your branch code first', 'warning');
            return false;
        }
        
        try {
            await fetch(APPS_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { 
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    action: "DELETE_MESSAGE",
                    messageId: messageId,
                    branchCode: branchCode,
                    timestamp: new Date().toISOString()
                })
            });
            
            await new Promise(resolve => setTimeout(resolve, 500));
            await loadMessages();
            return true;
            
        } catch (error) {
            console.error("Delete error:", error);
            Swal.fire('Error', 'Failed to delete message. Please try again.', 'error');
            return false;
        }
    }
    
    // ======================== CLOSE DROPDOWN ========================
    function closeDropdown() {
        if (activeDropdown) {
            $(activeDropdown).remove();
            activeDropdown = null;
        }
    }
    
    // ======================== SHOW DROPDOWN MENU ========================
    function showMessageMenu(event, messageId, messageBranch) {
        event.stopPropagation();
        closeDropdown();
        
        const canDelete = (messageBranch === branchCode) || (branchCode === 'ADMIN');
        if (!canDelete) {
            Swal.fire({
                icon: 'warning',
                title: 'Cannot Delete',
                text: 'You can only delete your own messages or contact Admin.',
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 2000
            });
            return;
        }
        
        const button = $(event.currentTarget);
        const offset = button.offset();
        
        const $dropdown = $(`
            <div class="message-dropdown" style="top: ${offset.top + 30}px; left: ${offset.left - 100}px;">
                <div class="dropdown-item-custom delete-item" data-msg-id="${messageId}" data-msg-branch="${messageBranch}">
                    <i class="bi bi-trash3"></i> Delete Chat
                </div>
            </div>
        `);
        
        $('body').append($dropdown);
        activeDropdown = $dropdown[0];
        
        $dropdown.find('.delete-item').on('click', async function(e) {
            e.stopPropagation();
            const msgId = parseInt($(this).data('msg-id'));
            const msgBranch = $(this).data('msg-branch');
            closeDropdown();
            
            if (msgBranch !== branchCode && branchCode !== 'ADMIN') {
                Swal.fire('Error', 'You do not have permission to delete this message', 'error');
                return;
            }
            
            const confirmResult = await Swal.fire({
                title: 'Delete Message?',
                text: 'This message will be permanently removed from the chat for everyone.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                confirmButtonText: 'Yes, delete it!',
                cancelButtonText: 'Cancel'
            });
            
            if (confirmResult.isConfirmed) {
                const success = await deleteMessageFromSheet(msgId);
                if (success) {
                    Swal.fire('Deleted!', 'Message has been deleted.', 'success', { toast: true, timer: 2000, showConfirmButton: false, position: 'top-end' });
                }
            }
        });
        
        setTimeout(() => {
            $(document).one('click', function() {
                closeDropdown();
            });
        }, 100);
    }
    
    // ======================== READ MESSAGES FROM SHEET ========================
    async function readMessagesFromSheet() {
        if (!branchCode) return [];
        try {
            const range = `${SHEET_NAME}!A:K`;
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}?key=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (!data.values || data.values.length <= 1) return [];
            
            const rows = data.values.slice(1);
            const allMessages = [];
            const newMessageIds = new Set();
            
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                if (row.length >= 1 && row[0]) {
                    const id = parseInt(row[0]);
                    if (!isNaN(id)) {
                        let messageText = row[2] || "";
                        let displayMessage = messageText;
                        const replyPrefixMatch = messageText.match(/^\[REPLY TO #\d+\]\s*/i);
                        if (replyPrefixMatch) {
                            displayMessage = messageText.substring(replyPrefixMatch[0].length);
                        }
                        const msg = {
                            id: id,
                            branchCode: (row[1] || "").toUpperCase(),
                            originalMessage: messageText,
                            message: displayMessage,
                            timestamp: row[3] || "",
                            replyToId: row[4] ? parseInt(row[4]) : 0,
                            replyMessage: row[5] || "",
                            status: row[6] || "Sent",
                            delivered: row[7] === "TRUE",
                            read: row[8] === "TRUE",
                            readBy: row[9] || "",
                            allMentionReadBy: row[10] || ""
                        };
                        allMessages.push(msg);
                        newMessageIds.add(msg.id);
                    }
                }
            }
            
            const hasNewMessages = [...newMessageIds].some(id => !lastMessageIds.has(id));
            if (hasNewMessages && messages.length > 0 && !isLoading) {
                const newMsgs = allMessages.filter(m => !lastMessageIds.has(m.id) && m.branchCode !== branchCode);
                for (let newMsg of newMsgs) {
                    const isMentioned = newMsg.message.toLowerCase().includes(`@${branchCode.toLowerCase()}`);
                    const isAllMention = newMsg.message.toLowerCase().includes('@all');
                    if (isMentioned || isAllMention) {
                        playNotificationSound();
                    }
                }
            }
            
            lastMessageIds = newMessageIds;
            allMessages.sort((a, b) => a.id - b.id);
            
            const relevantMessages = allMessages.filter(msg => {
                const isOwn = msg.branchCode === branchCode;
                const isReply = msg.replyToId > 0;
                const originalMsg = allMessages.find(m => m.id === msg.replyToId);
                const isReplyToMe = isReply && originalMsg && originalMsg.branchCode === branchCode;
                const isNewFromOther = !isOwn && msg.replyToId === 0 && msg.status !== "Replied";
                const isMentioned = !isOwn && msg.message.toLowerCase().includes(`@${branchCode.toLowerCase()}`);
                const isAllMention = !isOwn && msg.message.toLowerCase().includes('@all');
                const isAdmin = branchCode === 'ADMIN';
                return isOwn || isReplyToMe || isNewFromOther || isMentioned || isAllMention || isAdmin;
            });
            
            return relevantMessages.map(msg => ({
                ...msg,
                isOwnMessage: msg.branchCode === branchCode,
                canReply: (msg.branchCode !== branchCode && msg.replyToId === 0 && msg.status !== "Replied") || branchCode === 'ADMIN',
                isMention: !msg.isOwnMessage && msg.message.toLowerCase().includes(`@${branchCode.toLowerCase()}`),
                isAllMention: !msg.isOwnMessage && msg.message.toLowerCase().includes('@all'),
                hasSeenAllMention: msg.allMentionReadBy.includes(branchCode),
                isAdmin: msg.branchCode === 'ADMIN',
                messageStatus: getMessageStatus(msg)
            }));
            
        } catch (error) {
            console.error("Error reading messages:", error);
            return [];
        }
    }
    
    function getMessageStatus(message) {
        if (message.branchCode !== branchCode) return null;
        if (message.read && message.readBy) return { type: 'read', icon: 'bi-check2-all', color: '#34b7f1', text: 'Seen' };
        else if (message.delivered) return { type: 'delivered', icon: 'bi-check2-all', color: '#8696a0', text: 'Delivered' };
        else return { type: 'sent', icon: 'bi-check2', color: '#8696a0', text: 'Sent' };
    }
    
    // ======================== SEND MESSAGE ========================
    async function sendMessage(message, replyToId = null) {
        if (!message.trim()) return false;
        if (!branchCode) {
            Swal.fire('Error', 'Please set your branch code first', 'warning');
            return false;
        }
        const action = replyToId ? "REPLY_MESSAGE" : "SEND_MESSAGE";
        const payload = { action, branchCode, message: message.trim(), timestamp: new Date().toISOString() };
        if (replyToId) payload.replyToId = replyToId;
        
        const sendBtn = $('#sendBtn');
        sendBtn.prop('disabled', true).html('<i class="bi bi-hourglass-split"></i>');
        try {
            await fetch(APPS_SCRIPT_URL, { 
                method: "POST", 
                mode: "no-cors",
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify(payload) 
            });
            $('#messageInput').val('');
            cancelReply();
            await loadMessages();
            return true;
        } catch (error) {
            Swal.fire('Error', 'Unable to send message', 'error');
            return false;
        } finally {
            sendBtn.prop('disabled', false).html('<i class="bi bi-arrow-right"></i>');
        }
    }
    
    // ======================== RENDER MESSAGES ========================
    function formatDateTime(timestamp) {
        if (!timestamp) return 'Just now';
        const date = new Date(timestamp);
        const now = new Date();
        const diffMins = Math.floor((now - date) / 60000);
        if (diffMins < 1) return 'Just now';
        if (diffMins < 60) return `${diffMins} min ago`;
        const day = date.getDate().toString().padStart(2, '0');
        const month = (date.getMonth() + 1).toString().padStart(2, '0');
        let hours = date.getHours();
        const minutes = date.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        return `${day}/${month} ${hours}:${minutes} ${ampm}`;
    }
    
    function highlightMentions(text, currentBranch) {
        let highlighted = text.replace(/@ALL/gi, match => `<span class="all-mention-highlight">${match}</span>`);
        const mentionRegex = /@(BR\d{4}|ADMIN)/gi;
        highlighted = highlighted.replace(mentionRegex, (match, branch) => {
            if (branch.toUpperCase() === currentBranch) return `<span class="mention-highlight">${match}</span>`;
            return match;
        });
        return highlighted;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) { 
            return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; 
        });
    }
    
    function renderMessages() {
        const container = $('#chatMessages');
        if (!messages || messages.length === 0) {
            container.html(`<div class="text-center text-muted" style="padding: 50px;"><i class="bi bi-chat-square-text" style="font-size: 48px; color: #cbd5e1;"></i><h6 class="mt-3" style="color: #8696a0;">No messages yet</h6></div>`);
            return;
        }
        
        let html = '';
        messages.forEach(message => {
            const isOwn = message.isOwnMessage;
            const isAdmin = message.isAdmin;
            const formattedTime = formatDateTime(message.timestamp);
            const isReply = message.replyToId > 0;
            const messageStatus = message.messageStatus;
            const adminClass = isAdmin && !isOwn ? 'admin-message' : '';
            
            let originalMessageText = '';
            if (isReply) {
                const originalMsg = messages.find(m => m.id === message.replyToId);
                if (originalMsg) originalMessageText = originalMsg.message;
            }
            
            const highlightedMessage = highlightMentions(message.message, branchCode);
            const branchDisplay = message.branchCode === 'ADMIN' ? '<span class="admin-branch"><i class="bi bi-star-fill"></i> ADMIN</span>' : escapeHtml(message.branchCode);
            
            html += `
                <div class="message ${isOwn ? 'message-own' : 'message-other'} ${adminClass}" data-msg-id="${message.id}">
                    <div class="message-bubble">
                        <div class="message-branch">
                            <span><i class="bi bi-building"></i> ${branchDisplay}</span>
                            <div style="display: flex; align-items: center; gap: 6px;">
                                <span class="message-id">#${message.id}</span>
                                <button class="message-menu-btn" onclick="event.stopPropagation(); showMessageMenu(event, ${message.id}, '${escapeHtml(message.branchCode)}')">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                            </div>
                        </div>
                        ${isReply ? `<div class="reply-indicator"><i class="bi bi-reply-fill"></i> Reply to #${message.replyToId}: "${escapeHtml(originalMessageText.substring(0, 80))}"</div>` : ''}
                        <div class="message-text">${highlightedMessage}</div>
                        <div class="message-footer">
                            <span>${formattedTime}</span>
                            ${messageStatus ? `<span class="tick-mark tick-${messageStatus.type}"><i class="${messageStatus.icon}"></i> ${messageStatus.text}</span>` : ''}
                            ${!isOwn && message.canReply ? `<button class="reply-btn" onclick="startReply(${message.id}, '${escapeHtml(message.branchCode)}', '${escapeHtml(message.message.substring(0, 50))}')"><i class="bi bi-reply-fill"></i> Reply</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
        
        container.html(html);
        scrollToBottom();
    }
    
    function scrollToBottom() {
        const container = document.getElementById('chatMessages');
        if (container) container.scrollTop = container.scrollHeight;
    }
    
    // ======================== OTHER FUNCTIONS ========================
    async function loadMessages() {
        if (!branchCode || isLoading) return;
        isLoading = true;
        try {
            const newMessages = await readMessagesFromSheet();
            messages = newMessages;
            renderMessages();
            updateConnectionStatus(true);
            await getActiveBranches();
            if (!initialLoadDone) {
                $('#initialLoading').hide();
                initialLoadDone = true;
            }
        } catch (error) {
            updateConnectionStatus(false);
        } finally {
            isLoading = false;
        }
    }
    
    async function getActiveBranches() {
        try {
            const range = `ActiveBranches!A:C`;
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}?key=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();
            const now = new Date();
            const activeThreshold = 12000;
            if (data.values && data.values.length > 1) {
                activeBranches.clear();
                for (let i = 1; i < data.values.length; i++) {
                    const row = data.values[i];
                    if (row.length >= 2) {
                        const lastSeen = new Date(row[1]);
                        if (now - lastSeen < activeThreshold) activeBranches.set(row[0], { lastSeen });
                    }
                }
            }
            updateActiveUsersDisplay();
        } catch (error) {
            console.error("Error getting active branches:", error);
        }
    }
    
    function updateActiveUsersDisplay() {
        const activeList = $('#activeUsersList');
        let activeListArray = [];
        for (let branch of activeBranches.keys()) {
            if (branch !== branchCode) {
                const isAdmin = branch === 'ADMIN';
                activeListArray.push(`<span class="active-user ${isAdmin ? 'admin' : ''}"><span class="active-dot"></span>${escapeHtml(branch)}</span>`);
            }
        }
        $('#activeCount').text(activeListArray.length);
        activeList.html(activeListArray.join(' '));
    }
    
    function startReply(id, branch, preview) {
        replyingTo = id;
        $('#replyPreview').addClass('active');
        $('#replyToBranch').text(branch);
        $('#replyToMessage').text(preview);
        $('#messageInput').focus();
    }
    
    function cancelReply() { 
        replyingTo = null; 
        $('#replyPreview').removeClass('active'); 
    }
    
    function quickMention(branch) { 
        const cur = $('#messageInput').val(); 
        $('#messageInput').val(cur + (cur ? ' ' : '') + `@${branch} `).focus(); 
    }
    
    function updateConnectionStatus(isOnline) { 
        const status = $('#connectionStatus'); 
        status.html(isOnline ? '🟢 Online' : '🔴 Offline').css('background', isOnline ? '#25d366' : '#dc3545'); 
        $('#onlineStatusText').text(isOnline ? 'Online' : 'Offline');
        setTimeout(() => status.fadeOut(2000, function() { $(this).fadeIn(2000); }), 3000); 
    }
    
    function startAutoRefresh() {
        if (refreshTimer) clearInterval(refreshTimer);
        if (countdownInterval) clearInterval(countdownInterval);
        const intervalSeconds = currentRefreshInterval;
        let countdown = intervalSeconds;
        refreshTimer = setInterval(async () => { await loadMessages(); countdown = intervalSeconds; $('#countdownDisplay').text(`${countdown}s`); }, intervalSeconds * 1000);
        countdownInterval = setInterval(() => { countdown--; if (countdown >= 0) $('#countdownDisplay').text(`${countdown}s`); if (countdown <= 0) countdown = intervalSeconds; }, 1000);
        $('#countdownDisplay').text(`${countdown}s`);
    }
    
    function setupMentionDetection() {
        $('#messageInput').on('input', function() {
            const val = $(this).val();
            const lastWord = val.split(' ').pop();
            if (lastWord.startsWith('@')) {
                const term = lastWord.substring(1).toLowerCase();
                const allBranches = [...activeBranches.keys()];
                if (!allBranches.includes('ADMIN')) allBranches.push('ADMIN');
                const suggestions = ['All', ...allBranches].filter(b => b !== branchCode && b.toLowerCase().includes(term)).slice(0, 8);
                if (suggestions.length) {
                    const rect = $(this).get(0).getBoundingClientRect();
                    $('#mentionSuggestions').html(suggestions.map(s => `<div class="mention-suggestion-item" data-branch="${s}">@${s} ${s === 'ADMIN' ? '⭐' : s === 'All' ? '🌐' : ''}</div>`)).css({ display: 'block', position: 'fixed', top: Math.min(rect.bottom + 5, window.innerHeight - 150), left: rect.left });
                    $('.mention-suggestion-item').off('click').on('click', function() { const br = $(this).data('branch'); const txt = $('#messageInput').val(); $('#messageInput').val(txt.replace(/@\w*$/, `@${br} `)); $('#mentionSuggestions').hide(); $('#messageInput').focus(); });
                } else $('#mentionSuggestions').hide();
            } else $('#mentionSuggestions').hide();
        });
        $(document).on('click', function(e) { if (!$(e.target).closest('#mentionSuggestions').length) $('#mentionSuggestions').hide(); });
    }
    
    async function updateHeartbeat() {
        if (!branchCode) return;
        try {
            await fetch(APPS_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    action: "HEARTBEAT",
                    branchCode: branchCode,
                    timestamp: new Date().toISOString(),
                    isActive: isWindowActive
                })
            });
        } catch (error) {
            console.error("Heartbeat error:", error);
        }
    }
    
    function startHeartbeat() {
        if (heartbeatTimer) clearInterval(heartbeatTimer);
        updateHeartbeat();
        heartbeatTimer = setInterval(() => updateHeartbeat(), 5000);
    }
    
    function setupWindowFocusTracking() {
        window.addEventListener('focus', () => {
            isWindowActive = true;
            updateHeartbeat();
            loadMessages();
        });
        window.addEventListener('blur', () => {
            isWindowActive = false;
            updateHeartbeat();
        });
        document.addEventListener('visibilitychange', () => {
            isWindowActive = !document.hidden;
            if (isWindowActive) loadMessages();
        });
    }
    
    async function init() {
        initNotificationSound();
        if (Notification.permission === "default") Notification.requestPermission();
        
        const savedInterval = localStorage.getItem('refreshInterval');
        if (savedInterval) { 
            currentRefreshInterval = parseInt(savedInterval); 
            $('#refreshIntervalInput').val(currentRefreshInterval); 
        }
        
        // Initialize branch using the same logic as power status HTML
        const branchFound = initializeBranch();
        
        if (branchFound) {
            // Branch exists, load messages
            await loadMessages();
        } else {
            // No branch found, show waiting message
            $('#chatMessages').html(`
                <div class="no-branch-container">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <h4>No Branch Detected</h4>
                    <p>Unable to detect your branch. Please login through the main application.</p>
                    <button class="btn btn-primary-custom" onclick="location.reload()">
                        <i class="bi bi-arrow-repeat"></i> Retry
                    </button>
                </div>
            `);
            $('#initialLoading').hide();
            initialLoadDone = true;
        }
        
        $('#refreshIntervalInput').on('change', function() { 
            const newVal = parseInt($(this).val()); 
            if (!isNaN(newVal) && newVal>=1 && newVal<=59) { 
                currentRefreshInterval = newVal; 
                localStorage.setItem('refreshInterval', currentRefreshInterval); 
                startAutoRefresh(); 
            } 
        });
        
        startAutoRefresh();
        startHeartbeat();
        setupMentionDetection();
        setupWindowFocusTracking();
        
        $('#sendBtn').on('click', async () => { 
            const msg = $('#messageInput').val(); 
            if (replyingTo) await sendMessage(msg, replyingTo); 
            else await sendMessage(msg); 
        });
        
        $('#messageInput').on('keypress', function(e) { 
            if (e.which === 13 && !e.shiftKey) { 
                e.preventDefault(); 
                $('#sendBtn').click(); 
            } 
        });
        
        $('#toggleToneBtn').on('click', function() { 
            soundEnabled = !soundEnabled; 
            $(this).html(soundEnabled ? '<i class="bi bi-volume-up-fill"></i>' : '<i class="bi bi-volume-mute-fill"></i>'); 
            localStorage.setItem('soundEnabled', soundEnabled); 
            Swal.fire('Notification', soundEnabled ? 'Sound enabled' : 'Sound disabled', 'info', { toast: true, timer: 1500 }); 
        });
        
        const savedSound = localStorage.getItem('soundEnabled'); 
        if (savedSound !== null) { 
            soundEnabled = savedSound === 'true'; 
            $('#toggleToneBtn').html(soundEnabled ? '<i class="bi bi-volume-up-fill"></i>' : '<i class="bi bi-volume-mute-fill"></i>'); 
        }
        
        window.addEventListener('click', () => closeDropdown());
    }
    
    // Make functions globally accessible
    window.showMessageMenu = showMessageMenu;
    window.startReply = startReply;
    window.cancelReply = cancelReply;
    window.quickMention = quickMention;
    
    $(document).ready(init);
</script>
</body>
