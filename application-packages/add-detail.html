<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Application Installer - Upload & Register</title>
    
    <!-- LOCAL CSS -->
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/sweetalert2.min.css">
    
    <style>
        :root {
            --primary: #0f5b9c;
            --primary-dark: #1a4b7a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
            --border: #e9ecef;
        }
        
        * { box-sizing: border-box; }
        body {
            background: #eef2f7;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
        }
        .form-container {
            max-width: 100%;
            margin: 0 auto;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px -8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
       
        .page-header h2 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 600;
        }
        .page-header p {
            margin: 5px 0 0;
            opacity: 0.8;
            font-size: 0.8rem;
        }
        .form-body {
            padding: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
            display: block;
        }
        .form-label i {
            color: var(--primary);
            margin-right: 5px;
        }
        .form-control, .form-select {
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            padding: 10px 15px;
            width: 100%;
            transition: all 0.2s;
        }
        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15, 91, 156, 0.1);
        }
        .file-upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        .file-upload-area:hover {
            border-color: var(--primary);
            background: #f0f7ff;
        }
        .file-upload-area.dragover {
            border-color: var(--success);
            background: #f0fdf4;
        }
        .file-info {
            margin-top: 15px;
            padding: 10px;
            background: #e8f0fe;
            border-radius: 12px;
            display: none;
        }
        .file-info.show {
            display: block;
        }
        .upload-progress {
            margin-top: 15px;
            display: none;
        }
        .upload-progress.show {
            display: block;
        }
        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            width: 0%;
            transition: width 0.3s;
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(15, 91, 156, 0.3);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .download-link-result {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            display: none;
            word-break: break-all;
        }
        .download-link-result.show {
            display: block;
        }
        .result-link {
            color: var(--primary);
            text-decoration: none;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .result-link:hover {
            text-decoration: underline;
        }
        .required-field::after {
            content: "*";
            color: var(--danger);
            margin-left: 4px;
        }
        .user-info {
            background: #e8f0fe;
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn-signout {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .btn-signout:hover {
            background: var(--primary);
            color: white;
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .form-body { padding: 20px; }
        }
.page-header {
    padding: 15px 2px !important;
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
    flex-wrap: wrap !important;
    justify-content: space-between !important;
   
}
.page-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.page-header-left i {
    font-size: 1.8rem !important;
    background: rgb(56 143 251 / 15%) !important;
    padding: 10px !important;
    border-radius: 12px !important;
    color: #184f83 !important;
}


.page-header-left h1 {
    margin: 0 !important;
    font-size: 1.8rem !important;
    font-weight: 700 !important;
    color: #184f83!important;
}

    </style>
</head>
<body>


    <div class="form-container">
          <div class="page-header">
                <div class="page-header-left">
                   <i class="bi bi-cloud-upload"></i>
                    <div>
                        <h1>Application Installer - Upload & Register</h1>
                        <p>Upload installer files to Google Drive and register them in the repository</span></p>
                    </div>
                </div>
            </div>

        <div class="form-card">
           
            <div class="form-body">
                <!-- User Info Section -->
                <div id="userInfo" class="user-info" style="display: none;">
                    <span><i class="bi bi-person-circle"></i> Signed in as: <strong id="userEmail"></strong></span>
                    <button type="button" id="signOutBtn" class="btn-signout"><i class="bi bi-box-arrow-right"></i> Sign Out</button>
                </div>
                
                <form id="uploadForm">
                    <!-- File Upload Section -->
                    <div class="form-group">
                        <label class="form-label"><i class="bi bi-file-earmark-zip"></i> Installer File <span class="required-field"></span></label>
                        <div id="fileDropArea" class="file-upload-area">
                            <i class="bi bi-cloud-arrow-up" style="font-size: 2rem; color: var(--primary);"></i>
                            <p style="margin: 10px 0 5px;">Click or drag & drop your file here</p>
                            <small class="text-muted">Any file type accepted (EXE, MSI, ZIP, PDF, etc.)</small>
                            <input type="file" id="fileInput" style="display: none;" accept="*/*">
                        </div>
                        <div id="fileInfo" class="file-info">
                            <i class="bi bi-file-earmark-check"></i> Selected: <strong id="fileName"></strong> - <span id="fileSize"></span>
                        </div>
                        <div id="uploadProgress" class="upload-progress">
                            <div class="progress-bar">
                                <div id="progressFill" class="progress-fill"></div>
                            </div>
                            <small id="progressText" class="text-muted">Uploading...</small>
                        </div>
                    </div>
                    
                    <!-- Package Details -->
                    <div class="form-group">
                        <label class="form-label"><i class="bi bi-box"></i> Name Of Package <span class="required-field"></span></label>
                        <input type="text" id="packageName" class="form-control" placeholder="e.g., Java, AnyDesk, NICDSign" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label"><i class="bi bi-device-desktop"></i> Operating System <span class="required-field"></span></label>
                                <select id="os" class="form-select" required>
                                    <option value="">Select OS</option>
                                    <option value="Windows">Windows</option>
                                    <option value="Linux/Ubuntu">Linux / Ubuntu</option>
                                    <option value="Common">Common / Cross Platform</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label"><i class="bi bi-tag"></i> Version</label>
                                <input type="text" id="version" class="form-control" placeholder="e.g., v8.0.2, 1.8.0_401">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label"><i class="bi bi-link-45deg"></i> Source URL</label>
                        <input type="url" id="sourceUrl" class="form-control" placeholder="https://official-website.com/download">
                    </div>
                    
                    <!-- Generated Download Link -->
                    <div id="downloadLinkResult" class="download-link-result">
                        <i class="bi bi-link"></i> <strong>Download Link (Auto-generated):</strong><br>
                        <a href="#" id="generatedLink" class="result-link" target="_blank"></a>
                        <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="copyToClipboard()" style="padding: 4px 12px; font-size: 0.75rem;">
                            <i class="bi bi-clipboard"></i> Copy Link
                        </button>
                    </div>
                    
                    <!-- Submit Button -->
                    <button type="submit" class="btn-submit" id="submitBtn" disabled>
                        <i class="bi bi-check-circle"></i> Submit to Repository
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <!-- SCRIPTS -->
    <script src="../js/jquery.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/sweetalert2.all.min.js"></script>
    
    <script>
        // ======================== CONFIGURATION ========================
        const DRIVE_FOLDER_ID = "181Idk62hrdSzWc-XahVsCn4id38pSmAB";
        const SHEET_ID = "1vabPhjx_Nr4jbuhz1lW4Ksh5DLR-v4BR6dIrkY5Ceck";
        const SHEET_NAME = "List";
        const API_KEY = "AIzaSyBB1V3vJpNZ9X1GIF-YOwoa6YSt_iXMLo0";
        const CLIENT_ID = "963882785112-6q00su3e28lalgj1b7qlk4p7lcctva9q.apps.googleusercontent.com";
        
        let accessToken = null;
        let selectedFile = null;
        let uploadedFileId = null;
        let directDownloadLink = null;
        let currentUser = null;
        
        // ======================== GOOGLE AUTHENTICATION ========================
        function initGoogleAuth() {
            gapi.load('client:auth2', () => {
                gapi.client.init({
                    apiKey: API_KEY,
                    clientId: CLIENT_ID,
                    discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
                    scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets'
                }).then(() => {
                    console.log('Google API initialized');
                    
                    // Check if user is already signed in
                    const authInstance = gapi.auth2.getAuthInstance();
                    const isSignedIn = authInstance.isSignedIn.get();
                    if (isSignedIn) {
                        updateUserInfo(authInstance.currentUser.get());
                    }
                    
                    // Listen for sign-in state changes
                    authInstance.isSignedIn.listen(isSignedIn => {
                        if (isSignedIn) {
                            updateUserInfo(authInstance.currentUser.get());
                        } else {
                            $('#userInfo').hide();
                            currentUser = null;
                            accessToken = null;
                        }
                    });
                    
                }).catch(error => {
                    console.error('Error initializing Google API:', error);
                    Swal.fire({
                        icon: 'error',
                        title: 'Configuration Error',
                        text: 'Please check your API Key and Client ID configuration.',
                        confirmButtonColor: '#0f5b9c'
                    });
                });
            });
        }
        
        function updateUserInfo(user) {
            const profile = user.getBasicProfile();
            currentUser = user;
            accessToken = user.getAuthResponse().access_token;
            $('#userEmail').text(profile.getEmail());
            $('#userInfo').show();
        }
        
        async function ensureAuthenticated() {
            if (!gapi.auth2) {
                Swal.fire({ icon: 'error', title: 'Not Ready', text: 'Please wait for Google API to load', confirmButtonColor: '#0f5b9c' });
                return false;
            }
            
            const authInstance = gapi.auth2.getAuthInstance();
            const isSignedIn = authInstance.isSignedIn.get();
            
            if (isSignedIn && accessToken) {
                return true;
            }
            
            try {
                await authInstance.signIn();
                const user = authInstance.currentUser.get();
                accessToken = user.getAuthResponse().access_token;
                updateUserInfo(user);
                return true;
            } catch (error) {
                console.error('Sign-in error:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Sign In Required',
                    text: 'Please sign in with your Google account to upload files.',
                    confirmButtonColor: '#0f5b9c'
                });
                return false;
            }
        }
        
        $('#signOutBtn').on('click', () => {
            if (gapi.auth2) {
                const authInstance = gapi.auth2.getAuthInstance();
                authInstance.signOut().then(() => {
                    $('#userInfo').hide();
                    currentUser = null;
                    accessToken = null;
                    Swal.fire({ icon: 'success', title: 'Signed Out', text: 'You have been signed out', toast: true, timer: 2000 });
                });
            }
        });
        
        // ======================== UPLOAD FILE TO GOOGLE DRIVE ========================
        async function uploadToDrive() {
            if (!selectedFile) return false;
            
            // Ensure user is authenticated
            const isAuth = await ensureAuthenticated();
            if (!isAuth) return false;
            
            const formData = new FormData();
            formData.append('metadata', new Blob([JSON.stringify({
                name: selectedFile.name,
                parents: [DRIVE_FOLDER_ID]
            })], { type: 'application/json' }));
            formData.append('file', selectedFile);
            
            $('#uploadProgress').addClass('show');
            $('#progressFill').css('width', '0%');
            $('#progressText').text('Uploading... 0%');
            
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart');
                xhr.setRequestHeader('Authorization', `Bearer ${accessToken}`);
                
                xhr.upload.onprogress = (event) => {
                    if (event.lengthComputable) {
                        const percent = Math.round((event.loaded / event.total) * 100);
                        $('#progressFill').css('width', `${percent}%`);
                        $('#progressText').text(`Uploading... ${percent}%`);
                    }
                };
                
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        uploadedFileId = response.id;
                        directDownloadLink = `https://drive.google.com/uc?export=download&id=${uploadedFileId}`;
                        
                        $('#progressFill').css('width', '100%');
                        $('#progressText').text('Upload complete!');
                        
                        setTimeout(() => {
                            $('#uploadProgress').removeClass('show');
                        }, 1500);
                        
                        $('#generatedLink').attr('href', directDownloadLink).text(directDownloadLink);
                        $('#downloadLinkResult').addClass('show');
                        
                        resolve(true);
                    } else {
                        const error = JSON.parse(xhr.responseText);
                        console.error('Upload failed:', error);
                        reject(new Error(error.error?.message || 'Upload failed'));
                    }
                };
                
                xhr.onerror = () => reject(new Error('Network error'));
                xhr.send(formData);
            });
        }
        
        // ======================== SUBMIT TO GOOGLE SHEET ========================
        async function submitToSheet(formData) {
            const isAuth = await ensureAuthenticated();
            if (!isAuth) return false;
            
            const sheetUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A:G:append?valueInputOption=USER_ENTERED`;
            
            const values = [[
                formData.packageName,
                formData.os,
                formData.version,
                new Date().toISOString().split('T')[0],
                formData.sourceUrl,
                formData.downloadLink,
                "Yes"
            ]];
            
            try {
                const response = await fetch(sheetUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ values: values })
                });
                
                if (response.ok) {
                    return true;
                } else {
                    const error = await response.json();
                    console.error('Sheet API error:', error);
                    
                    // If sheet access error, try to share sheet with user
                    if (error.error?.status === 'PERMISSION_DENIED') {
                        Swal.fire({
                            icon: 'warning',
                            title: 'Sheet Access Required',
                            text: 'Please share the Google Sheet with your email as Editor.',
                            confirmButtonColor: '#0f5b9c'
                        });
                    }
                    return false;
                }
            } catch (error) {
                console.error('Error submitting to sheet:', error);
                return false;
            }
        }
        
        // ======================== FORM HANDLING ========================
        $('#fileDropArea').on('click', () => $('#fileInput').click());
        
        $('#fileInput').on('change', (e) => {
            if (e.target.files[0]) handleFileSelect(e.target.files[0]);
        });
        
        $('#fileDropArea').on('dragover', (e) => {
            e.preventDefault();
            $('#fileDropArea').addClass('dragover');
        });
        
        $('#fileDropArea').on('dragleave', (e) => {
            e.preventDefault();
            $('#fileDropArea').removeClass('dragover');
        });
        
        $('#fileDropArea').on('drop', (e) => {
            e.preventDefault();
            $('#fileDropArea').removeClass('dragover');
            if (e.originalEvent.dataTransfer.files[0]) {
                handleFileSelect(e.originalEvent.dataTransfer.files[0]);
            }
        });
        
        function handleFileSelect(file) {
            selectedFile = file;
            $('#fileName').text(file.name);
            $('#fileSize').text((file.size / 1024 / 1024).toFixed(2) + ' MB');
            $('#fileInfo').addClass('show');
            $('#downloadLinkResult').removeClass('show');
            uploadedFileId = null;
            directDownloadLink = null;
            $('#submitBtn').prop('disabled', false);
        }
        
        $('#uploadForm').on('submit', async (e) => {
            e.preventDefault();
            
            const packageName = $('#packageName').val().trim();
            const os = $('#os').val();
            const version = $('#version').val().trim();
            const sourceUrl = $('#sourceUrl').val().trim();
            
            if (!packageName) {
                Swal.fire({ icon: 'warning', title: 'Missing Field', text: 'Please enter Package Name', confirmButtonColor: '#0f5b9c' });
                return;
            }
            if (!os) {
                Swal.fire({ icon: 'warning', title: 'Missing Field', text: 'Please select Operating System', confirmButtonColor: '#0f5b9c' });
                return;
            }
            if (!selectedFile) {
                Swal.fire({ icon: 'warning', title: 'No File', text: 'Please select a file to upload', confirmButtonColor: '#0f5b9c' });
                return;
            }
            
            $('#submitBtn').prop('disabled', true).html('<i class="bi bi-hourglass-split"></i> Uploading...');
            
            try {
                const uploadSuccess = await uploadToDrive();
                if (!uploadSuccess || !directDownloadLink) throw new Error('File upload failed');
                
                const sheetSuccess = await submitToSheet({
                    packageName, os, version, sourceUrl, downloadLink: directDownloadLink
                });
                
                if (sheetSuccess) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Success!',
                        html: `<strong>${packageName}</strong> has been added.<br><a href="${directDownloadLink}" target="_blank">View Download Link</a>`,
                        confirmButtonColor: '#0f5b9c'
                    });
                    
                    $('#uploadForm')[0].reset();
                    $('#fileInfo').removeClass('show');
                    $('#downloadLinkResult').removeClass('show');
                    selectedFile = null;
                    uploadedFileId = null;
                    directDownloadLink = null;
                } else {
                    throw new Error('Sheet submission failed');
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Submission Failed', text: error.message, confirmButtonColor: '#0f5b9c' });
            } finally {
                $('#submitBtn').prop('disabled', false).html('<i class="bi bi-check-circle"></i> Submit to Repository');
            }
        });
        
        function copyToClipboard() {
            const link = $('#generatedLink').attr('href');
            if (link) {
                navigator.clipboard.writeText(link);
                Swal.fire({ icon: 'success', title: 'Copied!', toast: true, timer: 2000, showConfirmButton: false });
            }
        }
        
        function loadGoogleAPI() {
            const script = document.createElement('script');
            script.src = 'https://apis.google.com/js/api.js';
            script.onload = () => gapi.load('client:auth2', initGoogleAuth);
            document.head.appendChild(script);
        }
        
        $(document).ready(() => loadGoogleAPI());
    </script>
</body>
</html>
