<script>
    // ================= CONFIGURATION =================
    const SPREADSHEET_ID = "1MpftwfNIe82kORjP6xeLo1qUh3v6Cr8HHo0oSW2grYA";
    const MOVEMENT_SHEET = "Movement_Data";
    const API_KEY = "AIzaSyDc8tegwi2rgHyDFYm7uWBqVqQ7Fwb3uWM";
    
    let allRecords = [];
    let devicesList = [];
    let currentDeviceSerial = null;
    
    // Helper functions
    function parseDMYToDate(dateStr) {
        if(!dateStr) return null;
        const trimmed = String(dateStr).trim();
        if(trimmed === "" || trimmed.toUpperCase() === "N/A" || trimmed === "NA") return null;
        let parts = trimmed.split('/');
        if(parts.length === 3) {
            let day = parseInt(parts[0],10);
            let month = parseInt(parts[1],10)-1;
            let year = parseInt(parts[2],10);
            if(!isNaN(day) && !isNaN(month) && !isNaN(year) && day >= 1 && day <= 31 && month >= 0 && month <= 11) {
                return new Date(year, month, day);
            }
        }
        return null;
    }
    
    function isDateValid(dateStr) {
        if(!dateStr) return false;
        const trimmed = String(dateStr).trim();
        if(trimmed === "" || trimmed.toUpperCase() === "N/A" || trimmed === "NA") return false;
        const parts = trimmed.split('/');
        if(parts.length === 3) {
            const day = parseInt(parts[0],10);
            const month = parseInt(parts[1],10);
            const year = parseInt(parts[2],10);
            if(!isNaN(day) && !isNaN(month) && !isNaN(year) && day >= 1 && day <= 31 && month >= 1 && month <= 12) {
                return true;
            }
        }
        return false;
    }
    
    function isTextFieldValid(value) {
        if(!value) return false;
        const trimmed = String(value).trim();
        return trimmed !== "" && trimmed !== "N/A" && trimmed !== "NA" && trimmed !== "-";
    }
    
    // Fetch ALL records 
    async function fetchAllRecords() {
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(MOVEMENT_SHEET)}!A:O?key=${API_KEY}`;
            const resp = await fetch(url);
            const data = await resp.json();
            const rows = data.values || [];
            const records = [];
            for(let i=1; i<rows.length; i++) {
                const row = rows[i];
                if(row && row[0]) {
                    records.push({
                        id: i,
                        refId: row[0] || "",
                        treasury: row[1] || "",
                        serialNo: row[2] ? String(row[2]).trim() : "",
                        deviceType: row[3] || "",
                        fromBranch: row[4] || "",
                        complaintRemarks: row[5] || "",
                        complaintDate: row[6] || "",
                        sentToAddress: row[7] || "",
                        sentDate: row[8] || "",
                        receivedDate: row[9] || "",
                        moveToOem: row[10] || "",
                        returnFromOem: row[11] || "",
                        toBranch: row[12] || "",
                        transferDate: row[13] || "",
                        remarks: row[14] || ""
                    });
                }
            }
            allRecords = records;
            return records;
        } catch(e) { console.error(e); return []; }
    }
    
    // Extract unique device serial numbers
    function extractDevices() {
        const uniqueSerials = new Set();
        allRecords.forEach(record => {
            if(record.serialNo && record.serialNo !== "NaN" && record.serialNo !== "" && record.serialNo !== "null") {
                uniqueSerials.add(record.serialNo);
            }
        });
        devicesList = Array.from(uniqueSerials).sort();
        return devicesList;
    }
    
    // Populate device dropdown with proper Select2 initialization
    function populateDeviceDropdown() {
        const $select = $('#deviceSelect');
        $select.empty();
        $select.append('<option value="">-- Select Device Serial Number --</option>');
        devicesList.forEach(device => {
            $select.append(`<option value="${escapeHtml(device)}">${escapeHtml(device)}</option>`);
        });
        
        // Destroy existing Select2 if any
        if ($select.hasClass('select2-hidden-accessible')) {
            $select.select2('destroy');
        }
        
        // Initialize Select2 with proper settings
        $select.select2({
            theme: 'bootstrap-5',
            width: '100%',
            placeholder: 'Search or select device...',
            allowClear: true,
            dropdownParent: $('body')
        });
        
        // Fix dropdown alignment issues
        setTimeout(function() {
            $('.select2-container--bootstrap-5').css('width', '100%');
        }, 100);
    }
    
    // Get ALL records for a specific device (multiple rows)
    function getAllDeviceRecords(serialNo) {
        return allRecords.filter(record => record.serialNo === serialNo);
    }
    
    // Build comprehensive timeline from ALL rows of the device
    function buildFullTimelineEvents(deviceRecords) {
        if(!deviceRecords || deviceRecords.length === 0) return [];
        
        const allEvents = [];
        
        // Process each record/row for this device
        deviceRecords.forEach((record, idx) => {
            // Complaint Initiated
            if(isDateValid(record.complaintDate)) {
                allEvents.push({
                    date: record.complaintDate,
                    title: `📞 Complaint Initiated ${deviceRecords.length > 1 ? `(Record ${idx+1})` : ''}`,
                    description: `Complaint registered. Remarks: ${record.complaintRemarks || 'N/A'}. Treasury: ${record.treasury || 'N/A'}`,
                    icon: "bi bi-chat-dots-fill",
                    type: "info",
                    location: record.fromBranch || "Branch",
                    recordId: idx
                });
            }
            
            // Sent from Branch
            if(isDateValid(record.sentDate)) {
                let destination = isTextFieldValid(record.sentToAddress) ? record.sentToAddress : "Destination";
                allEvents.push({
                    date: record.sentDate,
                    title: `📤 Device Dispatched ${deviceRecords.length > 1 ? `(Record ${idx+1})` : ''}`,
                    description: `Device dispatched from ${record.fromBranch || 'Branch'} to ${destination}.`,
                    icon: "bi bi-send-fill",
                    type: "inprogress",
                    location: record.fromBranch,
                    recordId: idx
                });
            }
            
            // Received at Destination
            if(isDateValid(record.receivedDate)) {
                allEvents.push({
                    date: record.receivedDate,
                    title: `📥 Device Received ${deviceRecords.length > 1 ? `(Record ${idx+1})` : ''}`,
                    description: `Device received at destination.`,
                    icon: "bi bi-inbox-fill",
                    type: "completed",
                    location: "Destination",
                    recordId: idx
                });
            }
            
            // Submitted to OEM
            if(isDateValid(record.moveToOem)) {
                allEvents.push({
                    date: record.moveToOem,
                    title: `🔧 Submitted to OEM ${deviceRecords.length > 1 ? `(Record ${idx+1})` : ''}`,
                    description: `Device sent to OEM for repair/maintenance.`,
                    icon: "bi bi-gear-fill",
                    type: "inprogress",
                    location: "OEM",
                    recordId: idx
                });
            }
            
            // Returned from OEM
            if(isDateValid(record.returnFromOem)) {
                allEvents.push({
                    date: record.returnFromOem,
                    title: `✅ Returned from OEM ${deviceRecords.length > 1 ? `(Record ${idx+1})` : ''}`,
                    description: `Device returned from OEM after repair.`,
                    icon: "bi bi-arrow-return-left",
                    type: "completed",
                    location: "OEM",
                    recordId: idx
                });
            }
            
            // Transferred to another branch
            if(isDateValid(record.transferDate) && isTextFieldValid(record.toBranch)) {
                allEvents.push({
                    date: record.transferDate,
                    title: `🔄 Transferred to Branch ${deviceRecords.length > 1 ? `(Record ${idx+1})` : ''}`,
                    description: `Device transferred to ${record.toBranch} branch.`,
                    icon: "bi bi-diagram-3-fill",
                    type: "completed",
                    location: record.toBranch,
                    recordId: idx
                });
            }
        });
        
        // Sort all events by date
        allEvents.sort((a, b) => {
            const da = parseDMYToDate(a.date);
            const db = parseDMYToDate(b.date);
            if(da && db) return da - db;
            if(da) return -1;
            return 1;
        });
        
        // Remove duplicate consecutive events with same date and type (optional cleanup)
        const uniqueEvents = [];
        for(let i = 0; i < allEvents.length; i++) {
            if(i === 0) {
                uniqueEvents.push(allEvents[i]);
            } else {
                const prev = allEvents[i-1];
                const curr = allEvents[i];
                if(prev.date !== curr.date || prev.title !== curr.title) {
                    uniqueEvents.push(curr);
                }
            }
        }
        
        return uniqueEvents;
    }
    
    // Get consolidated device stats from all records
    function getConsolidatedDeviceStats(deviceRecords) {
        if(!deviceRecords || deviceRecords.length === 0) return null;
        
        // Use first record for basic info
        const firstRecord = deviceRecords[0];
        
        // Find latest status across all records
        let lastStatus = "Initiated";
        let latestDate = null;
        
        deviceRecords.forEach(record => {
            if(isDateValid(record.transferDate)) {
                const d = parseDMYToDate(record.transferDate);
                if(!latestDate || d > latestDate) { latestDate = d; lastStatus = "Processed"; }
            }
            else if(isDateValid(record.returnFromOem)) {
                const d = parseDMYToDate(record.returnFromOem);
                if(!latestDate || d > latestDate) { latestDate = d; lastStatus = "In Stock"; }
            }
            else if(isDateValid(record.moveToOem)) {
                const d = parseDMYToDate(record.moveToOem);
                if(!latestDate || d > latestDate) { latestDate = d; lastStatus = "Submitted to OEM"; }
            }
            else if(isDateValid(record.receivedDate)) {
                const d = parseDMYToDate(record.receivedDate);
                if(!latestDate || d > latestDate) { latestDate = d; lastStatus = "Received"; }
            }
            else if(isDateValid(record.sentDate)) {
                const d = parseDMYToDate(record.sentDate);
                if(!latestDate || d > latestDate) { latestDate = d; lastStatus = "On Transit"; }
            }
            else if(isDateValid(record.complaintDate)) {
                const d = parseDMYToDate(record.complaintDate);
                if(!latestDate || d > latestDate) { latestDate = d; lastStatus = "Initiated"; }
            }
        });
        
        return {
            serialNo: firstRecord.serialNo,
            deviceType: firstRecord.deviceType,
            treasury: firstRecord.treasury,
            fromBranch: firstRecord.fromBranch,
            complaintDate: firstRecord.complaintDate,
            lastStatus: lastStatus,
            totalRecords: deviceRecords.length,
            hasTransfer: deviceRecords.some(r => isDateValid(r.transferDate)),
            hasOemReturn: deviceRecords.some(r => isDateValid(r.returnFromOem)),
            hasOemMove: deviceRecords.some(r => isDateValid(r.moveToOem))
        };
    }
    
    // Calculate connector height dynamically
    function updateConnectorHeights() {
        $('.timeline-item').each(function() {
            const $item = $(this);
            const $content = $item.find('.timeline-content');
            const contentHeight = $content.outerHeight();
            const $connector = $item.find('.timeline-connector');
            if($connector.length && contentHeight > 50) {
                $connector.css('height', contentHeight + 15);
            }
        });
    }
    
    // Render timeline
    function renderTimeline(deviceRecords) {
        const events = buildFullTimelineEvents(deviceRecords);
        const container = document.getElementById('timelineContainer');
        
        if(events.length === 0) {
            container.innerHTML = `
                <div class="empty-timeline">
                    <i class="bi bi-hourglass-split"></i>
                    <h5>No Movement Data Available</h5>
                    <p>This device has no recorded movement events in any sheet row.</p>
                </div>
            `;
            return;
        }
        
        let timelineHtml = '';
        events.forEach((event, index) => {
            const isLast = index === events.length - 1;
            let iconClass = '';
            if(event.type === 'completed') iconClass = 'completed';
            else if(event.type === 'inprogress') iconClass = 'inprogress';
            else iconClass = 'info';
            
            let badgeClass = '';
            let badgeText = '';
            if(event.type === 'completed') { badgeClass = 'bg-success'; badgeText = 'Completed'; }
            else if(event.type === 'inprogress') { badgeClass = 'bg-warning'; badgeText = 'In Progress'; }
            else { badgeClass = 'bg-info'; badgeText = 'Information'; }
            
            timelineHtml += `
                <div class="timeline-item">
                    <div class="timeline-icon ${iconClass}">
                        <i class="${event.icon}"></i>
                    </div>
                    <div class="timeline-content">
                        <div class="timeline-date">
                            <i class="bi bi-calendar3"></i> ${event.date}
                            <span class="timeline-badge ${badgeClass}">${badgeText}</span>
                        </div>
                        <div class="timeline-title">${escapeHtml(event.title)}</div>
                        <div class="timeline-desc">${escapeHtml(event.description)}</div>
                        ${event.location ? `<div class="timeline-desc mt-2"><i class="bi bi-geo-alt"></i> <strong>Location:</strong> ${escapeHtml(event.location)}</div>` : ''}
                    </div>
                    ${!isLast ? '<div class="timeline-connector"></div>' : ''}
                </div>
            `;
        });
        
        container.innerHTML = timelineHtml;
        
        // Adjust connector heights after render
        setTimeout(updateConnectorHeights, 100);
    }
    
    // Render device info
    function renderDeviceInfo(deviceRecords) {
        const stats = getConsolidatedDeviceStats(deviceRecords);
        if(!stats) return;
        
        const statsGrid = document.getElementById('statsGrid');
        statsGrid.innerHTML = `
            <div class="stat-item"><i class="bi bi-upc-scan"></i> S/N: ${escapeHtml(stats.serialNo)}</div>
            <div class="stat-item"><i class="bi bi-device-ssd"></i> Type: ${escapeHtml(stats.deviceType || 'N/A')}</div>
            <div class="stat-item"><i class="bi bi-building"></i> Treasury: ${escapeHtml(stats.treasury || 'N/A')}</div>
            <div class="stat-item"><i class="bi bi-shop"></i> From: ${escapeHtml(stats.fromBranch || 'N/A')}</div>
            <div class="stat-item"><i class="bi bi-layers"></i> Records Found: <strong>${stats.totalRecords}</strong></div>
            <div class="stat-item"><i class="bi bi-flag"></i> Status: <strong>${stats.lastStatus}</strong></div>
        `;
        
        const infoCard = document.getElementById('deviceInfoCard');
        let movementSummary = [];
        if(stats.hasTransfer) movementSummary.push("Transferred");
        if(stats.hasOemReturn) movementSummary.push("OEM Returned");
        if(stats.hasOemMove) movementSummary.push("OEM Sent");
        
        infoCard.innerHTML = `
            <div>
                <h3><i class="bi bi-pc-display"></i> ${escapeHtml(stats.serialNo)}</h3>
                <div class="mt-1">${escapeHtml(stats.deviceType || 'Device')} | Treasury: ${escapeHtml(stats.treasury || 'N/A')}</div>
                <div class="mt-1 small"><i class="bi bi-database"></i> Found in ${stats.totalRecords} record(s).</div>
            </div>
            <div>
                <span class="device-badge"><i class="bi bi-diagram-3"></i> ${movementSummary.length > 0 ? movementSummary.join(' • ') : 'No Movements'}</span>
                <span class="device-badge ms-2"><i class="bi bi-clock"></i> Last: ${stats.lastStatus}</span>
            </div>
        `;
    }
    
    // Main tracking function - scans ALL rows for the device
    async function trackDevice() {
        const selectedSerial = $('#deviceSelect').val();
        if(!selectedSerial || selectedSerial === "") {
            Swal.fire({
                icon: 'warning',
                title: 'No Device Selected',
                text: 'Please select a device serial number from the dropdown.',
                confirmButtonColor: '#0f5b9c'
            });
            return;
        }
        
        showLoading("Scanning all sheet records for this device...");
        
        // Get ALL records for this device (multiple rows)
        const deviceRecords = getAllDeviceRecords(selectedSerial);
        
        if(deviceRecords.length === 0) {
            hideLoading();
            Swal.fire({
                icon: 'error',
                title: 'No Data Found',
                text: `No records found for device: ${selectedSerial}`,
                confirmButtonColor: '#0f5b9c'
            });
            document.getElementById('timelineContainer').innerHTML = `
                <div class="empty-timeline">
                    <i class="bi bi-database-slash"></i>
                    <h5>No Data Available</h5>
                    <p>No movement records found for this device in any sheet row.</p>
                </div>
            `;
            document.getElementById('statsArea').style.display = 'none';
            document.getElementById('timelineHeader').style.display = 'none';
            return;
        }
        
        currentDeviceSerial = selectedSerial;
        
        renderDeviceInfo(deviceRecords);
        renderTimeline(deviceRecords);
        
        document.getElementById('statsArea').style.display = 'block';
        document.getElementById('timelineHeader').style.display = 'block';
        
        hideLoading();
        
        const eventCount = buildFullTimelineEvents(deviceRecords).length;
        Swal.fire({
            icon: 'success',
            title: 'Journey Loaded',
            html: `Found <strong>${deviceRecords.length}</strong> record(s) and <strong>${eventCount}</strong> movement event(s) for this device.`,
            timer: 2500,
            showConfirmButton: false,
            toast: true,
            position: 'top-end'
        });
    }
    
    function resetTracker() {
        $('#deviceSelect').val('').trigger('change');
        document.getElementById('timelineContainer').innerHTML = `
            <div class="empty-timeline">
                <i class="bi bi-map"></i>
                <h5>No Device Selected</h5>
                <p>Select a device serial number from the dropdown and click "Track" to see its complete movement timeline across all sheet records.</p>
            </div>
        `;
        document.getElementById('statsArea').style.display = 'none';
        document.getElementById('timelineHeader').style.display = 'none';
        currentDeviceSerial = null;
        
        Swal.fire({
            icon: 'info',
            title: 'Reset Complete',
            text: 'Timeline cleared. Select a device to track.',
            timer: 1500,
            showConfirmButton: false,
            toast: true,
            position: 'top-end'
        });
    }
    
    function showLoading(msg) {
        if($('#global-loading-overlay').length) return;
        $('body').append(`
            <div id="global-loading-overlay">
                <div class="loading-spinner">
                    <i class="bi bi-arrow-repeat" style="font-size: 48px; color: #0f5b9c; animation: spin 1s linear infinite;"></i>
                    <p class="mt-3 mb-0">${msg}</p>
                </div>
            </div>
        `);
    }
    
    function hideLoading() { $('#global-loading-overlay').remove(); }
    
    function escapeHtml(str) { 
        if(!str) return ''; 
        return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }
    
    // Initialize
    async function init() {
        showLoading("Loading device inventory ...");
        await fetchAllRecords();
        extractDevices();
        populateDeviceDropdown();
        hideLoading();
        
        if(devicesList.length === 0) {
            Swal.fire({
                icon: 'warning',
                title: 'No Devices Found',
                text: 'No device records found in the sheet. Please check the data source.',
                confirmButtonColor: '#0f5b9c'
            });
            $('#deviceSelect').html('<option value="">-- No devices available --</option>');
        } else {
            Swal.fire({
                icon: 'success',
                title: 'Ready',
                text: `${devicesList.length} devices loaded. Select a device to track.`,
                timer: 2000,
                showConfirmButton: false,
                toast: true,
                position: 'top-end'
            });
        }
    }
    
    $(document).ready(function() {
        init();
        $('#trackBtn').on('click', trackDevice);
        $('#resetBtn').on('click', resetTracker);
        
        // Fix Select2 on window resize
        $(window).on('resize', function() {
            $('.select2-container--bootstrap-5').css('width', '100%');
        });
    });
</script>
</body>
</html>
