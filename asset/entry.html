<script>
    const SPREADSHEET_ID = "1bhkHXrG_eJxpqhSGBu13UyFjmBV7m8lMemDwcQ-4hlI";
    const DATA_SHEET = "Data";
    const SETTINGS_SHEET = "settings";
    const API_KEY = "AIzaSyDc8tegwi2rgHyDFYm7uWBqVqQ7Fwb3uWM";
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-mkm6wXOT_mTxj-xoydtMUjUulcYHkF7g2wXBHf__kP7lpXs24eqfidW5By44hf_wpQ/exec";
    
    let branchFromCache = null;
    let settingsMap = {};
    let allAssets = [];
    let dataTable = null;
    let pcRowCounter = 0;
    let currentBranchCode = "";
    let currentSettings = { district: "", treasury: "", lanPool: "", branchCodeRaw: "" };
    let existingAssetIds = new Set();
    
    // Retry configuration
    const MAX_RETRIES = 3;
    const RETRY_DELAY = 1000;
    const BATCH_SIZE = 10; // Send records in batches of 10
    const REQUEST_DELAY = 500; // Delay between batch requests (ms)
    
    function showGlobalLoading(msg) {
        if($('#global-loading-overlay').length) return;
        $('body').append(`<div id="global-loading-overlay"><div style="background:white;padding:30px;border-radius:24px;text-align:center;"><i class="bi bi-arrow-repeat" style="font-size:48px;color:#0f3b5f;animation:spin 1s linear infinite;"></i><p>${msg}</p></div></div>`);
    }
    
    function showProgressModal(total, current, message) {
        let $overlay = $('#global-loading-overlay');
        if($overlay.length) {
            $overlay.find('.progress-fill').css('width', `${(current/total)*100}%`);
            $overlay.find('.progress-message').text(message);
        }
    }
    
    function hideGlobalLoading() { $('#global-loading-overlay').remove(); }
    
    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    
    function getBranchFromStorage() {
        let branch = null;
        const sessionUser = sessionStorage.getItem('currentUser');
        if (sessionUser) {
            try { const userData = JSON.parse(sessionUser); branch = userData.username; } catch(e) {}
        }
        if (!branch) {
            const localUser = localStorage.getItem('currentUser');
            if (localUser) {
                try { const userData = JSON.parse(localUser); branch = userData.username; } catch(e) {}
            }
        }
        if (!branch) branch = localStorage.getItem('selectedBranch');
        if (!branch) branch = sessionStorage.getItem('selectedBranch');
        return branch;
    }
    
    async function fetchSettings() {
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SETTINGS_SHEET}!A:D?key=${API_KEY}`;
            const resp = await fetch(url);
            const data = await resp.json();
            const rows = data.values || [];
            const map = {};
            for(let i=1; i<rows.length; i++) {
                const row = rows[i];
                const district = row[0] ? row[0].trim() : "";
                const treasury = row[1] ? row[1].trim() : "";
                const branch = row[2] ? row[2].trim() : "";
                const lanPool = row[3] ? row[3].trim() : "";
                if(branch) {
                    map[branch] = { district, treasury, lanPool, branchCodeRaw: branch.length >= 4 ? branch.slice(-4) : branch };
                }
            }
            return map;
        } catch(e) { return {}; }
    }
    
    async function fetchAllAssets() {
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${DATA_SHEET}!A2:H?key=${API_KEY}`;
            const resp = await fetch(url);
            const data = await resp.json();
            const rows = data.values || [];
            existingAssetIds.clear();
            rows.forEach(row => {
                if(row[4] && row[4].trim()) {
                    existingAssetIds.add(row[4].trim());
                }
            });
            return rows.map(row => ({
                id: row[0] ? parseInt(row[0]) : null,
                district: (row[1] || "").trim(),
                treasury: (row[2] || "").trim(),
                branch: (row[3] || "").trim(),
                assetId: (row[4] || "").trim(),
                ipAssigned: (row[5] || "").trim(),
                workingStatus: (row[6] || "").trim() === "Yes" ? "Yes" : "No",
                confirm: (row[7] || "").trim() === "Yes" ? "Yes" : "No"
            }));
        } catch(e) { return []; }
    }
    
    function updateBranchInfo() {
        branchFromCache = getBranchFromStorage();
        if (!branchFromCache) {
            $("#displayBranchName").text("⚠️ No Branch Found");
            $("#displayDistrictTreasury").text("Unknown");
            $("#displayLanPool").text("Not available");
            currentBranchCode = "NOD";
            currentSettings = { district: "", treasury: "", lanPool: "", branchCodeRaw: "NOD" };
            return;
        }
        currentSettings = settingsMap[branchFromCache] || { district: "Unknown", treasury: "Unknown", lanPool: "10.165.4.0/24", branchCodeRaw: branchFromCache.slice(-4) };
        $("#displayBranchName").text(branchFromCache);
        $("#displayDistrictTreasury").text(`${currentSettings.district} / ${currentSettings.treasury}`);
        $("#displayLanPool").text(currentSettings.lanPool || "N/A");
        currentBranchCode = currentSettings.branchCodeRaw;
    }
    
    function checkDuplicateAssetId(part1, part3, excludeRowId = null) {
        if(!part1 || !part3) return false;
        const fullAssetId = `${part1}-NOD-${part3}`;
        if(existingAssetIds.has(fullAssetId)) {
            return { duplicate: true, source: "sheet", assetId: fullAssetId };
        }
        let duplicateFound = false;
        $(".pc-row-table").each(function() {
            const $row = $(this);
            const rowPart1 = $row.find(".asset-part1").val().trim();
            const rowPart3 = $row.find(".asset-part3").val().trim();
            const rowId = $row.attr("id");
            if(excludeRowId && rowId === excludeRowId) return;
            if(rowPart1 === part1 && rowPart3 === part3) {
                duplicateFound = true;
                return false;
            }
        });
        if(duplicateFound) {
            return { duplicate: true, source: "form", assetId: fullAssetId };
        }
        return { duplicate: false };
    }
    
    function attachRealTimeDuplicateCheck($row) {
        const $part1 = $row.find(".asset-part1");
        const $part3 = $row.find(".asset-part3");
        if($row.find(".duplicate-warning").length === 0) {
            $row.find(".field-cell:first").append('<span class="duplicate-warning"><i class="bi bi-exclamation-triangle-fill"></i> This Asset ID already exists!</span>');
        }
        const checkAndHighlight = function() {
            const part1 = $part1.val().trim();
            const part3 = $part3.val().trim();
            const rowId = $row.attr("id");
            if(part1 && part3) {
                const result = checkDuplicateAssetId(part1, part3, rowId);
                if(result.duplicate) {
                    $part3.addClass("duplicate");
                    $row.find(".duplicate-warning").show();
                } else {
                    $part3.removeClass("duplicate");
                    $row.find(".duplicate-warning").hide();
                }
            } else {
                $part3.removeClass("duplicate");
                $row.find(".duplicate-warning").hide();
            }
        };
        $part1.on('input', checkAndHighlight);
        $part3.on('input', checkAndHighlight);
    }
    
    // ------------------------------------------------------------------
    // Helper: Restrict input to numbers only for given jQuery element
    // ------------------------------------------------------------------
    function restrictToNumbers($inputElement) {
        if (!$inputElement.length) return;
        $inputElement.on('input', function(e) {
            let val = $(this).val();
            // Remove any non-digit characters
            let newVal = val.replace(/\D/g, '');
            if (newVal !== val) {
                $(this).val(newVal);
            }
        });
        // Also handle keypress for preventing non-digit characters before they appear
        $inputElement.on('keypress', function(e) {
            const charCode = e.which ? e.which : e.keyCode;
            // Allow backspace, delete, tab, escape, enter, etc. (control keys)
            if (charCode === 0 || charCode === 8 || charCode === 9 || charCode === 13 || charCode === 27 || 
                charCode === 46 || (charCode >= 37 && charCode <= 40)) {
                return true;
            }
            // Allow only digit characters (0-9)
            if (charCode < 48 || charCode > 57) {
                e.preventDefault();
                return false;
            }
            return true;
        });
        // Also handle paste event to sanitize numbers
        $inputElement.on('paste', function(e) {
            const pastedText = (e.originalEvent.clipboardData || window.clipboardData).getData('text');
            if (pastedText && /\D/.test(pastedText)) {
                e.preventDefault();
                const numbersOnly = pastedText.replace(/\D/g, '');
                $(this).val(numbersOnly);
            }
        });
    }
    
    function createTableRow(index) {
        let defaultLanPrefix = "10.165.4.";
        if (currentSettings.lanPool) {
            const poolBase = currentSettings.lanPool.split('/')[0];
            const lastDot = poolBase.lastIndexOf('.');
            defaultLanPrefix = lastDot !== -1 ? poolBase.substring(0, lastDot + 1) : poolBase + ".";
        }
        return `
        <div class="pc-row-table" data-row-idx="${index}" id="pc_row_${index}">
            <input type="hidden" class="hidden-district" value="${escapeHtml(currentSettings.district)}">
            <input type="hidden" class="hidden-treasury" value="${escapeHtml(currentSettings.treasury)}">
            <input type="hidden" class="hidden-branch" value="${escapeHtml(branchFromCache || '')}">
            <div class="field-cell">
                <label class="form-label required">Asset ID</label>
                <div class="asset-combiner">
                    <input type="text" class="asset-part1" value="${currentBranchCode}" style="width:65px;" readonly>
                    <span class="asset-sep">-NOD-</span>
                    <input type="text" class="asset-part3 numeric-input" placeholder="Number" style="width:70px;">
                </div>
            </div>
            <div class="field-cell">
                <label class="form-label required">IP Address</label>
                <div class="ip-combiner">
                    <input type="text" class="ip-prefix-field" value="${defaultLanPrefix}" readonly style="width:90px;">
                    <input type="text" class="ip-last-field numeric-input" placeholder="octet" value="" style="width:50px;">
                </div>
            </div>
            <div class="small-select-field">
                <label class="form-label">Working Status</label>
                <select class="form-select working-select"><option selected>Yes</option><option>No</option></select>
            </div>
            <div class="small-select-field" style="display:none">
                <label class="form-label">Confirm</label>
                <select class="form-select confirm-select"><option selected>Yes</option><option>No</option></select>
            </div>
            <div class="delete-cell">
                <button type="button" class="delete-row-btn" title="Remove"><i class="bi bi-trash3-fill"></i></button>
            </div>
        </div>`;
    }
    
    function refreshPcRows() {
        $("#pcRowsContainer").empty();
        pcRowCounter = 0;
        addNewTableRow();
    }
    
    function addNewTableRow() {
        if (!branchFromCache) {
            Swal.fire({ icon: 'warning', title: 'No Branch Detected' });
            return;
        }
        const idx = pcRowCounter++;
        const newRow = $(createTableRow(idx));
        $("#pcRowsContainer").append(newRow);
        
        // Apply numeric restriction to asset-part3 and ip-last-field
        restrictToNumbers(newRow.find(".asset-part3"));
        restrictToNumbers(newRow.find(".ip-last-field"));
        
        attachRealTimeDuplicateCheck(newRow);
        newRow.find('.delete-row-btn').on('click', function() {
            $(this).closest('.pc-row-table').remove();
        });
    }
    
    function collectAllRowsData() {
        const records = [];
        let hasError = false;
        let duplicateFound = false;
        
        $(".pc-row-table").each(function() {
            const $row = $(this);
            const district = $row.find(".hidden-district").val();
            const treasury = $row.find(".hidden-treasury").val();
            const branch = $row.find(".hidden-branch").val();
            const part1 = $row.find(".asset-part1").val().trim();
            const part3 = $row.find(".asset-part3").val().trim();
            const ipPrefix = $row.find(".ip-prefix-field").val().trim();
            const ipLast = $row.find(".ip-last-field").val().trim();
            
            if(!part1 || !part3) { hasError = true; Swal.fire("Missing Asset", "Complete Asset ID fields", "warning"); return false; }
            if(!ipLast || isNaN(ipLast) || ipLast < 0 || ipLast > 254) { hasError = true; Swal.fire("Invalid IP", "Last octet must be 1-254", "warning"); return false; }
            
            const result = checkDuplicateAssetId(part1, part3, $row.attr("id"));
            if(result.duplicate) {
                duplicateFound = true;
                Swal.fire("Duplicate Asset ID", `Asset ID "${result.assetId}" already exists in ${result.source === "sheet" ? "database" : "current list"}!`, "warning");
                return false;
            }
            
            const fullAssetId = `${part1}-NOD-${part3}`;
            const fullIp = ipPrefix.endsWith('.') ? `${ipPrefix}${ipLast}` : `${ipPrefix}.${ipLast}`;
            records.push({
                district, treasury, branch,
                assetId: fullAssetId,
                ipAssigned: fullIp,
                workingStatus: $row.find(".working-select").val(),
                confirm: "Yes"
            });
            return true;
        });
        
        if(hasError || duplicateFound) return null;
        return records;
    }
    
    // Submit with retry logic, batching, and progress tracking
    async function submitWithRetry(record, retryCount = 0) {
        try {
            await fetch(APPS_SCRIPT_URL, { 
                method: "POST", 
                mode: "no-cors", 
                body: JSON.stringify({ action: "ADD", ...record }) 
            });
            return { success: true, record };
        } catch(e) {
            if(retryCount < MAX_RETRIES) {
                await sleep(RETRY_DELAY);
                return submitWithRetry(record, retryCount + 1);
            }
            return { success: false, record, error: e.message };
        }
    }
    
    async function submitBatchRecords(records) {
        if(!records.length) { Swal.fire("Info","No records","info"); return; }
        
        const totalRecords = records.length;
        let successCount = 0;
        let failCount = 0;
        const failedRecords = [];
        
        // Create progress overlay
        if($('#global-loading-overlay').length) $('#global-loading-overlay').remove();
        $('body').append(`
            <div id="global-loading-overlay">
                <div class="progress-container">
                    <i class="bi bi-cloud-upload" style="font-size:48px;color:#0f3b5f;"></i>
                    <h5 class="mt-3">Submitting Assets</h5>
                    <div class="progress-bar-custom">
                        <div class="progress-fill" style="width:0%"></div>
                    </div>
                    <p class="progress-message">Preparing to submit ${totalRecords} records...</p>
                    <small class="text-muted">Please do not close this window</small>
                </div>
            </div>
        `);
        
        // Process records in batches to avoid overwhelming the server
        for(let i = 0; i < records.length; i += BATCH_SIZE) {
            const batch = records.slice(i, i + BATCH_SIZE);
            const batchNumber = Math.floor(i / BATCH_SIZE) + 1;
            const totalBatches = Math.ceil(records.length / BATCH_SIZE);
            
            for(let j = 0; j < batch.length; j++) {
                const record = batch[j];
                const currentIndex = i + j + 1;
                const percent = (currentIndex / totalRecords) * 100;
                
                $('#global-loading-overlay .progress-fill').css('width', `${percent}%`);
                $('#global-loading-overlay .progress-message').text(`Submitting ${currentIndex} of ${totalRecords} (Batch ${batchNumber}/${totalBatches})`);
                
                const result = await submitWithRetry(record);
                if(result.success) {
                    successCount++;
                    existingAssetIds.add(record.assetId);
                } else {
                    failCount++;
                    failedRecords.push(record.assetId);
                }
                
                // Small delay between individual submissions within batch
                await sleep(100);
            }
            
            // Delay between batches
            if(i + BATCH_SIZE < records.length) {
                await sleep(REQUEST_DELAY);
            }
        }
        
        hideGlobalLoading();
        
        if(successCount > 0) {
            let message = `${successCount} PC(s) added successfully.`;
            if(failCount > 0) {
                message += ` ${failCount} failed. Failed assets: ${failedRecords.join(', ')}`;
                Swal.fire({ icon: "warning", title: "Partial Success", text: message, timer: 5000 });
            } else {
                Swal.fire({ icon: "success", title: "Complete!", text: message, timer: 2000 });
            }
            refreshPcRows();
            await loadAssetsAndRenderTable();
        } else {
            Swal.fire({ icon: "error", title: "Submission Failed", text: "All records failed. Check network connection and try again." });
        }
    }
    
    async function deleteAsset(rowId) {
        showGlobalLoading("Deleting...");
        try {
            await fetch(APPS_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "DELETE", rowId: parseInt(rowId) }) });
            const deletedAsset = allAssets.find(a => a.id === parseInt(rowId));
            if(deletedAsset) existingAssetIds.delete(deletedAsset.assetId);
            hideGlobalLoading();
            Swal.fire({ icon: "success", title: "Deleted!", timer: 1500 });
            setTimeout(() => loadAssetsAndRenderTable(), 500);
        } catch(e) {
            hideGlobalLoading();
            Swal.fire({ icon: "error", title: "Delete Failed", text: e.message });
        }
    }
    
    async function updateAssetHandler() {
        const rowId = $("#editRowId").val();
        const newAssetId = $("#editAssetId").val().trim();
        const newIp = $("#editIp").val().trim();
        const newWorking = $("#editWorkingStatus").val();
        
        if(!newAssetId || !newIp) { Swal.fire("Error", "Asset ID & IP required", "warning"); return; }
        
        const existingRecord = allAssets.find(a => a.id === parseInt(rowId));
        if(existingRecord && existingRecord.assetId !== newAssetId && existingAssetIds.has(newAssetId)) {
            Swal.fire("Duplicate Asset ID", `Asset ID "${newAssetId}" already exists in database!`, "warning");
            return;
        }
        
        showGlobalLoading("Updating...");
        try {
            await fetch(APPS_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({
                action: "UPDATE", rowId: parseInt(rowId), newAssetId, newIp,
                newWorkingStatus: newWorking, newConfirm: "Yes"
            }) });
            
            if(existingRecord && existingRecord.assetId !== newAssetId) {
                existingAssetIds.delete(existingRecord.assetId);
                existingAssetIds.add(newAssetId);
            }
            
            hideGlobalLoading();
            Swal.fire({ icon: "success", title: "Updated!", timer: 1500 });
            bootstrap.Modal.getInstance(document.getElementById('editAssetModal')).hide();
            setTimeout(() => loadAssetsAndRenderTable(), 500);
        } catch(e) {
            hideGlobalLoading();
            Swal.fire({ icon: "error", title: "Update Failed", text: e.message });
        }
    }
    
    function attachTableHandlers() {
        $('.edit-asset').off('click').on('click', function() {
            const id = $(this).data('id');
            const record = allAssets.find(a => a.id === id && a.branch === branchFromCache);
            if(record) {
                $("#editRowId").val(record.id);
                $("#editId").val(record.id);
                $("#editDistrict").val(record.district);
                $("#editTreasury").val(record.treasury);
                $("#editBranch").val(record.branch);
                $("#editAssetId").val(record.assetId);
                $("#editIp").val(record.ipAssigned);
                $("#editWorkingStatus").val(record.workingStatus);
                new bootstrap.Modal(document.getElementById('editAssetModal')).show();
            }
        });
        $('.delete-asset').off('click').on('click', function() {
            const id = $(this).data('id');
            const assetId = $(this).data('assetid');
            Swal.fire({ title: 'Delete?', text: `Remove "${assetId}"?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#dc2626' })
                .then(res => { if(res.isConfirmed) deleteAsset(id); });
        });
    }
    
    async function loadAssetsAndRenderTable() {
        if(!branchFromCache) { if(dataTable) dataTable.clear().draw(); return; }
        showGlobalLoading("Loading...");
        allAssets = await fetchAllAssets();
        const filtered = allAssets.filter(a => a.branch === branchFromCache);
        if(dataTable) {
            dataTable.clear();
            dataTable.rows.add(filtered);
            dataTable.draw();
        } else {
            $('#assetTable tbody').empty();
            dataTable = $('#assetTable').DataTable({
                data: filtered,
                columns: [
                    { data: "id" }, { data: "district" }, { data: "treasury" }, { data: "branch" },
                    { data: "assetId" }, { data: "ipAssigned" },
                    { data: "workingStatus", render: d => d==="Yes"? '<span class="badge-success">Yes</span>':'<span class="badge-secondary">No</span>' },
                    { data: "confirm", render: d => d==="Yes"? '<span class="badge-success">Yes</span>':'<span class="badge-secondary">No</span>' },
                    { data: null, render: row => `<div class="action-icons">
                        <i class="bi bi-pencil-square edit-asset" data-id="${row.id}" style="cursor:pointer;"></i>
                        <i class="bi bi-trash3 delete-asset" data-id="${row.id}" data-assetid="${escapeHtml(row.assetId)}" style="cursor:pointer;"></i>
                    </div>` }
                ],
                order: [[0, 'desc']],
                pageLength: -1,
                drawCallback: function() { attachTableHandlers(); }
            });
        }
        attachTableHandlers();
        hideGlobalLoading();
    }
    
    function switchTab(tab) {
        if(tab === 'add') {
            $("#addPane").addClass("active-pane");
            $("#editPane").removeClass("active-pane");
            $("#tabAddBtn").addClass("active");
            $("#tabEditBtn").removeClass("active");
            refreshPcRows();
        } else {
            $("#editPane").addClass("active-pane");
            $("#addPane").removeClass("active-pane");
            $("#tabEditBtn").addClass("active");
            $("#tabAddBtn").removeClass("active");
            loadAssetsAndRenderTable();
        }
    }
    
    function escapeHtml(str) { return String(str || '').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    
    $(async function() {
        showGlobalLoading("Initializing...");
        settingsMap = await fetchSettings();
        branchFromCache = getBranchFromStorage();
        updateBranchInfo();
        if(!branchFromCache) {
            Swal.fire({ icon: 'warning', title: 'Branch Not Detected', text: 'Please login again.' });
            $("#pcRowsContainer").html('<div class="alert alert-warning">Please login to add PC assets.</div>');
        } else {
            await loadAssetsAndRenderTable();
            refreshPcRows();
        }
        hideGlobalLoading();
        $("#addMorePcBtn").click(addNewTableRow);
        $("#submitAllPcBtn").click(async () => { const records = collectAllRowsData(); if(records) await submitBatchRecords(records); });
        $("#refreshTableBtn").click(() => loadAssetsAndRenderTable());
        $("#tabAddBtn").click(() => switchTab('add'));
        $("#tabEditBtn").click(() => switchTab('edit'));
        $("#confirmAssetUpdateBtn").click(updateAssetHandler);
        if(branchFromCache) addNewTableRow();
    });
</script>
</body>
</html>
