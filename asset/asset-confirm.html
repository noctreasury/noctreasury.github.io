<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Asset Manager | PC Asset & IP Registry</title>
    
    <!-- Local CSS Resources (matching attached structure) -->
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="../css/select2.min.css">
    <link rel="stylesheet" href="../css/select2-bootstrap-5-theme.min.css">
    <link rel="stylesheet" href="../css/flatpickr.min.css">
    <link rel="stylesheet" href="../css/sweetalert2.min.css">
     <link rel="stylesheet" href="../css/all-in-one.css">
    
</head>
<body>
<div class="page-header">
                <div class="page-header-left">
                  <i class="bi bi-pc-display"></i>
                    <div>
                        <h1>I.T Asset Management</h1>
                        <p>Manage All treasury I.T Assets </p>
                    </div>
                </div>
            </div>

<div class="app-card">

    <div class="tab-header">
        <button class="tab-btn active" id="tabAddBtn"><i class="bi bi-plus-circle"></i> Add </button>
        <button class="tab-btn" id="tabEditBtn"><i class="bi bi-table"></i> Edit / Manage Asset</button>
    </div>
    
    <!-- Tab 1: Table-style rows with horizontal labels -->
    <div id="addPane" class="tab-pane active-pane">
        <h4 class="mb-2 fs-5"><i class="bi bi-pc-display"></i> Asset Register</h4>
        
        <!-- Branch Selection Dropdown -->
        <div class="branch-selector-container">
            <label class="form-label required mb-0">Select Branch:</label>
            <select id="branchSelect" class="form-select">
                <option value="">-- Loading branches --</option>
            </select>
            <button id="applyBranchBtn" class="btn-apply"><i class="bi bi-check-lg"></i> Apply Branch</button>
        </div>
        
        <div class="info-banner" id="branchInfoBanner">
            <i class="bi bi-info-circle-fill"></i> <strong>Branch:</strong> <span id="displayBranchName">—</span> &nbsp;|&nbsp; 
            <strong>DT / Treasury Details:</strong> <span id="displayDistrictTreasury">—</span> &nbsp;|&nbsp;
            <strong>LAN Pool:</strong> <span id="displayLanPool">—</span>
        </div>
        <div id="pcRowsContainer"></div>
        <div class="mt-3 d-flex gap-3 flex-wrap align-items-center">
            <button id="addMorePcBtn" class="btn btn-outline-secondary add-pc-btn"><i class="bi bi-plus-lg"></i> Add New</button>
            <button id="submitAllPcBtn" class="btn btn-primary-custom px-4"><i class="bi bi-cloud-upload"></i> Submit</button>
        </div>
    </div>

    <!-- Tab 2: DataTable -->
    <div id="editPane" class="tab-pane">
        <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
            <h4 class="fs-5"><i class="bi bi-list-ul"></i> Asset List</h4>
            <button id="refreshTableBtn" class="btn btn-outline-secondary"><i class="bi bi-arrow-repeat"></i> Refresh</button>
        </div>
        <div class="table-responsive">
            <table id="assetTable" class="table table-striped table-hover" style="width:100%">
                <thead>
                    <tr><th>ID</th><th>District</th><th>Treasury</th><th>Branch</th><th>Asset ID</th><th>IP Assigned</th><th>Working</th><th>Confirm</th><th>Actions</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editAssetModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title"><i class="bi bi-pencil-square"></i> Edit Asset</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editRowId">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">ID</label><input type="text" id="editId" class="form-control" readonly></div>
                    <div class="col-md-6"><label class="form-label">District</label><input type="text" id="editDistrict" class="form-control" readonly></div>
                    <div class="col-md-6"><label class="form-label">Treasury</label><input type="text" id="editTreasury" class="form-control" readonly></div>
                    <div class="col-md-6"><label class="form-label">Branch</label><input type="text" id="editBranch" class="form-control" readonly></div>
                    <div class="col-md-6"><label class="form-label">Asset ID</label><input type="text" id="editAssetId" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label">IP Assigned</label><input type="text" id="editIp" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label">Working Status</label><select id="editWorkingStatus" class="form-select"><option>Yes</option><option>No</option></select></div>
                    <div class="col-md-3"><label class="form-label">Confirm Status</label><select id="editConfirm" class="form-select"><option>Yes</option><option>No</option></select></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button id="confirmAssetUpdateBtn" class="btn btn-primary">Update</button>
            </div>
        </div>
    </div>
</div>

<script src="../js/jquery.min.js"></script>
<script src="../js/bootstrap.bundle.min.js"></script>
<script src="../js/jquery.dataTables.min.js"></script>
<script src="../js/dataTables.bootstrap5.min.js"></script>
<script src="../js/select2.min.js"></script>
<script src="../js/sweetalert2.all.min.js"></script>

<script>
    // ================= CONFIGURATION =================
    const SPREADSHEET_ID = "1bhkHXrG_eJxpqhSGBu13UyFjmBV7m8lMemDwcQ-4hlI";
    const DATA_SHEET = "Data";
    const SETTINGS_SHEET = "settings";
    const API_KEY = "AIzaSyDc8tegwi2rgHyDFYm7uWBqVqQ7Fwb3uWM";
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-mkm6wXOT_mTxj-xoydtMUjUulcYHkF7g2wXBHf__kP7lpXs24eqfidW5By44hf_wpQ/exec";
    
    let selectedBranch = null;
    let settingsMap = {};
    let branchesList = [];
    let allAssets = [];
    let dataTable = null;
    let pcRowCounter = 0;
    let currentBranchCode = "";
    let currentSettings = { district: "", treasury: "", lanPool: "", branchCodeRaw: "" };
    
    function showGlobalLoading(msg) {
        if($('#global-loading-overlay').length) return;
        $('body').append(`<div id="global-loading-overlay"><div style="background:white;padding:30px;border-radius:24px;text-align:center;"><i class="bi bi-arrow-repeat" style="font-size:48px;color:#0f3b5f;animation:spin 1s linear infinite;"></i><p>${msg}</p></div></div>`);
    }
    function hideGlobalLoading() { $('#global-loading-overlay').remove(); }
    
    // Fetch settings from sheet (District, Treasury, Branch, LAN Pool)
    async function fetchSettings() {
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SETTINGS_SHEET}!A:D?key=${API_KEY}`;
            const resp = await fetch(url);
            const data = await resp.json();
            const rows = data.values || [];
            const map = {};
            const branches = [];
            for(let i=1; i<rows.length; i++) {
                const row = rows[i];
                const district = row[0] ? row[0].trim() : "";
                const treasury = row[1] ? row[1].trim() : "";
                const branch = row[2] ? row[2].trim() : "";
                const lanPool = row[3] ? row[3].trim() : "";
                if(branch) {
                    map[branch] = { district, treasury, lanPool, branchCodeRaw: branch.length >= 4 ? branch.slice(-4) : branch };
                    branches.push(branch);
                }
            }
            return { map, branches };
        } catch(e) { return { map: {}, branches: [] }; }
    }
    
    // Populate branch dropdown
    function populateBranchDropdown(branches) {
        const $select = $('#branchSelect');
        $select.empty();
        $select.append('<option value="">-- Select a Branch --</option>');
        branches.forEach(branch => {
            $select.append(`<option value="${escapeHtml(branch)}">${escapeHtml(branch)}</option>`);
        });
    }
    
    // Update branch info display based on selected branch
    function updateBranchInfo(branch) {
        const branchSettings = settingsMap[branch];
        if(branchSettings) {
            $("#displayBranchName").text(branch);
            $("#displayDistrictTreasury").text(`${branchSettings.district} / ${branchSettings.treasury}`);
            $("#displayLanPool").text(branchSettings.lanPool || "N/A");
            currentBranchCode = branchSettings.branchCodeRaw;
            currentSettings = branchSettings;
        } else {
            $("#displayBranchName").text(branch || "—");
            $("#displayDistrictTreasury").text("— / —");
            $("#displayLanPool").text("—");
            currentBranchCode = branch ? branch.slice(-4) : "NOD";
            currentSettings = { district: "", treasury: "", lanPool: "", branchCodeRaw: currentBranchCode };
        }
    }
    
    async function fetchAllAssets() {
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${DATA_SHEET}!A2:H?key=${API_KEY}`;
            const resp = await fetch(url);
            const data = await resp.json();
            const rows = data.values || [];
            return rows.map(row => ({
                id: row[0] ? parseInt(row[0]) : null,
                district: (row[1] || "").trim(),
                treasury: (row[2] || "").trim(),
                branch: (row[3] || "").trim(),
                assetId: (row[4] || "").trim(),
                ipAssigned: (row[5] || "").trim(),
                workingStatus: (row[6] || "").trim() === "Yes" ? "Yes" : "No",
                confirm: (row[7] || "").trim() === "Yes" ? "Yes" : "No"
            }));
        } catch(e) { return []; }
    }
    
    function createTableRow(index) {
        let defaultLanPrefix = "10.165.4.";
        if (currentSettings.lanPool) {
            const poolBase = currentSettings.lanPool.split('/')[0];
            const lastDot = poolBase.lastIndexOf('.');
            defaultLanPrefix = lastDot !== -1 ? poolBase.substring(0, lastDot + 1) : poolBase + ".";
        }
        return `
        <div class="pc-row-table" data-row-idx="${index}" id="pc_row_${index}">
            <input type="hidden" class="hidden-district" value="${escapeHtml(currentSettings.district)}">
            <input type="hidden" class="hidden-treasury" value="${escapeHtml(currentSettings.treasury)}">
            <input type="hidden" class="hidden-branch" value="${escapeHtml(selectedBranch || '')}">
            
            <div class="field-cell">
                <label class="form-label required">Asset ID</label>
                <div class="asset-combiner">
                    <input type="text" class="asset-part1" value="${currentBranchCode}" style="width:65px;">
                    <span class="asset-sep">-NOD-</span>
                    <input type="text" class="asset-part3" placeholder="Number" style="width:70px;">
                </div>
            </div>
            
            <div class="field-cell">
                <label class="form-label required">IP Address</label>
                <div class="ip-combiner">
                    <input type="text" class="ip-prefix-field" value="${defaultLanPrefix}" readonly style="width:90px;">
                    <input type="text" class="ip-last-field" placeholder="octet" value="" style="width:50px;">
                </div>
            </div>
            
            <div class="small-select-field">
                <label class="form-label">Working Status</label>
                <select class="form-select working-select">
                    <option selected>Yes</option><option>No</option>
                </select>
            </div>
            
            <div class="small-select-field">
                <label class="form-label">Confirm Status</label>
                <select class="form-select confirm-select">
                    <option selected>Yes</option><option>No</option>
                </select>
            </div>
            
            <div class="delete-cell">
                <button type="button" class="delete-row-btn" title="Remove"><i class="bi bi-trash3-fill"></i></button>
            </div>
        </div>`;
    }
    
    function refreshPcRows() {
        $("#pcRowsContainer").empty();
        pcRowCounter = 0;
        addNewTableRow();
    }
    
    function addNewTableRow() {
        if (!selectedBranch) {
            Swal.fire({ icon: 'warning', title: 'No Branch Selected', text: 'Please select a branch first.' });
            return;
        }
        const idx = pcRowCounter++;
        const newRow = $(createTableRow(idx));
        $("#pcRowsContainer").append(newRow);
        newRow.find('.delete-row-btn').on('click', function() {
            $(this).closest('.pc-row-table').remove();
        });
    }
    
    function collectAllRowsData() {
        const records = [];
        let hasError = false;
        $(".pc-row-table").each(function() {
            const $row = $(this);
            const district = $row.find(".hidden-district").val();
            const treasury = $row.find(".hidden-treasury").val();
            const branch = $row.find(".hidden-branch").val();
            const part1 = $row.find(".asset-part1").val().trim();
            const part3 = $row.find(".asset-part3").val().trim();
            const ipPrefix = $row.find(".ip-prefix-field").val().trim();
            const ipLast = $row.find(".ip-last-field").val().trim();
            const working = $row.find(".working-select").val();
            const confirm = $row.find(".confirm-select").val();
            if(!part1 || !part3) { hasError = true; Swal.fire("Missing Asset", "Complete Asset ID", "warning"); return false; }
            if(!ipLast || isNaN(ipLast) || ipLast < 0 || ipLast > 254) { hasError = true; Swal.fire("Invalid IP", "Last octet 1-254", "warning"); return false; }
            records.push({
                district, treasury, branch,
                assetId: `${part1}-NOD-${part3}`,
                ipAssigned: ipPrefix.endsWith('.') ? `${ipPrefix}${ipLast}` : `${ipPrefix}.${ipLast}`,
                workingStatus: working,
                confirm: confirm
            });
            return true;
        });
        return hasError ? null : records;
    }
    
    async function submitBatchRecords(records) {
        if(!records.length) { Swal.fire("Info","No records","info"); return; }
        if(!selectedBranch) { Swal.fire("Error","No branch selected","error"); return; }
        showGlobalLoading(`Submitting ${records.length}...`);
        let success = 0;
        for(const record of records) {
            try {
                await fetch(APPS_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "ADD", ...record }) });
                success++;
            } catch(e) { console.error(e); }
        }
        hideGlobalLoading();
        Swal.fire({ icon: "success", title: "Saved!", text: `${success} PC(s) added.`, timer: 2000 });
        refreshPcRows();
        await loadAssetsAndRenderTable();
    }
    
    async function deleteAsset(rowId) {
        showGlobalLoading("Deleting...");
        try {
            await fetch(APPS_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "DELETE", rowId: parseInt(rowId) }) });
            hideGlobalLoading();
            Swal.fire({ icon: "success", title: "Deleted!", timer: 1500 });
            setTimeout(() => loadAssetsAndRenderTable(), 500);
        } catch(e) {
            hideGlobalLoading();
            Swal.fire({ icon: "error", title: "Delete Failed", text: e.message });
        }
    }
    
    async function updateAssetHandler() {
        const rowId = $("#editRowId").val();
        const newAssetId = $("#editAssetId").val().trim();
        const newIp = $("#editIp").val().trim();
        const newWorking = $("#editWorkingStatus").val();
        const newConfirm = $("#editConfirm").val();
        
        if(!newAssetId || !newIp) { Swal.fire("Error", "Asset ID & IP required", "warning"); return; }
        showGlobalLoading("Updating...");
        try {
            await fetch(APPS_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({
                action: "UPDATE", 
                rowId: parseInt(rowId), 
                newAssetId, 
                newIp,
                newWorkingStatus: newWorking,
                newConfirm: newConfirm
            }) });
            hideGlobalLoading();
            Swal.fire({ icon: "success", title: "Updated!", timer: 1500 });
            bootstrap.Modal.getInstance(document.getElementById('editAssetModal')).hide();
            setTimeout(() => loadAssetsAndRenderTable(), 500);
        } catch(e) {
            hideGlobalLoading();
            Swal.fire({ icon: "error", title: "Update Failed", text: e.message });
        }
    }
    
    function attachTableHandlers() {
        $('.edit-asset').off('click').on('click', function() {
            const id = $(this).data('id');
            const record = allAssets.find(a => a.id === id && a.branch === selectedBranch);
            if(record) {
                $("#editRowId").val(record.id);
                $("#editId").val(record.id);
                $("#editDistrict").val(record.district);
                $("#editTreasury").val(record.treasury);
                $("#editBranch").val(record.branch);
                $("#editAssetId").val(record.assetId);
                $("#editIp").val(record.ipAssigned);
                $("#editWorkingStatus").val(record.workingStatus);
                $("#editConfirm").val(record.confirm);
                new bootstrap.Modal(document.getElementById('editAssetModal')).show();
            }
        });
        $('.delete-asset').off('click').on('click', function() {
            const id = $(this).data('id');
            const assetId = $(this).data('assetid');
            Swal.fire({ title: 'Delete?', text: `Remove "${assetId}"?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#dc2626' })
                .then(res => { if(res.isConfirmed) deleteAsset(id); });
        });
    }
    
    async function loadAssetsAndRenderTable() {
        if(!selectedBranch) { 
            if(dataTable) dataTable.clear().draw(); 
            hideGlobalLoading();
            return; 
        }
        showGlobalLoading("Loading assets...");
        allAssets = await fetchAllAssets();
        const filtered = allAssets.filter(a => a.branch === selectedBranch);
        if(dataTable) {
            dataTable.clear();
            dataTable.rows.add(filtered);
            dataTable.draw();
        } else {
            $('#assetTable tbody').empty();
            dataTable = $('#assetTable').DataTable({
                data: filtered,
                columns: [
                    { data: "id" }, { data: "district" }, { data: "treasury" }, { data: "branch" },
                    { data: "assetId" }, { data: "ipAssigned" },
                    { data: "workingStatus", render: d => d==="Yes"? '<span class="badge-success">Yes</span>':'<span class="badge-secondary">No</span>' },
                    { data: "confirm", render: d => d==="Yes"? '<span class="badge-success">Yes</span>':'<span class="badge-secondary">No</span>' },
                    { data: null, render: row => `<div class="action-icons">
                        <i class="bi bi-pencil-square edit-asset" data-id="${row.id}" style="cursor:pointer;"></i>
                        <i class="bi bi-trash3 delete-asset" data-id="${row.id}" data-assetid="${escapeHtml(row.assetId)}" style="cursor:pointer;"></i>
                    </div>` }
                ],
                order: [[0, 'desc']],
                pageLength: -1,
                drawCallback: function() { attachTableHandlers(); }
            });
        }
        attachTableHandlers();
        hideGlobalLoading();
    }
    
    // Apply Branch Selection
    async function applyBranchSelection() {
        const branch = $('#branchSelect').val();
        if(!branch) {
            Swal.fire({ icon: 'warning', title: 'No Branch Selected', text: 'Please select a branch from the dropdown.' });
            return;
        }
        
        selectedBranch = branch;
        updateBranchInfo(selectedBranch);
        
        // Refresh the add tab rows with new branch settings
        refreshPcRows();
        
        // Load assets for the selected branch in edit tab
        await loadAssetsAndRenderTable();
        
        Swal.fire({ icon: 'success', title: 'Branch Applied', text: `Now working with branch: ${branch}`, timer: 1500, showConfirmButton: false });
    }
    
    function switchTab(tab) {
        if(tab === 'add') {
            $("#addPane").addClass("active-pane");
            $("#editPane").removeClass("active-pane");
            $("#tabAddBtn").addClass("active");
            $("#tabEditBtn").removeClass("active");
            if(selectedBranch) refreshPcRows();
        } else {
            $("#editPane").addClass("active-pane");
            $("#addPane").removeClass("active-pane");
            $("#tabEditBtn").addClass("active");
            $("#tabAddBtn").removeClass("active");
            if(selectedBranch) loadAssetsAndRenderTable();
        }
    }
    
    function escapeHtml(str) { return String(str || '').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    
    $(async function() {
        showGlobalLoading("Loading settings...");
        
        // Fetch settings and branches
        const settings = await fetchSettings();
        settingsMap = settings.map;
        branchesList = settings.branches;
        
        // Populate branch dropdown
        populateBranchDropdown(branchesList);
        
        if(branchesList.length === 0) {
            Swal.fire({ icon: 'warning', title: 'No Branches Found', text: 'Please add branch configurations in the settings sheet.' });
            $("#pcRowsContainer").html('<div class="alert alert-warning">No branches configured. Please add branches to the settings sheet.</div>');
        }
        
        hideGlobalLoading();
        
        // Event handlers
        $('#applyBranchBtn').on('click', applyBranchSelection);
        $("#addMorePcBtn").click(addNewTableRow);
        $("#submitAllPcBtn").click(async () => { const records = collectAllRowsData(); if(records) await submitBatchRecords(records); });
        $("#refreshTableBtn").click(() => { if(selectedBranch) loadAssetsAndRenderTable(); });
        $("#tabAddBtn").click(() => switchTab('add'));
        $("#tabEditBtn").click(() => switchTab('edit'));
        $("#confirmAssetUpdateBtn").click(updateAssetHandler);
    });
</script>
</body>
</html>
