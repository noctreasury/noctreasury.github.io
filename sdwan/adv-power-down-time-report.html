    <script>
        // ======================== CONFIGURATION ========================
        const DATA_SHEET_ID = "1dHllRe0lHgpX4LAKIP-3abKBcSvBqlIOR0TaheG4aRc";
        const DATA_SHEET_NAME = "Data";
        const API_KEY = "AIzaSyBAuS3Brpsw5JOJnjNJii1UlFa7ClXf8d4";
        
        let flatpickrFrom, flatpickrTo;
        let dataTable = null;
        let currentEventsData = [];
        let currentFilterInfo = {};
        
        // ======================== UTILITY FUNCTIONS ========================
        function parseDMY(dateStr) {
            if (!dateStr) return null;
            const parts = dateStr.split('/');
            if (parts.length !== 3) return null;
            return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]), 12, 0, 0);
        }
        
        function parseDateTime(dateStr, timeStr) {
            if (!dateStr || !timeStr) return null;
            const dateParts = dateStr.split('/');
            const timeParts = timeStr.split(':');
            if (dateParts.length !== 3 || timeParts.length < 2) return null;
            const year = parseInt(dateParts[2]);
            const month = parseInt(dateParts[1]) - 1;
            const day = parseInt(dateParts[0]);
            const hours = parseInt(timeParts[0]);
            const minutes = parseInt(timeParts[1]);
            const seconds = timeParts[2] ? parseInt(timeParts[2]) : 0;
            return new Date(year, month, day, hours, minutes, seconds);
        }
        
        function getTimeInSeconds(dateTimeObj) {
            if (!dateTimeObj || isNaN(dateTimeObj.getTime())) return null;
            return dateTimeObj.getHours() * 3600 + dateTimeObj.getMinutes() * 60 + dateTimeObj.getSeconds();
        }
        
        function isTimeInRange(downDateTime, fromTimeSec, toTimeSec) {
            if (!downDateTime) return false;
            const timeSec = getTimeInSeconds(downDateTime);
            if (timeSec === null) return false;
            return timeSec >= fromTimeSec && timeSec <= toTimeSec;
        }
        
        function formatDuration(seconds) {
            if (seconds < 0) seconds = 0;
            if (seconds === 0) return "0 Seconds";
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            const parts = [];
            if (days > 0) parts.push(`${days}d`);
            if (hours > 0) parts.push(`${hours}h`);
            if (minutes > 0) parts.push(`${minutes}m`);
            if (secs > 0 || parts.length === 0) parts.push(`${secs}s`);
            return parts.join(' ');
        }
        
        function formatDurationLong(seconds) {
            if (seconds < 0) seconds = 0;
            if (seconds === 0) return "0 Seconds";
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            const parts = [];
            if (days > 0) parts.push(`${days} day${days !== 1 ? 's' : ''}`);
            if (hours > 0) parts.push(`${hours} hour${hours !== 1 ? 's' : ''}`);
            if (minutes > 0) parts.push(`${minutes} minute${minutes !== 1 ? 's' : ''}`);
            if (secs > 0 || parts.length === 0) parts.push(`${secs} second${secs !== 1 ? 's' : ''}`);
            return parts.join(' ');
        }
        
        function formatDurationShort(seconds) {
            if (seconds < 0) seconds = 0;
            if (seconds === 0) return "0h";
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            if (days > 0) return `${days}d ${hours}h`;
            return `${hours}h`;
        }

        function showLoading(msg) {
            if ($('#global-loading-overlay').length) return;
            $('body').append(`<div id="global-loading-overlay" class="loading-overlay"><div class="loading-content"><div class="loading-spinner"></div><p style="margin:0">${msg}</p></div></div>`);
        }
        
        function hideLoading() { $('#global-loading-overlay').remove(); }
        
        function destroyDataTable() {
            if (dataTable) {
                dataTable.destroy();
                dataTable = null;
            }
            $('#downtimeTable tbody').empty();
        }

        // ======================== FETCH & PROCESS ========================
        async function generateReport() {
            const fromDateStr = $('#fromDate').val();
            const toDateStr = $('#toDate').val();
            
            if (!fromDateStr || !toDateStr) {
                Swal.fire({ icon: 'warning', title: 'Missing Dates', text: 'Please select both From and To dates', confirmButtonColor: '#0f5b9c', toast: true, timer: 2000 });
                return;
            }
            
            showLoading('Loading data...');
            
            // Destroy existing DataTable before loading new data
            destroyDataTable();
            
            // Hide summary and footer until data loads
            $('#summaryStats, #totalFooter').hide();
            
            const range = `${DATA_SHEET_NAME}!A:G`;
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${DATA_SHEET_ID}/values/${range}?key=${API_KEY}`;
            
            try {
                const resp = await fetch(url);
                const data = await resp.json();
                
                if (!data.values || data.values.length < 2) {
                    hideLoading();
                    $('#downtimeTable tbody').html('<tr><td colspan="6" class="text-center py-3">No power data found</td></tr>');
                    Swal.fire({ icon: 'info', title: 'No Data', text: 'No power data found', confirmButtonColor: '#0f5b9c' });
                    return;
                }
                
                const sheetRows = data.values;
                const startIdx = (sheetRows[0][0] && sheetRows[0][0].toString().toLowerCase().includes("id")) ? 1 : 0;
                const fromDateObj = parseDMY(fromDateStr);
                const toDateObj = parseDMY(toDateStr);
                
                // Get filter settings
                const enableTime = $('#enableTimeFilter').is(':checked');
                const enableConfirm = $('#enableConfirmFilter').is(':checked');
                const confirmValue = $('#confirmSelect').val();
                const fromTimeStr = $('#fromTime').val() || "10:00:00";
                const toTimeStr = $('#toTime').val() || "17:15:00";
                const fromTimeSec = (() => { const t = fromTimeStr.split(':'); return parseInt(t[0])*3600 + parseInt(t[1])*60 + parseInt(t[2]||0); })();
                const toTimeSec = (() => { const t = toTimeStr.split(':'); return parseInt(t[0])*3600 + parseInt(t[1])*60 + parseInt(t[2]||0); })();
                
                // Store filter info for PDF
                currentFilterInfo = {
                    fromDate: fromDateStr,
                    toDate: toDateStr,
                    enableTime: enableTime,
                    fromTime: fromTimeStr,
                    toTime: toTimeStr,
                    enableConfirm: enableConfirm,
                    confirmStatus: confirmValue === 'all' ? 'All' : (confirmValue === 'confirmed' ? 'Confirmed (Yes)' : 'Not Confirmed (Blank)')
                };
                
                let allRecords = [];
                for (let i = startIdx; i < sheetRows.length; i++) {
                    const row = sheetRows[i];
                    if (row.length >= 6 && row[0]) {
                        const recordDate = row[2] || "";
                        const recordDateObj = parseDMY(recordDate);
                        const confirmStatus = (row[6] || "").trim();
                        
                        let include = true;
                        if (enableConfirm) {
                            if (confirmValue === 'confirmed') include = (confirmStatus === "Yes");
                            else if (confirmValue === 'notconfirmed') include = (confirmStatus === "");
                        }
                        
                        if (recordDateObj && fromDateObj && toDateObj && recordDateObj >= fromDateObj && recordDateObj <= toDateObj && include) {
                            allRecords.push({
                                branch: row[1] || "", date: row[2] || "", time: row[3] || "",
                                status: row[4] || "", timestampISO: row[5] || "", confirm: confirmStatus
                            });
                        }
                    }
                }
                
                allRecords.sort((a, b) => a.branch.localeCompare(b.branch) || (a.timestampISO || "").localeCompare(b.timestampISO || ""));
                
                const branchMap = new Map();
                for (const record of allRecords) {
                    if (!branchMap.has(record.branch)) branchMap.set(record.branch, []);
                    branchMap.get(record.branch).push(record);
                }
                
                let downtimeEvents = [];
                let ongoingCount = 0;
                
                for (const [branch, records] of branchMap.entries()) {
                    let i = 0;
                    while (i < records.length) {
                        const current = records[i];
                        if (current.status === "Down") {
                            const downDateTime = parseDateTime(current.date, current.time);
                            
                            // Apply time filter
                            if (enableTime && !isTimeInRange(downDateTime, fromTimeSec, toTimeSec)) {
                                i++;
                                continue;
                            }
                            
                            let j = i + 1;
                            while (j < records.length && records[j].status !== "Up") j++;
                            if (j < records.length && records[j].status === "Up") {
                                const upEvent = records[j];
                                const upDateTime = parseDateTime(upEvent.date, upEvent.time);
                                let durationSeconds = (downDateTime && upDateTime) ? Math.max(0, Math.floor((upDateTime - downDateTime) / 1000)) : 0;
                                downtimeEvents.push({
                                    branch, downDateTime, downDate: current.date, downTime: current.time,
                                    upDate: upEvent.date, upTime: upEvent.time, duration: durationSeconds,
                                    status: "Resolved", hasValidPair: true
                                });
                                i = j + 1;
                            } else {
                                downtimeEvents.push({
                                    branch, downDateTime, downDate: current.date, downTime: current.time,
                                    upDate: "—", upTime: "Ongoing", duration: 0, status: "Ongoing", hasValidPair: false
                                });
                                ongoingCount++;
                                i++;
                            }
                        } else { i++; }
                    }
                }
                
                downtimeEvents.sort((a, b) => (a.downDateTime||0) - (b.downDateTime||0));
                currentEventsData = downtimeEvents;
                
                const totalDurationSeconds = downtimeEvents.filter(e => e.status === "Resolved").reduce((sum, e) => sum + e.duration, 0);
                const uniqueTreasuries = new Set(downtimeEvents.map(e => e.branch)).size;
                
                $('#totalTreasuries').text(uniqueTreasuries);
                $('#totalIncidents').text(downtimeEvents.length);
                $('#totalDowntime').text(formatDurationShort(totalDurationSeconds));
                $('#ongoingIncidents').text(ongoingCount);
                $('#summaryStats').show();
                $('#totalDuration').text(formatDurationLong(totalDurationSeconds));
                $('#totalFooter').show();
                
                renderTable(downtimeEvents);
                hideLoading();
                
                if (downtimeEvents.length === 0) {
                    Swal.fire({ icon: 'info', title: 'No Events', text: 'No matching events found', confirmButtonColor: '#0f5b9c', toast: true, timer: 2000 });
                }
            } catch (err) {
                console.error(err);
                hideLoading();
                $('#downtimeTable tbody').html('<tr><td colspan="6" class="text-center py-3">Error loading data. Please check connection.</td></tr>');
                Swal.fire({ icon: 'error', title: 'Error', text: 'Could not fetch data', confirmButtonColor: '#0f5b9c' });
            }
        }

        function renderTable(events) {
            const tbody = $("#downtimeTable tbody");
            
            // Clear and destroy existing DataTable
            if (dataTable) {
                dataTable.destroy();
                dataTable = null;
            }
            tbody.empty();
            
            if (events.length === 0) {
                tbody.html('<tr><td colspan="6" class="text-center py-3">No events found</td></tr>');
                return;
            }
            
            let html = '';
            for (let i = 0; i < events.length; i++) {
                const e = events[i];
                let statusBadge = e.status === "Resolved" ? '<span class="badge-up">✓ Resolved</span>' : '<span class="badge-ongoing">⚠ Ongoing</span>';
                let downDisplay = `<span class="badge-down">DOWN</span> ${e.downDate} ${e.downTime}`;
                let upDisplay = e.upTime === "Ongoing" ? '<span class="badge-ongoing">?</span> No restoration' : `<span class="badge-up">UP</span> ${e.upDate} ${e.upTime}`;
                let durationDisplay = e.status === "Resolved" ? `<span class="duration-badge">⏱ ${formatDuration(e.duration)}</span>` : '<span class="duration-badge">— Excluded</span>';
                html += `<tr>
                            <td>${i+1}</td>
                            <td><strong>${escapeHtml(e.branch)}</strong></td>
                            <td>${downDisplay}</td>
                            <td>${upDisplay}</td>
                            <td>${statusBadge}</td>
                            <td>${durationDisplay}</td>
                         </tr>`;
            }
            tbody.html(html);
            
            // Initialize new DataTable
            dataTable = $("#downtimeTable").DataTable({ 
                paging: false, 
                searching: true, 
                ordering: true, 
                info: true, 
                language: { 
                    search: "Filter:", 
                    info: "Showing _START_ to _END_ of _TOTAL_ entries" 
                },
                destroy: true
            });
        }

        function escapeHtml(str) { 
            if (!str) return ''; 
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
        }

        // ======================== EXPORTS ========================
        function getExportData() {
            return currentEventsData.map((e, i) => ({
                "#": i+1, 
                "Treasury": e.branch, 
                "Down Time": `${e.downDate} ${e.downTime}`,
                "Up Time": e.upTime === "Ongoing" ? "No Up Record" : `${e.upDate} ${e.upTime}`,
                "Status": e.status, 
                "Duration": e.status === "Resolved" ? formatDuration(e.duration) : "Excluded"
            }));
        }
        
        function exportToExcel() {
            if (!currentEventsData.length) { Swal.fire('No Data', 'No data to export', 'info'); return; }
            const ws = XLSX.utils.json_to_sheet(getExportData());
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Downtime_Report");
            XLSX.writeFile(wb, `downtime_${new Date().toISOString().slice(0,10)}.xlsx`);
        }
        
        function exportToCSV() {
            if (!currentEventsData.length) { Swal.fire('No Data', 'No data to export', 'info'); return; }
            const csv = XLSX.utils.sheet_to_csv(XLSX.utils.json_to_sheet(getExportData()));
            saveAs(new Blob(["\uFEFF" + csv], {type:"text/csv;charset=utf-8"}), `downtime_${new Date().toISOString().slice(0,10)}.csv`);
        }
        
        function exportToPDF() {
            if (!currentEventsData.length) { Swal.fire('No Data', 'No data to export', 'info'); return; }
            const { jsPDF } = window.jspdf;
            // Use portrait orientation
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm' });
            
            const tableData = currentEventsData.map((e, i) => [
                i+1, 
                e.branch, 
                `${e.downDate} ${e.downTime}`, 
                e.upTime === "Ongoing" ? "Missing" : `${e.upDate} ${e.upTime}`, 
                e.status, 
                e.status === "Resolved" ? formatDuration(e.duration) : "Excluded"
            ]);
            
            // Calculate total resolved duration
            const totalResolvedSecs = currentEventsData.filter(e => e.status === "Resolved").reduce((s, e) => s + e.duration, 0);
            
            // Header with title
            doc.setFontSize(16);
            doc.text("Power Down Hours Report", 14, 15);
            
            // Filter criteria section
            doc.setFontSize(9);
            let yPos = 25;
            doc.text(`Period: ${currentFilterInfo.fromDate || $('#fromDate').val()} to ${currentFilterInfo.toDate || $('#toDate').val()}`, 14, yPos);
            yPos += 6;
            
            if (currentFilterInfo.enableTime) {
                doc.text(`Time Filter: ${currentFilterInfo.fromTime} - ${currentFilterInfo.toTime} (24h)`, 14, yPos);
                yPos += 6;
            }
            
            if (currentFilterInfo.enableConfirm) {
                doc.text(`Confirmation Filter: ${currentFilterInfo.confirmStatus}`, 14, yPos);
                yPos += 6;
            }
            
            doc.text(`Note: Only resolved incidents (with Up timestamp) contribute to total downtime.`, 14, yPos + 3);
            
            // AutoTable
            doc.autoTable({ 
                head: [["#", "Treasury", "Down Time", "Up Time", "Status", "Duration"]], 
                body: tableData, 
                startY: yPos + 10, 
                theme: 'striped', 
                headStyles: { fillColor: [15, 91, 156], textColor: 255 },
                columnStyles: {
                    0: { cellWidth: 10 },
                    1: { cellWidth: 35 },
                    2: { cellWidth: 35 },
                    3: { cellWidth: 35 },
                    4: { cellWidth: 20 },
                    5: { cellWidth: 25 }
                }
            });
            
            const finalY = doc.lastAutoTable.finalY + 8;
            doc.setFontSize(10);
            doc.text(`Total Downtime (Resolved incidents only): ${formatDurationLong(totalResolvedSecs)}`, 14, finalY);
            
            // Add footer with generation date
            doc.setFontSize(8);
            doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, doc.internal.pageSize.height - 10);
            
            doc.save(`downtime_report_${new Date().toISOString().slice(0,10)}.pdf`);
        }

        // ======================== DATE & FILTER CONTROLS ========================
        function setDefaultDates() {
            const now = new Date();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            flatpickrFrom = flatpickr("#fromDate", { dateFormat: "d/m/Y", defaultDate: firstDay });
            flatpickrTo = flatpickr("#toDate", { dateFormat: "d/m/Y", defaultDate: lastDay });
        }
        
        function toggleTimeFilter() {
            const enabled = $('#enableTimeFilter').is(':checked');
            $('#fromTime, #toTime').prop('disabled', !enabled);
        }
        
        function toggleConfirmFilter() {
            const enabled = $('#enableConfirmFilter').is(':checked');
            $('#confirmSelect').prop('disabled', !enabled);
        }

        $(document).ready(function() {
            setDefaultDates();
            $('#enableTimeFilter').on('change', toggleTimeFilter);
            $('#enableConfirmFilter').on('change', toggleConfirmFilter);
            
            // View button click - always fetch fresh data
            $('#generateReportBtn').on('click', function() {
                generateReport();
            });
            
            // Month buttons
            $('#currentMonthBtn').on('click', function() {
                const now = new Date();
                flatpickrFrom.setDate(new Date(now.getFullYear(), now.getMonth(), 1));
                flatpickrTo.setDate(new Date(now.getFullYear(), now.getMonth() + 1, 0));
                generateReport();
            });
            
            $('#previousMonthBtn').on('click', function() {
                const now = new Date();
                flatpickrFrom.setDate(new Date(now.getFullYear(), now.getMonth() - 1, 1));
                flatpickrTo.setDate(new Date(now.getFullYear(), now.getMonth(), 0));
                generateReport();
            });
            
            // Export buttons
            $('#exportExcelBtn').on('click', exportToExcel);
            $('#exportCsvBtn').on('click', exportToCSV);
            $('#exportPdfBtn').on('click', exportToPDF);
            
            // Initialize filter states
            toggleTimeFilter();
            toggleConfirmFilter();
            
            // Initial load
            setTimeout(() => generateReport(), 300);
        });
    </script>
</body>
</html>
