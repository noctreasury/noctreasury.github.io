<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NOC · Today's Active Logins</title>
    <!-- LOCAL CSS & JS (using ./css and ./js paths) -->
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/dataTables.bootstrap5.min.css">
   
    
    <style>
        :root {
            --primary: #0f5b9c;
            --primary-dark: #1a4b7a;
            --primary-light: #e8f0fe;
            --success: #10b981;
            --warning: #f59e0b;
            --dark: #1e293b;
            --light: #f8fafc;
            --border: #e9ecef;
        }
        
        body {
             background: #fff0;

            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px 16px;
            color: var(--dark);
        }
        
        .dashboard-container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        /* Header Section */
       .page-header {
    padding: 15px 2px !important;
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
    flex-wrap: wrap !important;
    justify-content: space-between !important;
 
}
.page-header-left {
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
}

.page-header-left i {
    font-size: 1.8rem !important;
    background: rgb(56 143 251 / 15%) !important;
    padding: 10px !important;
    border-radius: 12px !important;
    color: #184f83 !important;
}


.page-header-left h1 {
    margin: 0 !important;
    font-size: 1.8rem !important;
    font-weight: 700 !important;
    color: #184f83!important;
}
 .page-header-left p {
            margin: 2px 0 0 !important;
            opacity: 0.7 !important;
            font-size: 0.75rem !important;
 }

        
        .title-section h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        
        .title-section h1 i {
            background: none;
            color: var(--success);
        }
        
        .title-section p {
            margin: 6px 0 0;
            color: #5a6e8a;
            font-size: 0.85rem;
        }
        
        .date-badge {
            background: var(--primary-light);
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid var(--primary);
        }
        
        .date-badge i {
            color: var(--primary);
            margin-right: 8px;
        }
        
        .date-badge span {
            font-weight: 600;
            color: var(--primary-dark);
        }
        
        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 18px 22px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        
        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
        }
        
        .stat-icon.total {
            background: #e8f0fe;
            color: var(--primary);
        }
        
        .stat-icon.users {
            background: #e6f7e6;
            color: #0b5e42;
        }
        
        .stat-icon.branches {
            background: #fff3e0;
            color: #b45309;
        }
        
        .stat-info h3 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.2;
        }
        
        .stat-info p {
            margin: 5px 0 0;
            color: #64748b;
            font-size: 0.85rem;
        }
        
        /* Table Card */
        .table-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            overflow-x: auto;
        }
        
        .table thead th {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 14px 12px;
            white-space: nowrap;
            border-bottom: none;
        }
        
        .table td {
            padding: 12px 12px;
            vertical-align: middle;
            font-size: 0.85rem;
            color: #334155;
        }
        
        .table tbody tr:hover {
            background-color: #f8fafc;
        }
        
        .branch-badge {
            background: #e8f0fe;
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.75rem;
            font-family: monospace;
            display: inline-block;
        }
        
        .user-badge {
            background: #e6f7e6;
            color: #0b5e42;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.75rem;
        }
        
        .login-time {
            font-family: monospace;
            font-size: 0.75rem;
            color: #5b6e8c;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #64748b;
        }
        
        .empty-state i {
            font-size: 3rem;
            color: var(--primary-light);
            margin-bottom: 15px;
        }
        
        .error-message {
            background: #fee9e7;
            color: #ef4444;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border-left: 4px solid #ef4444;
        }
        
        .dataTables_wrapper .dataTables_filter input {
            border-radius: 30px;
            padding: 6px 15px;
            border: 1px solid var(--border);
            background: white;
        }
        
        .dataTables_wrapper .dataTables_length select {
            border-radius: 20px;
            padding: 4px 8px;
        }
        
        @media (max-width: 768px) {
            body { padding: 16px; }
            .stats-row { grid-template-columns: 1fr; gap: 12px; }
            .page-header { flex-direction: column; align-items: flex-start; }
            .table-card { padding: 12px; }
        }
        
        .spinner-sm {
            width: 32px;
            height: 32px;
            border: 3px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .table td code {
            background: #f1f5f9;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        
        .badge-time {
            background: #e8f0fe;
            color: var(--primary);
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
<div class="page-header">
                <div class="page-header-left">
                   <i class="bi bi-calendar-check-fill"></i>
                    <div>
                        <h1>Today's Active Logins</h1>
                        <p> Users & branches who logged in today</p>
                    </div>
                </div>
  <div class="date-badge">
            <i class="bi bi-calendar3"></i>
            <span id="todayDate">Loading...</span>
        </div>
            </div>


<div class="dashboard-container">

    <!-- Stats Cards -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon total">
                <i class="bi bi-people-fill"></i>
            </div>
            <div class="stat-info">
                <h3 id="totalActive">0</h3>
                <p>Total Active Today</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon users">
                <i class="bi bi-person-badge"></i>
            </div>
            <div class="stat-info">
                <h3 id="totalUsers">0</h3>
                <p>Users Logged In</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon branches">
                <i class="bi bi-building"></i>
            </div>
            <div class="stat-info">
                <h3 id="totalBranches">0</h3>
                <p>Branches Logged In</p>
            </div>
        </div>
    </div>
    
    <!-- Data Table -->
    <div class="table-card">
        <div id="tableLoader" style="text-align:center; padding:60px;">
            <div class="spinner-sm"></div>
            <p class="mt-3 text-muted">Fetching today's active logins...</p>
        </div>
        <div id="tableWrapper" style="display:none;">
            <table id="activeTable" class="table table-hover" style="width:100%">
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>ID / Branch Code</th>
                        <th>Name</th>
                        <th>Menu Access</th>
                        <th>Email ID</th>
                        <th>Login Time</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
        <div id="emptyContainer" style="display:none;">
            <div class="empty-state">
                <i class="bi bi-emoji-smile"></i>
                <h5>No active logins today</h5>
                <p class="text-muted">No users or branches have logged in on <span id="emptyDate"></span></p>
            </div>
        </div>
        <div id="errorContainer" style="display:none;"></div>
    </div>
</div>

<script src="./js/jquery.min.js"></script>
<script src="./js/bootstrap.bundle.min.js"></script>
<script src="./js/jquery.dataTables.min.js"></script>
<script src="./js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
    const SPREADSHEET_ID = '1jd1xZe9x2mrZm5KAwGT12vMNYjbrnynsmelNKeK95jc';
    const SHEET_NAME = 'Login';
    const API_KEY = 'AIzaSyBB1V3vJpNZ9X1GIF-YOwoa6YSt_iXMLo0';
    
    let activeRecords = [];
    let dataTable = null;
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function getTodayDateComponents() {
        const today = new Date();
        return {
            day: today.getDate(),
            month: today.getMonth() + 1,
            year: today.getFullYear()
        };
    }
    
    function getFormattedTodayDate() {
        const today = new Date();
        const day = String(today.getDate()).padStart(2, '0');
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const year = today.getFullYear();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        return today.toLocaleDateString('en-IN', options);
    }
    
    // Parse Indian date format: dd/mm/yyyy
    function parseIndianDate(dateStr) {
        if (!dateStr || dateStr.trim() === '') return null;
        const parts = dateStr.split('/');
        if (parts.length === 3) {
            const day = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10);
            const year = parseInt(parts[2], 10);
            if (!isNaN(day) && !isNaN(month) && !isNaN(year)) {
                return { day, month, year };
            }
        }
        return null;
    }
    
    // Check if timestamp (dd/mm/yyyy hh:mm:ss) is from today
    function isLoginToday(timestampStr) {
        if (!timestampStr || timestampStr.trim() === '') return false;
        
        const spaceIndex = timestampStr.indexOf(' ');
        let dateStr = timestampStr;
        if (spaceIndex !== -1) {
            dateStr = timestampStr.substring(0, spaceIndex);
        }
        
        const loginDate = parseIndianDate(dateStr);
        if (!loginDate) return false;
        
        const today = getTodayDateComponents();
        
        return loginDate.day === today.day && 
               loginDate.month === today.month && 
               loginDate.year === today.year;
    }
    
    // Extract only the time part (hh:mm:ss) from full timestamp
    function extractTime(timestampStr) {
        if (!timestampStr || timestampStr.trim() === '') return '—';
        const spaceIndex = timestampStr.indexOf(' ');
        if (spaceIndex !== -1) {
            return timestampStr.substring(spaceIndex + 1).trim();
        }
        return '—';
    }
    
    function isBranch(code) {
        if (!code) return false;
        const upper = code.toString().trim().toUpperCase();
        return upper.startsWith('BR') && /^BR\d+/.test(upper);
    }
    
    function processLoginData(rows) {
        if (!rows || rows.length < 2) return [];
        
        const activeRecordsList = [];
        
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || row.length < 4) continue;
            
            const branchUser = row[0] ? row[0].toString().trim() : '';
            const userId = row[1] ? row[1].toString().trim() : '';
            const menuAccess = row[3] ? row[3].toString().trim() : '';
            const email = row[4] ? row[4].toString().trim() : '';
            const loginTimestamp = row[6] ? row[6].toString().trim() : '';
            
            if (branchUser === '' && userId === '') continue;
            
            // Only include if logged in today
            if (!isLoginToday(loginTimestamp)) continue;
            
            const isBranchRecord = isBranch(branchUser) || isBranch(userId);
            const displayCode = isBranchRecord ? (branchUser || userId) : (userId || branchUser);
            const displayName = !isBranchRecord ? (branchUser || userId) : (branchUser || 'Branch User');
            const type = isBranchRecord ? '🏢 Branch' : '👤 User';
            const loginTimeOnly = extractTime(loginTimestamp);
            
            activeRecordsList.push({
                type: type,
                code: displayCode,
                name: displayName,
                menu: menuAccess || '—',
                email: email || '—',
                loginTime: loginTimeOnly,
                fullTimestamp: loginTimestamp
            });
        }
        
        // Sort by login time (latest first)
        activeRecordsList.sort((a, b) => {
            return b.fullTimestamp.localeCompare(a.fullTimestamp);
        });
        
        return activeRecordsList;
    }
    
    function renderTable(records) {
        const tbody = $('#tableBody');
        tbody.empty();
        
        if (!records || records.length === 0) {
            $('#tableWrapper').hide();
            $('#tableLoader').hide();
            $('#emptyContainer').show();
            $('#emptyDate').text(getFormattedTodayDate());
            $('#errorContainer').hide();
            $('#totalActive').text('0');
            $('#totalUsers').text('0');
            $('#totalBranches').text('0');
            return;
        }
        
        $('#emptyContainer').hide();
        $('#errorContainer').hide();
        
        let userCount = 0;
        let branchCount = 0;
        
        records.forEach(rec => {
            if (rec.type === '👤 User') userCount++;
            else branchCount++;
            
            const row = `
                <tr>
                    <td><span class="${rec.type === '👤 User' ? 'user-badge' : 'branch-badge'}">${rec.type}</span></td>
                    <td><code>${escapeHtml(rec.code)}</code></div></td>
                    <td><strong>${escapeHtml(rec.name)}</strong></div></div></td>
                    <td><span class="badge bg-light text-dark">${escapeHtml(rec.menu)}</span></div></div></div></div></div></div></div></div></td>
                    <td><small>${escapeHtml(rec.email)}</small></div></td>
                    <td class="login-time"><span class="badge-time"><i class="bi bi-clock"></i> ${escapeHtml(rec.loginTime)}</span></div></td>
                </tr>
            `;
            tbody.append(row);
        });
        
        // Update stats
        $('#totalActive').text(records.length);
        $('#totalUsers').text(userCount);
        $('#totalBranches').text(branchCount);
        
        // Initialize DataTable
        if (dataTable) {
            dataTable.clear();
            dataTable.destroy();
            dataTable = null;
        }
        
        dataTable = $('#activeTable').DataTable({
            pageLength: 25,
            lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "All"]],
            order: [[5, 'desc']], // Sort by login time (column index 5) descending
            language: {
                search: "Search:",
                searchPlaceholder: "Type name, branch, email...",
                lengthMenu: "Show _MENU_ entries",
                info: "Showing _START_ to _END_ of _TOTAL_ active logins",
                infoEmpty: "No active logins",
                paginate: {
                    first: '<i class="bi bi-chevron-double-left"></i>',
                    previous: '<i class="bi bi-chevron-left"></i>',
                    next: '<i class="bi bi-chevron-right"></i>',
                    last: '<i class="bi bi-chevron-double-right"></i>'
                }
            }
        });
        
        $('#tableWrapper').show();
        $('#tableLoader').hide();
    }
    
    async function fetchActiveLogins() {
        $('#tableLoader').show();
        $('#tableWrapper').hide();
        $('#emptyContainer').hide();
        $('#errorContainer').hide();
        
        try {
            const range = encodeURIComponent(`${SHEET_NAME}!A:G`);
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}?key=${API_KEY}`;
            
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const data = await response.json();
            if (!data.values || data.values.length < 2) {
                throw new Error('No login data found in the Login sheet');
            }
            
            const activeList = processLoginData(data.values);
            activeRecords = activeList;
            renderTable(activeRecords);
            
        } catch (err) {
            console.error('Fetch error:', err);
            $('#tableLoader').hide();
            $('#errorContainer').html(`
                <div class="error-message">
                    <i class="bi bi-exclamation-triangle-fill fs-4"></i>
                    <strong>Failed to load active logins</strong><br>
                    ${escapeHtml(err.message)}<br>
                    <small class="text-muted">Verify spreadsheet ID, API key, and sheet name "Login".</small>
                </div>
            `).show();
        }
    }
    
    // Set today's date in header
    function setTodayDate() {
        const formattedDate = getFormattedTodayDate();
        $('#todayDate').text(formattedDate);
    }
    
    $(document).ready(function() {
        setTodayDate();
        fetchActiveLogins();
    });
    
    window.addEventListener('beforeunload', function() {
        if (dataTable) {
            dataTable.destroy();
        }
    });
</script>

</style>
</body>
