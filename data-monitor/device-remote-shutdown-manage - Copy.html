<div class="footer-note">

<!-- SCRIPTS -->
<script src="../js/jquery.min.js"></script>
<script src="../js/bootstrap.bundle.min.js"></script>
<script src="../js/select2.min.js"></script>
<script src="../js/flatpickr.min.js"></script>
<script src="../js/sweetalert2.min.js"></script>

<script>
// ============================================================
//  CONFIGURATION
// ============================================================

// IMPORTANT: Replace this URL with your deployed Apps Script URL
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTCjW0tn9vEoD8ms-YwBTPC6WW6OpcLeko7L9rkg4Iqs8J5u-buUsw8MLz_SpsJ9sI_A/exec";
const SHEET_ID = "1dMKhs6mIicwqRIbakYp7mzI8CXGbJ-VXHkmNXDRT8wA";
const SHEET_NAME = "Data";
const API_KEY = "AIzaSyDc8tegwi2rgHyDFYm7uWBqVqQ7Fwb3uWM";

// ============================================================
//  HELPERS
// ============================================================

function getTodayDate() {
    const now = new Date();
    const d = String(now.getDate()).padStart(2, '0');
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const y = now.getFullYear();
    return `${d}/${m}/${y}`;
}

function getCurrentTime24h() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    return `${h}:${m}`;
}

function getPreviousDate() {
    const now = new Date();
    now.setDate(now.getDate() - 1);
    const d = String(now.getDate()).padStart(2, '0');
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const y = now.getFullYear();
    return `${d}/${m}/${y}`;
}

function formatTimeDisplay(time24h) {
    if (!time24h) return '';
    try {
        const parts = time24h.match(/(\d{1,2}):(\d{2})/);
        if (!parts) return time24h;
        let hours = parseInt(parts[1]);
        const minutes = parts[2];
        const ampm = hours >= 12 ? 'PM' : 'AM';
        if (hours > 12) hours -= 12;
        if (hours === 0) hours = 12;
        return `${hours}:${minutes} ${ampm}`;
    } catch (e) {
        return time24h;
    }
}

function isEmpty(value) {
    if (value === null || value === undefined) return true;
    if (typeof value === 'string') {
        return value.trim() === '';
    }
    return false;
}

function isBlankOrEmpty(value) {
    if (value === null || value === undefined) return true;
    if (typeof value === 'string') {
        const trimmed = value.trim();
        return trimmed === '' || trimmed === '\u00A0';
    }
    return false;
}

// ============================================================
//  DATE CONVERSION FUNCTIONS
// ============================================================

function convertToDDMMYYYY(dateValue) {
    if (!dateValue) return '';
    
    const str = dateValue.toString().trim();
    
    if (str.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
        return str;
    }
    
    let match = str.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2}):(\d{2})$/);
    if (match) {
        const [, year, month, day] = match;
        return `${day}/${month}/${year}`;
    }
    
    match = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (match) {
        const [, year, month, day] = match;
        return `${day}/${month}/${year}`;
    }
    
    match = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if (match) {
        const [, month, day, year] = match;
        return `${day}/${month}/${year}`;
    }
    
    try {
        const date = new Date(str);
        if (!isNaN(date.getTime())) {
            const d = String(date.getDate()).padStart(2, '0');
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const y = date.getFullYear();
            return `${d}/${m}/${y}`;
        }
    } catch (e) {}
    
    if (!isNaN(str) && Number(str) > 0) {
        try {
            const excelDate = new Date((Number(str) - 25569) * 86400 * 1000);
            const d = String(excelDate.getDate()).padStart(2, '0');
            const m = String(excelDate.getMonth() + 1).padStart(2, '0');
            const y = excelDate.getFullYear();
            if (y > 2000) {
                return `${d}/${m}/${y}`;
            }
        } catch (e) {}
    }
    
    return str;
}

// ============================================================
//  READ DATA FROM GOOGLE SHEETS API
// ============================================================

async function readSheetData(range) {
    try {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        return data;
    } catch (err) {
        console.error('Error reading sheet:', err);
        throw err;
    }
}

// ============================================================
//  UPDATE DATA VIA APPS SCRIPT (no-cors - fire and forget)
// ============================================================

async function updateSheetViaAppsScript(action, data = {}) {
    const payload = { action, ...data };
    
    try {
        // Use no-cors mode - this will not return a response body
        await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload)
        });
        
        // With no-cors, we can't read the response, so we assume success
        return { status: 'success', message: 'Request sent successfully' };
    } catch (err) {
        console.error('Update error:', err);
        throw err;
    }
}

// ============================================================
//  TAB SWITCHING
// ============================================================

function switchTab(tab) {
    if (tab === 'confirm') {
        $('#confirmPane').addClass('active-pane');
        $('#powerOnPane').removeClass('active-pane');
        $('#tabConfirmBtn').addClass('active');
        $('#tabPowerOnBtn').removeClass('active');
    } else {
        $('#powerOnPane').addClass('active-pane');
        $('#confirmPane').removeClass('active-pane');
        $('#tabPowerOnBtn').addClass('active');
        $('#tabConfirmBtn').removeClass('active');
    }
}

$('#tabConfirmBtn').on('click', () => switchTab('confirm'));
$('#tabPowerOnBtn').on('click', () => switchTab('powerOn'));

// ============================================================
//  FLATPICKR DATE PICKER
// ============================================================

flatpickr("#confirmDate", {
    dateFormat: "d/m/Y",
    defaultDate: getTodayDate(),
    allowInput: true
});

flatpickr("#powerOnDate", {
    dateFormat: "d/m/Y",
    defaultDate: getPreviousDate(),
    allowInput: true
});

// ============================================================
//  LOADING OVERLAY
// ============================================================

function showLoading() {
    $('#loadingOverlay').addClass('active');
}

function hideLoading() {
    $('#loadingOverlay').removeClass('active');
}

// ============================================================
//  TAB 1: SHUTDOWN CONFIRMATION
// ============================================================

$('#viewConfirmBtn').on('click', async function() {
    const $btn = $(this);
    const date = $('#confirmDate').val();
    const $statusMsg = $('#confirmStatusMsg');
    
    if (!date) {
        Swal.fire({ icon: 'warning', title: 'Date required', text: 'Please enter a date in DD/MM/YYYY format.' });
        return;
    }
    
    if (!date.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
        Swal.fire({ icon: 'warning', title: 'Invalid Date', text: 'Please use DD/MM/YYYY format (e.g., 18/07/2026).' });
        return;
    }
    
    $btn.html('<i class="bi bi-arrow-repeat"></i> Loading...');
    $btn.prop('disabled', true);
    $statusMsg.hide().removeClass('error success info');
    showLoading();
    
    try {
        const range = `${SHEET_NAME}!A:I`;
        const data = await readSheetData(range);
        
        if (!data.values || data.values.length < 2) {
            renderConfirmRecords([]);
            $statusMsg.addClass('info').html('<i class="bi bi-info-circle"></i> No data found in sheet.').show();
            return;
        }
        
        const rows = data.values.slice(1);
        const records = [];
        
        for (let i = 0; i < rows.length; i++) {
            const row = rows[i];
            if (!row || row.length === 0) continue;
            
            const branch = row[0] ? row[0].toString().trim() : '';
            if (!branch) continue;
            
            const rawDate = row.length > 3 ? (row[3] || "").toString().trim() : "";
            const convertedDate = convertToDDMMYYYY(rawDate);
            const confirmVal = row.length > 5 ? (row[5] || "").toString().trim() : "";
            
            if (convertedDate === date && !confirmVal) {
                records.push({
                    rowIndex: i + 2,
                    branch: branch,
                    deviceType: row.length > 1 ? (row[1] || "").toString().trim() : "",
                    serial: row.length > 2 ? (row[2] || "").toString().trim() : "",
                    date: convertedDate,
                    time: row.length > 4 ? (row[4] || "").toString().trim() : "",
                    confirm: "Pending"
                });
            }
        }
        
        renderConfirmRecords(records);
        
        if (records.length === 0) {
            $statusMsg.addClass('info').html(`<i class="bi bi-info-circle"></i> No pending requests found for date: <strong>${date}</strong>.`).show();
        } else {
            $statusMsg.addClass('info').html(`<i class="bi bi-list"></i> Found ${records.length} pending request(s) for date: <strong>${date}</strong>.`).show();
        }
        
    } catch (err) {
        console.error('Error:', err);
        $statusMsg.addClass('error').html('<i class="bi bi-exclamation-triangle"></i> Failed to load records. Check console for details.').show();
        Swal.fire({ icon: 'error', title: 'Error', text: err.message });
    } finally {
        $btn.html('<i class="bi bi-search"></i> View Requests');
        $btn.prop('disabled', false);
        hideLoading();
    }
});

function renderConfirmRecords(records) {
    const container = $('#confirmRecordsContainer');
    
    if (!records || records.length === 0) {
        container.html(`
            <div class="no-data-message">
                <i class="bi bi-check-circle"></i>
                <h5>No Pending Requests</h5>
                <p>All requests for the selected date have been confirmed.</p>
            </div>
        `);
        return;
    }
    
    let html = `
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Branch</th>
                        <th>Device Type</th>
                        <th>Serial</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
    `;
    
    records.forEach((record, index) => {
        html += `
            <tr>
                <td>${index + 1}</td>
                <td><strong>${record.branch}</strong></td>
                <td>${record.deviceType}</td>
                <td>${record.serial}</td>
                <td>${record.date}</td>
                <td>${formatTimeDisplay(record.time)}</td>
                <td><span class="badge-pending"><i class="bi bi-clock"></i> ${record.confirm}</span></td>
                <td>
                    <button class="btn btn-success-custom confirm-btn" data-row="${record.rowIndex}" data-branch="${record.branch}">
                        <i class="bi bi-check2"></i> Confirm
                    </button>
                </td>
            </tr>
        `;
    });
    
    html += `
                </tbody>
            </table>
        </div>
        <div class="mt-2 text-muted small">Total: ${records.length} pending request(s)</div>
    `;
    
    container.html(html);
    
    $('.confirm-btn').on('click', async function() {
        const rowIndex = $(this).data('row');
        const branch = $(this).data('branch');
        const $btn = $(this);
        const $statusMsg = $('#confirmStatusMsg');
        
        const confirmResult = await Swal.fire({
            title: 'Confirm Shutdown?',
            text: `Are you sure you want to confirm shutdown for ${branch}?`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#059669',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Yes, Confirm!'
        });
        
        if (!confirmResult.isConfirmed) return;
        
        $btn.html('<i class="bi bi-arrow-repeat"></i>');
        $btn.prop('disabled', true);
        showLoading();
        
        try {
            await updateSheetViaAppsScript('UPDATE_CONFIRM', { rowIndex: rowIndex });
            
            Swal.fire({
                icon: 'success',
                title: 'Confirmed!',
                text: `Shutdown confirmation updated for ${branch}`,
                timer: 2000,
                showConfirmButton: false
            });
            
            setTimeout(() => {
                $('#viewConfirmBtn').click();
            }, 1000);
            
        } catch (err) {
            console.error('Error:', err);
            $statusMsg.addClass('error').html('<i class="bi bi-exclamation-triangle"></i> Failed to update confirmation.').show();
            Swal.fire({ icon: 'error', title: 'Error', text: 'Failed to update. Please try again.' });
            $btn.html('<i class="bi bi-check2"></i> Confirm');
            $btn.prop('disabled', false);
        } finally {
            hideLoading();
        }
    });
}

// ============================================================
//  TAB 2: DEVICE POWER ON VERIFICATION
// ============================================================

$('#viewPowerOnBtn').on('click', async function() {
    const $btn = $(this);
    const date = $('#powerOnDate').val();
    const $statusMsg = $('#powerOnStatusMsg');
    
    if (!date) {

        return;
    }
    
    if (!date.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
        Swal.fire({ icon: 'warning', title: 'Invalid Date', text: 'Please use DD/MM/YYYY format.' });
        return;
    }
    
    $btn.html('<i class="bi bi-arrow-repeat"></i> Loading...');
    $btn.prop('disabled', true);
    $statusMsg.hide().removeClass('error success info');
    showLoading();
    
    try {
        const range = `${SHEET_NAME}!A:I`;
        const data = await readSheetData(range);
        
        if (!data.values || data.values.length < 2) {
            renderPowerOnRecords([]);
            $statusMsg.addClass('info').html('<i class="bi bi-info-circle"></i> No data found in sheet.').show();
            return;
        }
        
        const rows = data.values.slice(1);
        const records = [];
        
        for (let i = 0; i < rows.length; i++) {
            const row = rows[i];
            if (!row || row.length === 0) continue;
            
            const branch = row[0] ? row[0].toString().trim() : '';
            if (!branch) continue;
            
            const rawDate = row.length > 3 ? (row[3] || "").toString().trim() : "";
            const convertedDate = convertToDDMMYYYY(rawDate);
            const confirmVal = row.length > 5 ? (row[5] || "").toString().trim() : "";
            const restartedVal = row.length > 6 ? (row[6] || "").toString().trim() : "";
            
            if (convertedDate === date && confirmVal === "Yes" && !restartedVal) {
                records.push({
                    rowIndex: i + 2,
                    branch: branch,
                    deviceType: row.length > 1 ? (row[1] || "").toString().trim() : "",
                    serial: row.length > 2 ? (row[2] || "").toString().trim() : "",
                    date: convertedDate,
                    time: row.length > 4 ? (row[4] || "").toString().trim() : "",
                    confirm: confirmVal,
                    restarted: "Pending"
                });
            }
        }
        
        renderPowerOnRecords(records);
        
        if (records.length === 0) {
            $statusMsg.addClass('info').html(`<i class="bi bi-info-circle"></i> No pending power on verifications found for date: <strong>${date}</strong>.`).show();
        } else {
            $statusMsg.addClass('info').html(`<i class="bi bi-list"></i> Found ${records.length} pending power on verification(s) for date: <strong>${date}</strong>.`).show();
        }
        
    } catch (err) {
        console.error('Error:', err);
        $statusMsg.addClass('error').html('<i class="bi bi-exclamation-triangle"></i> Failed to load records.').show();
        Swal.fire({ icon: 'error', title: 'Error', text: err.message });
    } finally {
        $btn.html('<i class="bi bi-search"></i> View Requests');
        $btn.prop('disabled', false);
        hideLoading();
    }
});

function renderPowerOnRecords(records) {
    const container = $('#powerOnRecordsContainer');
    
    if (!records || records.length === 0) {
        container.html(`
            <div class="no-data-message">
                <i class="bi bi-power"></i>
                <h5>No Pending Power On</h5>
                <p>All confirmed requests for the selected date have been powered on.</p>
            </div>
        `);
        return;
    }
    
    let html = `
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Branch</th>
                        <th>Device Type</th>
                        <th>Serial</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
    `;
    
    records.forEach((record, index) => {
        html += `
            <tr>
                <td>${index + 1}</td>
                <td><strong>${record.branch}</strong></td>
                <td>${record.deviceType}</td>
                <td>${record.serial}</td>
                <td>${record.date}</td>
                <td>${formatTimeDisplay(record.time)}</td>
                <td><span class="badge-confirmed"><i class="bi bi-check-circle-fill"></i> Confirmed</span></td>
                <td>
                    <button class="btn btn-success-custom power-on-btn" data-row="${record.rowIndex}" data-branch="${record.branch}">
                        <i class="bi bi-power"></i> Power On
                    </button>
                </td>
            </tr>
        `;
    });
    
    html += `
                </tbody>
            </table>
        </div>
        <div class="mt-2 text-muted small">Total: ${records.length} pending power on verification(s)</div>
    `;
    
    container.html(html);
    
    $('.power-on-btn').on('click', async function() {
        const rowIndex = $(this).data('row');
        const branch = $(this).data('branch');
        const $btn = $(this);
        const $statusMsg = $('#powerOnStatusMsg');
        
        const confirmResult = await Swal.fire({
            title: 'Verify Power On?',
            text: `Confirm that device at ${branch} has been powered on?`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#059669',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Yes, Power On!'
        });
        
        if (!confirmResult.isConfirmed) return;
        
        $btn.html('<i class="bi bi-arrow-repeat"></i>');
        $btn.prop('disabled', true);
        showLoading();
        
        const restartDate = getTodayDate();
        const restartTime = getCurrentTime24h();
        
        try {
            await updateSheetViaAppsScript('UPDATE_POWER_ON', { 
                rowIndex: rowIndex,
                restartDate: restartDate,
                restartTime: restartTime
            });
            
            Swal.fire({
                icon: 'success',
                title: 'Power On Verified!',
                text: `Device at ${branch} marked as powered on.`,
                timer: 2000,
                showConfirmButton: false
            });
            
            setTimeout(() => {
                $('#viewPowerOnBtn').click();
            }, 1000);
            
        } catch (err) {
            console.error('Error:', err);
            $statusMsg.addClass('error').html('<i class="bi bi-exclamation-triangle"></i> Failed to update power on status.').show();
            Swal.fire({ icon: 'error', title: 'Error', text: err.message });
            $btn.html('<i class="bi bi-power"></i> Power On');
            $btn.prop('disabled', false);
        } finally {
            hideLoading();
        }
    });
}
