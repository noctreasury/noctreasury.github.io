
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ISP Issue Report | Treasury Filtered View</title>
    <!-- Local CSS Resources -->
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="../css/sweetalert2.min.css">
     <link rel="stylesheet" href="../css/all-in-one.css">
</head>
<body>
<div class="page-header">
                <div class="page-header-left">
              <i class="bi bi-file-text-fill"></i>
                    <div>
                        <h1>ISP Issue Report</h1>
                        <p>ISP Issue Report</p>
                    </div>
                </div>
            </div>
<div class="app-card">
       
    <div class="filter-card no-print" style="display:none">
        <div class="row">
            <div class="col-md-5 filter-group">
                <label><i class="bi bi-building"></i> Branch </label>
                <input type="text" id="branchInput" class="form-control" readonly placeholder="Detecting branch...">
            </div>
            <div class="col-md-5 filter-group">
                <label><i class="bi bi-bank2"></i>Treasury Name</label>
                <input type="text" id="treasuryInput" class="form-control" readonly placeholder="">
            </div>
            <div class="col-md-2 filter-group d-flex align-items-end">
                <button id="refreshReportBtn" class="btn btn-primary-custom w-100" style="background:#0f3b5f; border:none; padding:10px; border-radius:40px; font-weight:600;">
                    <i class="bi bi-arrow-repeat"></i> Refresh
                </button>
            </div>
        </div>
        <div class="row mt-2">
            <div class="col-12">
                         </div>
        </div>
    </div>
    
    <div id="reportPreview">
        <div class="report-title-section">
            <div class="d-flex justify-content-between align-items-center flex-wrap">
                <div>
                    <h5 class="mb-0">ISP Fault Register</h5>
                    <small class="text-muted">Generated on: <span id="reportDate"></span></small>
                </div>
                <div>
                    <span class="stats-badge" id="recordCountBadge">0 Records</span>
                </div>
            </div>
            <div id="criteriaInfo" style="margin-top: 10px; font-size: 13px; color: #2c3e66; background: #f1f5f9; padding: 8px 12px; border-radius: 12px;"></div>
        </div>
        
        <div class="table-responsive" style="padding: 0 25px 25px 25px;">
            <table id="reportTable" class="table table-striped table-hover table-bordered" style="width:100%">
                <thead>
                    <tr>
                        <th>Sl. No</th><th>Treasury Name</th><th>Connection</th><th>Circuit ID/Telephone</th>
                        <th>Call Registered Date</th><th>Last Followed up Details</th><th>Remarks</th><th>Link Status</th><th>Resolve Status</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
   </div>

<!-- Scripts -->
<script src="../js/jquery.min.js"></script>
<script src="../js/bootstrap.bundle.min.js"></script>
<script src="../js/jquery.dataTables.min.js"></script>
<script src="../js/dataTables.bootstrap5.min.js"></script>
<script src="../js/sweetalert2.all.min.js"></script>

<script>
    // ======================== CONFIGURATION ========================
    const SPREADSHEET_ID = "1T7GsX08h9B6tT7doDjfg4MgULk7JZaOa1YT7cF_otQI";
    const API_KEY = "AIzaSyDc8tegwi2rgHyDFYm7uWBqVqQ7Fwb3uWM";
    const SHEET_TREASURIES = "Treasuries and  Code";  
    const SHEET_DETAILS = "Details";                    
    
    let globalTreasuryName = null;
    let globalBranchValue = null;
    let faultRecords = [];
    let filteredRecords = [];
    let dataTable = null;
    
    // Helper: get branch from browser cache (same logic as branch-power-status-update.html)
    function getBranchFromStorage() {
        let branch = null;
        
        // 1. Try sessionStorage currentUser
        const sessionUser = sessionStorage.getItem('currentUser');
        if (sessionUser) {
            try {
                const userData = JSON.parse(sessionUser);
                branch = userData.username;
                console.log("[Branch] Retrieved from sessionStorage:", branch);
                if(branch) return branch;
            } catch (e) { console.error('Error parsing session user:', e); }
        }
        
        // 2. Try localStorage currentUser
        const localUser = localStorage.getItem('currentUser');
        if (localUser) {
            try {
                const userData = JSON.parse(localUser);
                branch = userData.username;
                console.log("[Branch] Retrieved from localStorage:", branch);
                if(branch) return branch;
            } catch (e) { console.error('Error parsing local user:', e); }
        }
        
        // 3. Try selectedBranch key
        const selectedBranch = localStorage.getItem('selectedBranch');
        if (selectedBranch) {
            branch = selectedBranch;
            console.log("[Branch] Retrieved from selectedBranch:", branch);
            if(branch) return branch;
        }
        
        console.warn("[Branch] No branch found in any storage");
        return null;
    }
    
    // Show/hide global loader
    function showLoading(msg) { 
        if($('#global-loading-overlay').length) return; 
        $('body').append(`<div id="global-loading-overlay"><div style="background:white;padding:30px;border-radius:24px;text-align:center;"><i class="bi bi-arrow-repeat" style="font-size:48px;color:#0f3b5f;animation:spin 1s linear infinite;"></i><p style="margin-top:12px;">${msg}</p></div></div>`); 
    }
    function hideLoading() { $('#global-loading-overlay').remove(); }
    
    function escapeHtml(str) { 
        if(!str) return ''; 
        return String(str).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); 
    }
    
    // Parse date DD/MM/YYYY for sorting (newest first)
    function parseDateDMY(dateStr) {
        if (!dateStr) return null;
        const parts = dateStr.split('/');
        if (parts.length === 3) {
            const day = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10) - 1;
            const year = parseInt(parts[2], 10);
            return new Date(year, month, day);
        }
        return null;
    }
    
    // 1. Fetch Treasury Name based on Branch (Column C matches branch, return Column A)
    async function fetchTreasuryByBranch(branchValue) {
        if (!branchValue) return null;
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(SHEET_TREASURIES)}?key=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();
            const rows = data.values || [];
            if (rows.length < 2) {
                console.warn("Treasuries sheet has no data rows");
                return null;
            }
            
            // Assume first row is header. Look for column C (index 2) matching branchValue, return column A (index 0)
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const branchCell = row[2] ? row[2].toString().trim() : "";    // Column C
                const treasuryCell = row[0] ? row[0].toString().trim() : "";   // Column A
                if (branchCell && branchCell.toLowerCase() === branchValue.toLowerCase().trim()) {
                    console.log(`[Mapping] Branch "${branchValue}" matched to Treasury "${treasuryCell}"`);
                    return treasuryCell;
                }
            }
            console.warn(`[Mapping] No treasury found for branch: ${branchValue}`);
            return null;
        } catch (err) {
            console.error("Error fetching treasuries sheet:", err);
            return null;
        }
    }
    
    // 2. Fetch all fault records from "Details" sheet (columns A:I as per isp-issue-report)
    async function loadFaultRecords() {
        showLoading("Loading fault register data...");
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(SHEET_DETAILS)}!A:I?key=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();
            const rows = data.values || [];
            if (!rows || rows.length < 2) {
                hideLoading();
                return [];
            }
            
            const records = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.length > 0 && row[0] && row[0].toString().trim() !== "") {
                    records.push({
                        slNo: i,
                        refNo: row[0] || "",
                        treasuryName: row[1] ? row[1].toString().trim() : "",
                        connection: row[2] || "",
                        circuitId: row[3] || "",
                        callDate: row[4] || "",
                        lastFollowup: row[5] || "",
                        remarks: row[6] || "",
                        linkStatus: row[7] || "Link Down",
                        resolveStatus: row[8] || ""
                    });
                }
            }
            console.log(`[FaultRecords] Loaded ${records.length} total records`);
            hideLoading();
            return records;
        } catch (err) {
            console.error("Error loading fault records:", err);
            hideLoading();
            Swal.fire({ icon: 'error', title: 'Data Load Error', text: 'Could not fetch ISP issues. Check network or API key.', confirmButtonColor: '#0f3b5f' });
            return [];
        }
    }
    
    // Filter records matching treasury name, sort newest first by callDate (descending)
    function filterAndSortByTreasury(records, treasuryName) {
        if (!treasuryName) return [];
        let filtered = records.filter(record => {
            const recordTreasury = record.treasuryName ? record.treasuryName.toString().trim() : "";
            return recordTreasury === treasuryName;
        });
        
        // Sort by Call Registered Date: newest first (descending)
        filtered.sort((a, b) => {
            const dateA = parseDateDMY(a.callDate);
            const dateB = parseDateDMY(b.callDate);
            if (!dateA && !dateB) return 0;
            if (!dateA) return 1;   // null dates go to bottom
            if (!dateB) return -1;
            return dateB - dateA;    // descending (newest first)
        });
        
        return filtered;
    }
    
    // Render DataTable with the filtered records (sl no auto-generated based on sorted order)
    function renderDataTable(records) {
        const tableData = records.map((record, idx) => ({
            slNo: idx + 1,
            treasuryName: record.treasuryName,
            connection: record.connection,
            circuitId: record.circuitId,
            callDate: record.callDate,
            lastFollowup: record.lastFollowup,
            remarks: record.remarks,
            linkStatus: record.linkStatus,
            resolveStatus: record.resolveStatus
        }));
        
        if (dataTable) {
            dataTable.clear();
            dataTable.rows.add(tableData);
            dataTable.draw();
        } else {
            initDataTable(tableData);
        }
        
        // Update stats & info
        $('#recordCountBadge').text(`${records.length} Record${records.length !== 1 ? 's' : ''}`);
        const criteriaHtml = `<i class="bi bi-filter-circle-fill"></i> <strong>Treasury Filter:</strong> ${globalTreasuryName ? escapeHtml(globalTreasuryName) : 'Not Found'} &nbsp;|&nbsp; <strong>Branch:</strong> ${globalBranchValue ? escapeHtml(globalBranchValue) : 'Not Detected'} &nbsp;|&nbsp; <strong>Sorted by:</strong> Newest Call Date first`;
        $('#criteriaInfo').html(criteriaHtml);
    }
    
    function initDataTable(data) {
        if (dataTable) dataTable.destroy();
        dataTable = $('#reportTable').DataTable({
            data: data,
            columns: [
                { data: "slNo", title: "Sl. No" },
                { data: "treasuryName", title: "Treasury Name" },
                { data: "connection", title: "Connection" },
                { data: "circuitId", title: "Circuit ID/Telephone", render: d => d ? escapeHtml(d) : '-' },
                { data: "callDate", title: "Call Registered Date", render: d => d ? escapeHtml(d) : '-' },
                { data: "lastFollowup", title: "Last Followed up Details", render: d => d ? (d.length > 60 ? escapeHtml(d.substring(0, 60)) + "..." : escapeHtml(d)) : '-' },
                { data: "remarks", title: "Remarks", render: d => d ? (d.length > 50 ? escapeHtml(d.substring(0, 50)) + "..." : escapeHtml(d)) : '-' },
                { data: "linkStatus", title: "Link Status", render: function(d) {
                    if (!d || d === "Link Down") return '<span class="badge-down">Link Down</span>';
                    if (d === "Link Up") return '<span class="badge-up">Link Up</span>';
                    return `<span class="badge-other">${escapeHtml(d)}</span>`;
                } },
                { data: "resolveStatus", title: "Resolve Status", render: function(d) {
                    const status = (d || "").toString().trim();
                    if (status.toLowerCase() === "pending") return '<span class="badge-pending">Pending</span>';
                    if (status.toLowerCase() === "resolved") return '<span class="badge-resolved">Resolved</span>';
                    return status ? `<span class="badge-other">${escapeHtml(status)}</span>` : '<span class="badge-pending">Pending</span>';
                } }
            ],
            order: [[4, 'desc']],   // default order by date column descending, but our pre-sorted data ensures newest first anyway
            pageLength: 25,
            language: { search: "Search:", lengthMenu: "Show _MENU_ entries", info: "Showing _START_ to _END_ of _TOTAL_ records", zeroRecords: "No records found for this treasury", emptyTable: "No data available" }
        });
    }
    
    // Main flow: get branch => fetch treasury => load faults => filter & render
    async function loadCompleteReport() {
        showLoading("Fetching branch & treasury mapping...");
        
        // Step 1: Get branch from cache
        globalBranchValue = getBranchFromStorage();
        if (!globalBranchValue) {
            hideLoading();
            $('#branchInput').val('Not detected. Please login again.');
            $('#treasuryInput').val('Unable to map');
            $('#criteriaInfo').html('<i class="bi bi-exclamation-triangle-fill text-danger"></i> No branch found in browser cache. Please login via main application.');
            Swal.fire({
                icon: 'warning',
                title: 'Branch Not Detected',
                text: 'Unable to retrieve branch from session/local storage. Please login again through the main app.',
                confirmButtonColor: '#0f3b5f'
            });
            if(dataTable) dataTable.clear().draw();
            $('#recordCountBadge').text('0 Records');
            return;
        }
        
        $('#branchInput').val(globalBranchValue);
        
        // Step 2: Fetch treasury name using branch (sheet: Treasuries and Code, col C = branch, col A = treasury)
        const treasury = await fetchTreasuryByBranch(globalBranchValue);
        globalTreasuryName = treasury;
        
        if (!globalTreasuryName) {
            hideLoading();
            $('#treasuryInput').val('No matching treasury found');
            $('#criteriaInfo').html(`<i class="bi bi-exclamation-triangle-fill text-warning"></i> Branch "${escapeHtml(globalBranchValue)}" has no mapped treasury in "Treasuries and Code" sheet.`);
            if(dataTable) dataTable.clear().draw();
            $('#recordCountBadge').text('0 Records');
            Swal.fire({
                icon: 'info',
                title: 'Treasury Not Mapped',
                text: `Branch "${globalBranchValue}" does not have a corresponding treasury in the master sheet. Contact admin.`,
                confirmButtonColor: '#0f3b5f'
            });
            return;
        }
        
        $('#treasuryInput').val(globalTreasuryName);
        
        // Step 3: Load all fault records from Details sheet
        const allRecords = await loadFaultRecords();
        if (allRecords.length === 0) {
            hideLoading();
            $('#criteriaInfo').html(`<i class="bi bi-database-slash"></i> No fault records found in sheet.`);
            if(dataTable) dataTable.clear().draw();
            $('#recordCountBadge').text('0 Records');
            return;
        }
        
        // Step 4: Filter records where treasuryName matches, then sort newest first
        const filtered = filterAndSortByTreasury(allRecords, globalTreasuryName);
        filteredRecords = filtered;
        
        // Step 5: Render table
        renderDataTable(filteredRecords);
        hideLoading();
        
        if (filteredRecords.length === 0) {
            Swal.fire({
                icon: 'info',
                title: 'No Issues Found',
                text: `No ISP fault records found for treasury: ${globalTreasuryName}`,
                confirmButtonColor: '#0f3b5f',
                timer: 2500
            });
        } else {
            // Optional small toast
            console.log(`Loaded ${filteredRecords.length} records for treasury ${globalTreasuryName}`);
        }
    }
    
    // Set current timestamp on report
    function setReportDate() {
        const now = new Date();
        $('#reportDate').text(now.toLocaleDateString('en-GB', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }));
    }
    
    // Refresh handler
    async function refreshReport() {
        await loadCompleteReport();
        Swal.fire({
            icon: 'success',
            title: 'Report Refreshed',
            text: `Showing latest records for treasury: ${globalTreasuryName || 'N/A'}`,
            timer: 1500,
            showConfirmButton: false
        });
    }
    
    // On document ready
    $(async function() {
        setReportDate();
        $('#refreshReportBtn').on('click', refreshReport);
        await loadCompleteReport();
    });
</script>
</body>
</html>
