<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ISP Fault Reports | Multi‑Connection Filter</title>
    <!-- Local CSS Resources -->
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="../css/select2.min.css">
    <link rel="stylesheet" href="../css/select2-bootstrap-5-theme.min.css">
    <link rel="stylesheet" href="../css/flatpickr.min.css">
    <link rel="stylesheet" href="../css/sweetalert2.min.css">
    <link rel="stylesheet" href="../css/all-in-one.css">
</head>
<body>
<div class="page-header">
                <div class="page-header-left">
             <i class="bi bi-file-text-fill"></i>
                    <div>
                        <h1>ISP Fault Reports · Multi‑Connection</h1>
                        <p>ISP Fault Reports · Multi‑Connection</p>
                    </div>
                </div>
            </div>
<div class="app-card">
    
    
    <div class="filter-bar no-print">
        <div class="filter-group">
            <label><i class="bi bi-hdd-stack"></i> ISP Connection (multi)</label>
            <select id="connectionFilterSelect" class="form-select" multiple="multiple">
                <!-- options populated by JS -->
            </select>
        </div>
        <div class="filter-group">
            <label><i class="bi bi-plug"></i> Link Status</label>
            <select id="linkStatusFilterSelect" class="form-select">
                <option value="ALL">-- All Link Status --</option>
            </select>
        </div>
        <div class="filter-group">
            <label><i class="bi bi-calendar"></i> Date Range</label>
            <div class="d-flex gap-2">
                <input type="text" id="fromDate" class="form-control flatpickr-date" placeholder="From Date" style="width:140px">
                <input type="text" id="toDate" class="form-control flatpickr-date" placeholder="To Date" style="width:140px">
            </div>
        </div>
        <div class="filter-group">
            <label><i class="bi bi-tag"></i> Resolve Status</label>
            <select id="resolveStatusFilter" class="form-select" style="width:100%">
                <option value="ALL">-- All Records --</option>
            </select>
        </div>
        <div class="filter-group">
            <label>&nbsp;</label>
            <div>
                <button id="applyFilterBtn" class="btn btn-primary-custom"><i class="bi bi-search"></i> View</button>
            </div>
        </div>
        <div class="filter-group text-end">
            <label>&nbsp;</label>
            <div class="btn-group-export">
                <button id="exportPdfBtn" class="btn btn-export-pdf"><i class="bi bi-file-pdf-fill"></i> PDF</button>
                <button id="exportCsvBtn" class="btn btn-export-csv">CSV</button>
            </div>
        </div>
    </div>
    
    <div id="reportPreview">
        <div class="report-title-section">
            <div class="d-flex justify-content-between align-items-center flex-wrap">
                <div>
                    <h4 class="mb-0">ISP Fault Register Report</h4>
                    <small class="text-muted">Generated on: <span id="reportDate"></span></small>
                </div>
                <div>
                    <span class="stats-badge" id="recordCountBadge">0 Records</span>
                    <span class="stats-badge ms-2" id="filterStatusBadge">Status: Pending</span>
                </div>
            </div>
            <div id="pdfCriteriaInfo" style="margin-top: 12px; font-size: 14px; color: #0d6efd; border-top: 1px solid #e0e0e0; padding-top: 8px;"></div>
        </div>
        
        <div class="table-responsive" style="padding: 0 25px 25px 25px;">
            <table id="reportTable" class="table table-striped table-hover table-bordered" style="width:100%">
                <thead>
                    <tr>
                        <th>Sl. No</th><th>Treasury Name</th><th>Connection</th><th>Circuit ID/Telephone</th>
                        <th>Call Registered Date</th><th>Last Followed up Details</th><th>Remarks</th><th>Link Status</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="../js/jquery.min.js"></script>
<script src="../js/bootstrap.bundle.min.js"></script>
<script src="../js/jquery.dataTables.min.js"></script>
<script src="../js/dataTables.bootstrap5.min.js"></script>
<script src="../js/select2.min.js"></script>
<script src="../js/flatpickr.min.js"></script>
<script src="../js/sweetalert2.all.min.js"></script>
<script src="../js/html2pdf.bundle.min.js"></script>

<script>
    const SPREADSHEET_ID = "1T7GsX08h9B6tT7doDjfg4MgULk7JZaOa1YT7cF_otQI";
    const API_KEY = "AIzaSyDc8tegwi2rgHyDFYm7uWBqVqQ7Fwb3uWM";
    const SHEET_FAULTS = "Details";
    const SHEET_RESOLVE = "Resolve Status";
    
    let faultRecords = [];
    let filteredRecords = [];
    let resolveStatusOptions = [];
    let connectionOptions = [];
    let linkStatusOptions = [];
    let dataTable = null;
    let flatpickrFrom, flatpickrTo;
    let criticalTreasuries = [];
    
    function showLoading(msg) { 
        if($('#global-loading-overlay').length) return; 
        $('body').append(`<div id="global-loading-overlay"><div style="background:white;padding:30px;border-radius:24px;text-align:center;"><i class="bi bi-arrow-repeat" style="font-size:48px;color:#0f3b5f;animation:spin 1s linear infinite;"></i><p>${msg}</p></div></div>`); 
    }
    function hideLoading() { $('#global-loading-overlay').remove(); }
    function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    
    function parseDateDMY(dateStr) {
        if (!dateStr) return null;
        const parts = dateStr.split('/');
        if (parts.length === 3) {
            const day = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10) - 1;
            const year = parseInt(parts[2], 10);
            return new Date(year, month, day);
        }
        return null;
    }
    
    function isPendingStatus(status) {
        if (!status || status.trim() === "") return true;
        const lowerStatus = status.toString().toLowerCase().trim();
        return lowerStatus === "pending";
    }
    
    function analyzeCriticalDownTreasuries() {
        const pendingRecords = faultRecords.filter(record => isPendingStatus(record.resolveStatus));
        const treasuryMap = new Map();
        pendingRecords.forEach(record => {
            const treasury = record.treasuryName;
            if (!treasury || treasury.trim() === "") return;
            if (!treasuryMap.has(treasury)) treasuryMap.set(treasury, new Set());
            if (record.connection && record.connection.trim()) treasuryMap.get(treasury).add(record.connection.trim());
        });
        const critical = [];
        for (const [treasury, connections] of treasuryMap.entries()) {
            if (connections.size > 1) {
                critical.push({ treasury, connections: Array.from(connections), connectionCount: connections.size });
            }
        }
        criticalTreasuries = critical;
        return critical;
    }
    
    function filterByTreasury(treasuryName) {
        $('#resolveStatusFilter').val("Pending").trigger('change');
        $('#connectionFilterSelect').val([]).trigger('change'); // clear multi
        $('#linkStatusFilterSelect').val("ALL").trigger('change');
        const fromDateVal = $('#fromDate').val();
        const toDateVal = $('#toDate').val();
        let fromDate = null, toDate = null;
        if (fromDateVal) fromDate = parseDateDMY(fromDateVal);
        if (toDateVal) toDate = parseDateDMY(toDateVal);
        let filtered = faultRecords.filter(record => isPendingStatus(record.resolveStatus));
        filtered = filtered.filter(record => record.treasuryName === treasuryName);
        if (fromDate || toDate) {
            filtered = filtered.filter(record => {
                if (!record.callDate) return (!fromDate && !toDate);
                const recordDate = parseDateDMY(record.callDate);
                if (!recordDate) return true;
                if (fromDate && recordDate < fromDate) return false;
                if (toDate && recordDate > toDate) return false;
                return true;
            });
        }
        filtered.sort((a,b) => (parseFloat(a.refNo) || 0) - (parseFloat(b.refNo) || 0));
        filteredRecords = filtered;
        updateReportTable();
        updateStats();
        updateCriteriaInfo();
        Swal.fire({ icon: "info", title: "Filtered by Treasury", text: `Showing ${filtered.length} pending record(s) for ${treasuryName}`, timer: 2000, showConfirmButton: false });
    }
    
    function showCriticalDownAlert() {
        const critical = analyzeCriticalDownTreasuries();
        if (critical.length === 0) return;
        let connectionsListHtml = '';
        critical.forEach(item => {
            connectionsListHtml += `
                <div class="critical-treasury-item" data-treasury="${escapeHtml(item.treasury)}">
                    <div class="critical-treasury-name">
                        <span><i class="bi bi-exclamation-triangle-fill"></i> ${escapeHtml(item.treasury)}</span>
                        <button class="view-details-btn" data-treasury="${escapeHtml(item.treasury)}">
                            <i class="bi bi-eye-fill"></i> View Details
                        </button>
                    </div>
                    <div class="critical-connections">
                        <strong>Critical Issue:</strong> ${item.connectionCount} connections affected (${escapeHtml(item.connections.join(', '))})
                    </div>
                </div>
            `;
        });
        Swal.fire({
            title: '<span style="color: #b91c1c;"><i class="bi bi-bell-fill"></i> CRITICAL DOWN ALERT</span>',
            html: `
                <div style="text-align: left;">
                    <p style="font-weight: 600; margin-bottom: 12px;">The following treasuries have <span style="color: #dc2626;">${critical.length} critical issue(s)</span>:</p>
                    <p style="font-size: 13px; color: #666; margin-bottom: 12px;"><i class="bi bi-info-circle"></i> A treasury is marked as CRITICAL when it has pending issues across multiple connections.</p>
                    <div class="critical-modal-list">${connectionsListHtml}</div>
                    <p style="margin-top: 15px; font-size: 12px; color: #856404; background: #fff3cd; padding: 8px; border-radius: 6px;"><i class="bi bi-exclamation-diamond-fill"></i> Click "View Details" to see pending records for that treasury.</p>
                </div>
            `,
            icon: 'error',
            confirmButtonText: 'Close',
            confirmButtonColor: '#0f3b5f',
            showCancelButton: false,
            backdrop: true,
            allowOutsideClick: false,
            didOpen: () => {
                document.querySelectorAll('.view-details-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const treasury = btn.getAttribute('data-treasury');
                        Swal.close();
                        filterByTreasury(treasury);
                    });
                });
                document.querySelectorAll('.critical-treasury-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        if (e.target.classList.contains('view-details-btn')) return;
                        const treasury = item.getAttribute('data-treasury');
                        Swal.close();
                        filterByTreasury(treasury);
                    });
                });
            }
        });
    }
    
    async function fetchSheetDataDirect(sheetName, range = "A:Z") {
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(sheetName)}!${range}?key=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();
            return data.values || [];
        } catch(e) { console.error(`Error fetching ${sheetName}:`, e); return []; }
    }
    
    async function loadResolveStatusOptions() {
        let resolveRows = await fetchSheetDataDirect(SHEET_RESOLVE, "A:A");
        resolveStatusOptions = [];
        if(resolveRows && resolveRows.length > 1) {
            for(let i = 1; i < resolveRows.length; i++) {
                let val = resolveRows[i][0] ? resolveRows[i][0].toString().trim() : "";
                if(val && val !== "Resolve Status") resolveStatusOptions.push(val);
            }
        }
        if (!resolveStatusOptions.includes("Pending")) resolveStatusOptions.unshift("Pending");
        if (!resolveStatusOptions.includes("Resolved")) resolveStatusOptions.push("Resolved");
    }
    
    async function loadFaultRecords() {
        showLoading("Loading fault records...");
        const rows = await fetchSheetDataDirect(SHEET_FAULTS, "A:I");
        hideLoading();
        if(!rows || rows.length < 2) return [];
        const records = [];
        const connectionSet = new Set();
        const linkStatusSet = new Set();
        for(let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if(row.length > 0 && row[0] && row[0].toString().trim() !== "") {
                const connectionVal = row[2] || "";
                const linkStatusVal = row[7] || "";
                if(connectionVal.trim()) connectionSet.add(connectionVal.trim());
                if(linkStatusVal && linkStatusVal.trim()) linkStatusSet.add(linkStatusVal.trim());
                else linkStatusSet.add("Link Down");
                records.push({
                    slNo: i,
                    refNo: row[0] || "",
                    treasuryName: row[1] || "",
                    connection: row[2] || "",
                    circuitId: row[3] || "",
                    callDate: row[4] || "",
                    lastFollowup: row[5] || "",
                    remarks: row[6] || "",
                    linkStatus: row[7] || "Link Down",
                    resolveStatus: row[8] || ""
                });
            }
        }
        records.sort((a, b) => (parseFloat(a.refNo) || 0) - (parseFloat(b.refNo) || 0));
        faultRecords = records;
        connectionOptions = Array.from(connectionSet).sort();
        linkStatusOptions = Array.from(linkStatusSet).sort();
        return records;
    }
    
    // multi-select with select2
    function populateConnectionFilter() {
        const connectionSelect = $('#connectionFilterSelect');
        connectionSelect.empty();
        connectionOptions.forEach(conn => {
            connectionSelect.append(`<option value="${escapeHtml(conn)}">${escapeHtml(conn)}</option>`);
        });
        connectionSelect.select2({
            theme: "bootstrap-5",
            placeholder: "-- All Connections (multi) --",
            width: '100%',
            allowClear: false,
            closeOnSelect: false,
            dropdownParent: $('.app-card')
        });
        // set default: no selection = all
        connectionSelect.val([]).trigger('change');
    }
    
    function populateLinkStatusFilter() {
        const linkStatusSelect = $('#linkStatusFilterSelect');
        linkStatusSelect.empty();
        linkStatusSelect.append('<option value="ALL">-- All Link Status --</option>');
        linkStatusOptions.forEach(status => {
            linkStatusSelect.append(`<option value="${escapeHtml(status)}">${escapeHtml(status)}</option>`);
        });
    }
    
    function setSmartPendingDateRange() {
        const pendingRecords = faultRecords.filter(record => isPendingStatus(record.resolveStatus) && record.callDate && record.callDate.trim() !== "");
        if(pendingRecords.length === 0) {
            $('#fromDate').val('');
            $('#toDate').val('');
            if(flatpickrFrom) flatpickrFrom.clear();
            if(flatpickrTo) flatpickrTo.clear();
            return false;
        }
        const sortedByDate = [...pendingRecords].sort((a,b) => {
            let dateA = parseDateDMY(a.callDate);
            let dateB = parseDateDMY(b.callDate);
            if(!dateA && !dateB) return 0;
            if(!dateA) return 1;
            if(!dateB) return -1;
            return dateA - dateB;
        });
        const earliestDate = sortedByDate[0].callDate;
        const latestDate = sortedByDate[sortedByDate.length-1].callDate;
        if(earliestDate) $('#fromDate').val(earliestDate);
        if(latestDate) $('#toDate').val(latestDate);
        if(flatpickrFrom && earliestDate) flatpickrFrom.setDate(earliestDate, false);
        if(flatpickrTo && latestDate) flatpickrTo.setDate(latestDate, false);
        return true;
    }
    
    function applyFilters() {
        const statusFilter = $('#resolveStatusFilter').val();
        // multi connection: get selected values
        const selectedConnections = $('#connectionFilterSelect').val() || [];
        const linkStatusFilter = $('#linkStatusFilterSelect').val();
        const fromDateVal = $('#fromDate').val();
        const toDateVal = $('#toDate').val();
        
        let fromDate = null, toDate = null;
        if (fromDateVal) fromDate = parseDateDMY(fromDateVal);
        if (toDateVal) toDate = parseDateDMY(toDateVal);
        
        let filtered = [...faultRecords];
        
        // Resolve status
        if (statusFilter === "ALL") {
            // keep all
        } else if (statusFilter === "Pending") {
            filtered = filtered.filter(record => isPendingStatus(record.resolveStatus));
        } else {
            filtered = filtered.filter(record => record.resolveStatus === statusFilter);
        }
        
        // Multi-connection filter: if selectedConnections length > 0, filter IN
        if (selectedConnections && selectedConnections.length > 0) {
            filtered = filtered.filter(record => selectedConnections.includes(record.connection));
        }
        
        if (linkStatusFilter !== "ALL") {
            filtered = filtered.filter(record => {
                const recordStatus = record.linkStatus || "Link Down";
                return recordStatus === linkStatusFilter;
            });
        }
        
        filtered = filtered.filter(record => {
            if (!record.callDate) return (!fromDate && !toDate);
            const recordDate = parseDateDMY(record.callDate);
            if (!recordDate) return true;
            if (fromDate && recordDate < fromDate) return false;
            if (toDate && recordDate > toDate) return false;
            return true;
        });
        
        filtered.sort((a,b) => (parseFloat(a.refNo) || 0) - (parseFloat(b.refNo) || 0));
        filteredRecords = filtered;
        updateReportTable();
        updateStats();
        updateCriteriaInfo();
        return filteredRecords;
    }
    
    function updateCriteriaInfo() {
        const statusText = $('#resolveStatusFilter option:selected').text();
        const selectedConnections = $('#connectionFilterSelect').val() || [];
        let connectionText = "All";
        if (selectedConnections.length > 0) {
            connectionText = selectedConnections.join(', ');
            if (connectionText.length > 30) connectionText = connectionText.substring(0, 30) + '…';
        }
        const linkStatusText = $('#linkStatusFilterSelect option:selected').text();
        const fromDate = $('#fromDate').val();
        const toDate = $('#toDate').val();
        let dateRangeText = "";
        if (fromDate && toDate) dateRangeText = ` | Date: ${fromDate} to ${toDate}`;
        else if (fromDate) dateRangeText = ` | From: ${fromDate}`;
        else if (toDate) dateRangeText = ` | To: ${toDate}`;
        
        let criticalAlertText = "";
        if (criticalTreasuries.length > 0) {
            criticalAlertText = ` | <span style="color: #dc2626; font-weight: bold;">⚠️ CRITICAL: ${criticalTreasuries.length} Treasury(s)</span>`;
        }
        $('#pdfCriteriaInfo').html(`<strong>Criteria:</strong> Resolve status: ${statusText} | Connection: ${connectionText} | Link status: ${linkStatusText !== "-- All Link Status --" ? linkStatusText : "All"}${dateRangeText}${criticalAlertText} | Total: ${filteredRecords.length}`);
    }
    
    function updateReportTable() {
        const tableData = filteredRecords.map((record, idx) => ({
            slNo: idx + 1,
            treasuryName: record.treasuryName,
            connection: record.connection,
            circuitId: record.circuitId,
            callDate: record.callDate,
            lastFollowup: record.lastFollowup,
            remarks: record.remarks,
            linkStatus: record.linkStatus
        }));
        
        if (dataTable) {
            dataTable.clear();
            dataTable.rows.add(tableData);
            dataTable.draw();
        } else {
            initDataTable(tableData);
        }
    }
    
    function initDataTable(data) {
        if (dataTable) dataTable.destroy();
        dataTable = $('#reportTable').DataTable({
            data: data,
            columns: [
                { data: "slNo" },
                { data: "treasuryName" },
                { data: "connection" },
                { data: "circuitId", render: d => d ? escapeHtml(d) : '-' },
                { data: "callDate", render: d => d ? escapeHtml(d) : '-' },
                { data: "lastFollowup", render: d => d ? (d.length > 50 ? escapeHtml(d.substring(0, 50)) + "..." : escapeHtml(d)) : '-' },
                { data: "remarks", render: d => d ? (d.length > 40 ? escapeHtml(d.substring(0, 40)) + "..." : escapeHtml(d)) : '-' },
                { data: "linkStatus", render: function(d) {
                    if (!d || d === "Link Down") return '<span class="badge-down">Link Down</span>';
                    if (d === "Link Up") return '<span class="badge-up">Link Up</span>';
                    return `<span class="badge-other">${escapeHtml(d)}</span>`;
                }}
            ],
            order: [[0, 'asc']],
            pageLength: 25,
            language: { search: "Search:", lengthMenu: "Show _MENU_ entries", info: "Showing _START_ to _END_ of _TOTAL_ records", zeroRecords: "No records found", emptyTable: "No data available" }
        });
    }
    
    function updateStats() {
        const statusText = $('#resolveStatusFilter option:selected').text();
        $('#recordCountBadge').text(`${filteredRecords.length} Record${filteredRecords.length !== 1 ? 's' : ''}`);
        $('#filterStatusBadge').text(`Status: ${statusText}`);
        if (criticalTreasuries.length > 0) {
            $('#filterStatusBadge').css('background', '#fee2e2').css('color', '#b91c1c');
        } else {
            $('#filterStatusBadge').css('background', '#e6f0fa').css('color', '#0f5b9c');
        }
    }
    
    function populateFilterDropdown() {
        const filterSelect = $('#resolveStatusFilter');
        filterSelect.empty();
        filterSelect.append('<option value="ALL">-- All Records --</option>');
        filterSelect.append('<option value="Pending" selected>Pending</option>');
        resolveStatusOptions.forEach(opt => {
            if (opt !== "Pending") filterSelect.append(`<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`);
        });
        filterSelect.select2({
            theme: "bootstrap-5",
            placeholder: "Select Status",
            width: '100%',
            dropdownParent: $('.app-card')
        });
        filterSelect.val("Pending").trigger('change');
    }
    
    // ---------- PDF export (multi-connection aware) ----------
    async function exportToPDF() {
        if (filteredRecords.length === 0) {
            Swal.fire({ icon: "warning", title: "No Data", text: "No records found to export.", confirmButtonColor: "#0f3b5f" });
            return;
        }
        showLoading("Generating PDF with table format...");
        try {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
            const statusText = $('#resolveStatusFilter option:selected').text();
            const selectedConnections = $('#connectionFilterSelect').val() || [];
            let connectionText = "All";
            if (selectedConnections.length > 0) connectionText = selectedConnections.join(', ');
            const linkStatusText = $('#linkStatusFilterSelect option:selected').text();
            const fromDate = $('#fromDate').val();
            const toDate = $('#toDate').val();
            let dateRangeText = (fromDate && toDate) ? `${fromDate} to ${toDate}` : (fromDate || toDate || 'All Dates');
            
            const pdfContainer = document.createElement('div');
            pdfContainer.className = 'pdf-report-container';
            pdfContainer.style.width = '100%';
            pdfContainer.style.padding = '20px';
            pdfContainer.style.backgroundColor = 'white';
            pdfContainer.style.fontFamily = 'Arial, Helvetica, sans-serif';
            pdfContainer.style.boxSizing = 'border-box';
            
            let htmlContent = `
                <div class="pdf-header">
                    <h2 style="margin: 0 0 5px 0; color: #1a4b7a;">ISP Fault Register Report</h2>
                    <div class="pdf-criteria">Generated on: ${dateStr}</div>
                    <div class="pdf-criteria">Resolve status: ${statusText} | Connection: ${connectionText} | Link Status: ${linkStatusText !== "-- All Link Status --" ? linkStatusText : "All"} | Date Range: ${dateRangeText}</div>
                    <div class="pdf-total">Total Records: ${filteredRecords.length}</div>
                </div>
                <table class="pdf-table" style="width: 100%; border-collapse: collapse; font-size: 8pt;">
                    <thead>
                        <tr>
                            <th style="border:1px solid black;padding:6px;background:#ddd;text-align:left;width:4%;">Sl No</th>
                            <th style="border:1px solid black;padding:6px;background:#ddd;text-align:left;width:12%;">Treasury Name</th>
                            <th style="border:1px solid black;padding:6px;background:#ddd;text-align:left;width:8%;">Connection</th>
                            <th style="border:1px solid black;padding:6px;background:#ddd;text-align:left;width:10%;">Circuit ID</th>
                            <th style="border:1px solid black;padding:6px;background:#ddd;text-align:left;width:8%;">Call Date</th>
                            <th style="border:1px solid black;padding:6px;background:#ddd;text-align:left;width:20%;">Last Followup</th>
                            <th style="border:1px solid black;padding:6px;background:#ddd;text-align:left;width:20%;">Remarks</th>
                            <th style="border:1px solid black;padding:6px;background:#ddd;text-align:left;width:8%;">Link Status</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            for (let idx = 0; idx < filteredRecords.length; idx++) {
                const record = filteredRecords[idx];
                let linkStatusText = record.linkStatus || 'Link Down';
                htmlContent += `
                    <tr>
                        <td style="border:1px solid black;padding:5px;">${idx + 1}</td>
                        <td style="border:1px solid black;padding:5px;">${escapeHtml(record.treasuryName || '')}</td>
                        <td style="border:1px solid black;padding:5px;">${escapeHtml(record.connection || '')}</td>
                        <td style="border:1px solid black;padding:5px;">${escapeHtml(record.circuitId || '-')}</td>
                        <td style="border:1px solid black;padding:5px;">${escapeHtml(record.callDate || '-')}</td>
                        <td style="border:1px solid black;padding:5px;">${escapeHtml((record.lastFollowup || '-').substring(0, 100))}</td>
                        <td style="border:1px solid black;padding:5px;">${escapeHtml((record.remarks || '-').substring(0, 80))}</td>
                        <td style="border:1px solid black;padding:5px;">${escapeHtml(linkStatusText)}</td>
                    </tr>
                `;
            }
            htmlContent += `</tbody></table><div class="pdf-footer" style="margin-top:15px;text-align:center;font-size:8px;color:#666;">---End of the Table---</div>`;
            pdfContainer.innerHTML = htmlContent;
            
            const style = document.createElement('style');
            style.textContent = `.pdf-table th, .pdf-table td { border: 1px solid #000000; padding: 5px; text-align: left; vertical-align: top; } .pdf-table th { background-color: #dddddd; }`;
            pdfContainer.appendChild(style);
            document.body.appendChild(pdfContainer);
            
            const opt = {
                margin: [0.4, 0.4, 0.4, 0.4],
                filename: `ISP_Fault_Report_${now.toISOString().slice(0,19).replace(/:/g, '-')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, letterRendering: true, useCORS: true, logging: false, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
            };
            if (typeof html2pdf !== 'undefined' && html2pdf) {
                await html2pdf().set(opt).from(pdfContainer).save();
            } else {
                throw new Error("html2pdf library not loaded");
            }
            document.body.removeChild(pdfContainer);
            hideLoading();
            Swal.fire({ icon: "success", title: "PDF Exported!", text: `Exported ${filteredRecords.length} rows in table format.`, timer: 2000, showConfirmButton: false });
        } catch(err) {
            hideLoading();
            console.error("PDF Export Error:", err);
            Swal.fire({ icon: "error", title: "Export Failed", text: "Failed to generate PDF. " + err.message, confirmButtonColor: "#dc2626" });
        }
    }
    
    function exportToCSV() {
        if (filteredRecords.length === 0) {
            Swal.fire({ icon: "warning", title: "No Data", text: "No records found to export.", confirmButtonColor: "#0f3b5f" });
            return;
        }
        showLoading("Generating CSV...");
        try {
            const headers = ["Sl. No","Treasury Name","Connection","Circuit ID/Telephone","Call Registered Date","Last Followed up Details","Remarks","Link Status"];
            const rows = filteredRecords.map((record, idx) => [
                idx+1, record.treasuryName, record.connection, record.circuitId || "", record.callDate || "",
                (record.lastFollowup || "").replace(/,/g,' ').replace(/\n/g,' '),
                (record.remarks || "").replace(/,/g,' ').replace(/\n/g,' '),
                record.linkStatus || ""
            ]);
            const csvContent = [headers.join(','), ...rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))].join('\n');
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            const now = new Date();
            link.setAttribute('href', url);
            link.setAttribute('download', `ISP_Fault_Report_${now.toISOString().slice(0,19).replace(/:/g,'-')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            hideLoading();
            Swal.fire({ icon: "success", title: "CSV Exported!", text: `Exported ${filteredRecords.length} records.`, timer: 2000, showConfirmButton: false });
        } catch(err) { hideLoading(); Swal.fire({ icon: "error", title: "Export Failed", text: "CSV generation error." }); }
    }
    
    function initFlatpickr() {
        flatpickrFrom = flatpickr("#fromDate", { dateFormat: "d/m/Y", placeholder: "DD/MM/YYYY", allowInput: true });
        flatpickrTo = flatpickr("#toDate", { dateFormat: "d/m/Y", placeholder: "DD/MM/YYYY", allowInput: true });
    }
    
    function setReportDate() {
        const now = new Date();
        $('#reportDate').text(now.toLocaleDateString('en-GB', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }));
    }
    
    // Event listeners
    $('#applyFilterBtn').on('click', () => { applyFilters(); Swal.fire({ icon:"success", title:"Filter Applied", text:`Showing ${filteredRecords.length} records`, timer:1500, showConfirmButton:false }); });
    $('#connectionFilterSelect').on('change', () => applyFilters());
    $('#linkStatusFilterSelect').on('change', () => applyFilters());
    $('#exportPdfBtn').on('click', exportToPDF);
    $('#exportCsvBtn').on('click', exportToCSV);
    
    $(async function() {
        showLoading("Loading pending fault records & analyzing critical issues...");
        await loadResolveStatusOptions();
        await loadFaultRecords();
        populateConnectionFilter();   // multi-select
        populateLinkStatusFilter();
        populateFilterDropdown();
        initFlatpickr();
        setReportDate();
        setSmartPendingDateRange();
        applyFilters();
        setTimeout(() => { showCriticalDownAlert(); }, 500);
        hideLoading();
    });
</script>
</body>
