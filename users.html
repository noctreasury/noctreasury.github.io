<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NOC · Treasury & Branch Login Directory</title>
    <!-- LOCAL CSS & JS (using ./css and ./js paths) -->
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/dataTables.bootstrap5.min.css">
   
    <style>
        :root {
            --primary: #0f5b9c;
            --primary-dark: #1a4b7a;
            --primary-light: #e8f0fe;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #1e293b;

            --border: #e9ecef;
        }
        
        body {
            background: #f0f5fa;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px 16px;
            color: var(--dark);
        }
        
        .dashboard-container {
            max-width: 100%;
            margin: 0 auto;
        }
        .modal-backdrop {background-color: #fff0;}
.page-header {
    padding: 15px 2px !important;
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
    flex-wrap: wrap !important;
    justify-content: space-between !important;
 
}
.page-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.page-header-left i {
    font-size: 1.8rem !important;
    background: rgb(56 143 251 / 15%) !important;
    padding: 10px !important;
    border-radius: 12px !important;
    color: #184f83 !important;
}


.page-header-left h1 {
    margin: 0 !important;
    font-size: 1.8rem !important;
    font-weight: 700 !important;
    color: #184f83!important;
}
 .page-header-left p {
            margin: 2px 0 0;
            opacity: 0.7;
            font-size: 0.75rem;
 }
        .stats-badge {
            display: flex;
            gap: 20px;
            background: var(--light);
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid var(--border);
        }
        
        .stats-badge span {
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .stats-badge i {
            margin-right: 6px;
            color: var(--primary);
        }
        
        .table-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            overflow-x: auto;
        }
        
        .table thead th {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 14px 12px;
            white-space: nowrap;
            border-bottom: none;
        }
        
        .table td {
            padding: 12px 12px;
            vertical-align: middle;
            font-size: 0.85rem;
            color: #334155;
        }
        
        .table tbody tr:hover {
            background-color: #f8fafc;
        }
        
        .branch-badge {
            background: #e8f0fe;
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.75rem;
            font-family: monospace;
            display: inline-block;
        }
        
        .user-badge {
            background: #e6f7e6;
            color: #0b5e42;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.75rem;
        }
        
        .login-time {
            font-family: monospace;
            font-size: 0.75rem;
            color: #5b6e8c;
        }
        
        .badge-active {
            background-color: #10b981 !important;
            padding: 5px 10px;
            font-weight: 500;
        }
        
        .badge-inactive {
            background-color: #94a3b8 !important;
        }
        
        .error-message {
            background: #fee9e7;
            color: var(--danger);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border-left: 4px solid var(--danger);
        }
        
        .dataTables_wrapper .dataTables_filter input {
            border-radius: 30px;
            padding: 6px 15px;
            border: 1px solid var(--border);
            background: white;
        }
        
        .dataTables_wrapper .dataTables_length select {
            border-radius: 20px;
            padding: 4px 8px;
        }
        
        @media (max-width: 768px) {
            body { padding: 16px; }
            .page-header { flex-direction: column; align-items: flex-start; }
            .table-card { padding: 12px; }
            .table td, .table th { padding: 8px 6px; font-size: 0.75rem; }
        }
        
        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: var(--primary);
            border-color: var(--primary);
            color: white !important;
        }
        
        .spinner-sm {
            width: 32px;
            height: 32px;
            border: 3px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .table td code {
            background: #f1f5f9;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
<div class="page-header">
                <div class="page-header-left">
                   <i class="bi bi-people-fill"></i>
                    <div>
                        <h1>Treasury & Branch Directory</h1>
                        <p>Treasury & Branch Directory </p>
                    </div>
                </div>
      <div class="stats-badge">
            <span><i class="bi bi-person-badge"></i> <span id="totalUsers">—</span> Users</span>
            <span><i class="bi bi-building"></i> <span id="totalBranches">—</span> Branches</span>
            <span><i class="bi bi-calendar-check"></i> <span id="activeToday">—</span> Logged in today</span>
        </div>
            </div>

<div class="dashboard-container">
  
    
    <div class="table-card">
        <div id="tableLoader" style="text-align:center; padding:60px;">
            <div class="spinner-sm"></div>
            <p class="mt-3 text-muted">Loading treasury & branch records from sheet...</p>
        </div>
        <div id="tableWrapper" style="display:none;">
            <table id="loginTable" class="table table-hover" style="width:100%">
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>ID / Branch Code</th>
                        <th>Treasury/Branch Name</th>
                        <th>Email ID</th>
                        <th>Last Login</th>
                        <th>Logged Today</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
        <div id="errorContainer" style="display:none;"></div>
    </div>
</div>

<script src="./js/jquery.min.js"></script>
<script src="./js/bootstrap.bundle.min.js"></script>
<script src="./js/jquery.dataTables.min.js"></script>
<script src="./js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
    // ============================================================
    // CONFIGURATION: Google Sheet details
    // Range includes column H (Treasury/Branch Name)
    // Columns: A=Type/UserFlag, B=ID/Code, C=Name (ignored, removed from display), 
    // D=MenuAccess(ignored), E=Email, F=(unused), G=Timestamp, H=Treasury/Branch Name
    // ============================================================
    const SPREADSHEET_ID = '1jd1xZe9x2mrZm5KAwGT12vMNYjbrnynsmelNKeK95jc';
    const SHEET_NAME = 'Login';
    const API_KEY = 'AIzaSyBB1V3vJpNZ9X1GIF-YOwoa6YSt_iXMLo0';
    
    let allRecords = [];
    let dataTable = null;
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function getTodayDateComponents() {
        const today = new Date();
        return {
            day: today.getDate(),
            month: today.getMonth() + 1,
            year: today.getFullYear()
        };
    }
    
    // Parse Indian date format: dd/mm/yyyy
    function parseIndianDate(dateStr) {
        if (!dateStr || dateStr.trim() === '') return null;
        const parts = dateStr.split('/');
        if (parts.length === 3) {
            const day = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10);
            const year = parseInt(parts[2], 10);
            if (!isNaN(day) && !isNaN(month) && !isNaN(year)) {
                return { day, month, year };
            }
        }
        return null;
    }
    
    // Check if the timestamp (dd/mm/yyyy hh:mm:ss) is from today
    function isLoginToday(timestampStr) {
        if (!timestampStr || timestampStr.trim() === '') return false;
        const spaceIndex = timestampStr.indexOf(' ');
        let dateStr = timestampStr;
        if (spaceIndex !== -1) {
            dateStr = timestampStr.substring(0, spaceIndex);
        }
        const loginDate = parseIndianDate(dateStr);
        if (!loginDate) return false;
        const today = getTodayDateComponents();
        return loginDate.day === today.day && 
               loginDate.month === today.month && 
               loginDate.year === today.year;
    }
    
    function formatTimestamp(timestampStr) {
        if (!timestampStr || timestampStr.trim() === '') return '—';
        return timestampStr.toString().trim();
    }
    
    // Branch detection (starts with BR followed by digits)
    function isBranch(code) {
        if (!code) return false;
        const upper = code.toString().trim().toUpperCase();
        return upper.startsWith('BR') && /^BR\d+/i.test(upper);
    }
    
    // Main processing: reads A:H (columns 0-7)
    // Column mapping: 
    // 0 -> A: Branch/User flag (branch code or user identifier)
    // 1 -> B: User ID / Branch code secondary
    // 2 -> C: Name (IGNORED, removed from display)
    // 3 -> D: Old Menu Access (IGNORED)
    // 4 -> E: Email ID
    // 5 -> F: (optional, unused)
    // 6 -> G: Last Login timestamp
    // 7 -> H: Treasury / Branch Name (source for the renamed column)
    function processLoginData(rows) {
        if (!rows || rows.length < 2) return [];
        
        const records = [];
        
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            // Ensure row has enough columns, fill missing with empty strings
            const col0 = row[0] ? row[0].toString().trim() : '';
            const col1 = row[1] ? row[1].toString().trim() : '';
            // col2 is Name - IGNORED completely, not used in display
            const col4 = row[4] ? row[4].toString().trim() : '';  // Email
            const col6 = row[6] ? row[6].toString().trim() : '';  // Last login timestamp
            // Treasury/Branch Name from column H (index 7)
            const col7 = row[7] ? row[7].toString().trim() : '';
            
            // Skip completely empty rows
            if (col0 === '' && col1 === '' && col4 === '' && col7 === '') continue;
            
            // Determine if it's a branch (based on common BR pattern in first or second column)
            const isBranchRecord = isBranch(col0) || isBranch(col1);
            
            // Display Code: for branches, show branch code; for users, show user ID
            let displayCode = '';
            if (isBranchRecord) {
                // Prioritize col0 if it's branch code, else col1
                displayCode = isBranch(col0) ? col0 : (isBranch(col1) ? col1 : (col0 || col1));
            } else {
                // Regular user: use user ID from col1 if exists, else col0
                displayCode = col1 || col0;
            }
            
            // If displayCode is still empty, use a placeholder
            if (!displayCode || displayCode === '') {
                displayCode = isBranchRecord ? 'BRANCH' : 'USER';
            }
            
            const type = isBranchRecord ? '🏢 Branch' : '👤 User';
            const activeToday = isLoginToday(col6);
            
            // Treasury/Branch Name (from column H) – plain text, no icons
            let treasuryBranchValue = col7;
            if (!treasuryBranchValue || treasuryBranchValue === '') {
                // If no value in H column, provide a fallback
                treasuryBranchValue = isBranchRecord ? (col0 || displayCode) : '—';
                if (treasuryBranchValue === '') treasuryBranchValue = '—';
            }
            
            records.push({
                type: type,
                code: displayCode,
                treasuryBranchName: treasuryBranchValue,   // from column H, plain text
                email: col4 || '—',
                lastLogin: formatTimestamp(col6),
                activeToday: activeToday
            });
        }
        
        return records;
    }
    
    // Render datatable with removed Name column, Treasury/Branch Name as plain text
    function renderTable(records) {
        const tbody = $('#tableBody');
        tbody.empty();
        
        if (!records || records.length === 0) {
            $('#tableWrapper').hide();
            $('#tableLoader').hide();
            $('#errorContainer').html('<div class="error-message"><i class="bi bi-info-circle"></i> No login records found in the sheet (or missing column H data).</div>').show();
            return;
        }
        
        $('#errorContainer').hide();
        
        let userCount = 0;
        let branchCount = 0;
        let activeTodayCount = 0;
        
        records.forEach(rec => {
            if (rec.type === '👤 User') userCount++;
            else branchCount++;
            if (rec.activeToday) activeTodayCount++;
            
            const statusBadge = rec.activeToday 
                ? '<span class="badge badge-active" style="background-color:#10b981!important; padding:5px 10px;font-weight:500;"><i class="bi bi-check-circle-fill"></i> Yes</span>'
                : '<span class="badge badge-inactive" style="background-color:#94a3b8!important; padding:5px 10px;"><i class="bi bi-clock"></i> No</span>';
            
            // Treasury / Branch Name as plain text (no icon, no badge styling)
            let treasuryDisplay = escapeHtml(rec.treasuryBranchName);
            if (treasuryDisplay === '—' || treasuryDisplay === '') {
                treasuryDisplay = '<span class="text-muted">—</span>';
            }
            
            const row = `
                <tr>
                    <td><span class="${rec.type === '👤 User' ? 'user-badge' : 'branch-badge'}">${rec.type}</span></div></td>
                    <td><code>${escapeHtml(rec.code)}</code></div></td>
                    <td>${treasuryDisplay}</div></div></td>
                    <td><small>${escapeHtml(rec.email)}</small></div></div></td>
                    <td class="login-time">${rec.lastLogin !== '—' ? escapeHtml(rec.lastLogin) : '<span class="text-muted">—</span>'}</div></div></td>
                    <td>${statusBadge}</div></div></td>
                </tr>
            `;
            tbody.append(row);
        });
        
        $('#totalUsers').text(userCount);
        $('#totalBranches').text(branchCount);
        $('#activeToday').text(activeTodayCount);
        
        // Destroy previous DataTable instance if exists
        if (dataTable) {
            dataTable.clear();
            dataTable.destroy();
            dataTable = null;
        }
        
        // Initialize DataTable with proper ordering
        // Columns: 0=Type, 1=ID/Code, 2=Treasury/Branch Name, 3=Email, 4=Last Login, 5=Logged Today
        dataTable = $('#loginTable').DataTable({
            pageLength: 25,
            lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "All"]],
            order: [[1, 'asc']],  // sort by ID/Branch Code by default
            columnDefs: [
                { targets: 2, orderable: true },  // Treasury/Branch Name column sortable
                { targets: [0,1,3,4,5], orderable: true }
            ],
            language: {
                search: "Quick filter:",
                searchPlaceholder: "Type, code, treasury, email...",
                lengthMenu: "Show _MENU_ entries",
                info: "Showing _START_ to _END_ of _TOTAL_ entries",
                infoEmpty: "No entries",
                paginate: {
                    first: '<i class="bi bi-chevron-double-left"></i>',
                    previous: '<i class="bi bi-chevron-left"></i>',
                    next: '<i class="bi bi-chevron-right"></i>',
                    last: '<i class="bi bi-chevron-double-right"></i>'
                }
            },
            drawCallback: function() {
                // optional hook
            }
        });
        
        $('#tableWrapper').show();
        $('#tableLoader').hide();
    }
    
    // Fetches data from Google Sheets (A:H range) - includes column H
    async function fetchLoginData() {
        $('#tableLoader').show();
        $('#tableWrapper').hide();
        $('#errorContainer').hide();
        
        try {
            // Updated range to include column H (A:H)
            const range = encodeURIComponent(`${SHEET_NAME}!A:H`);
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}?key=${API_KEY}`;
            
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const data = await response.json();
            if (!data.values || data.values.length < 2) {
                throw new Error('No data found in Login sheet (minimum header + one row)');
            }
            
            console.log("Raw sheet data rows:", data.values.length);
            const records = processLoginData(data.values);
            if (records.length === 0) {
                throw new Error('No valid treasury/branch user entries found after processing');
            }
            
            allRecords = records;
            renderTable(allRecords);
            
        } catch (err) {
            console.error('Sheet fetch error:', err);
            $('#tableLoader').hide();
            let detailedMsg = err.message;
            if (detailedMsg.includes('API key') || detailedMsg.includes('403')) {
                detailedMsg = 'API access error: Check API key & spreadsheet permissions.';
            } else if (detailedMsg.includes('404')) {
                detailedMsg = 'Spreadsheet not found. Verify ID and that the sheet is public or API enabled.';
            }
            $('#errorContainer').html(`
                <div class="error-message">
                    <i class="bi bi-exclamation-triangle-fill fs-4"></i>
                    <strong>Unable to load login directory</strong><br>
                    ${escapeHtml(detailedMsg)}<br>
                    <small class="text-muted">Ensure the sheet has columns A through H (H = Treasury/Branch Name). Check sheet name is "Login" and read access is enabled.</small>
                </div>
            `).show();
        }
    }
    
    $(document).ready(function() {
        fetchLoginData();
    });
    
    window.addEventListener('beforeunload', function() {
        if (dataTable) {
            dataTable.destroy();
        }
    });
</script>

    }
</style>
